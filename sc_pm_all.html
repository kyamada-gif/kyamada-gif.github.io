<title>SC午後 分析・戦略・教材</title>
<style>
  :root {
    color-scheme: light;
    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6;
    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;
    --accent: #2a5ea6; --accent-soft: #d9e6f5;

  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b;
      --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;
      --accent: #6fa3e0; --accent-soft: #23364d;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b;
    --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;
    --accent: #6fa3e0; --accent-soft: #23364d;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6;
    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;

  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--surface-0); font-family: var(--font-body); }
  .shell-nav {
    position: sticky; top: 0; z-index: 50; display: flex; gap: 4px; flex-wrap: wrap;
    background: var(--surface-1); border-bottom: 1px solid var(--border); padding: 10px 14px;
  }
  .shell-tab {
    appearance: none; border: none; background: none; cursor: pointer; font-family: var(--font-body);
    font-size: 13.5px; font-weight: 700; color: var(--text-muted); padding: 8px 14px; border-radius: 999px;
  }
  .shell-tab.active { background: var(--accent-soft); color: var(--accent); }
  .shell-tab:hover:not(.active) { background: var(--surface-2); }
  .page-host { min-height: 60vh; }
  .shell-loading { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 13.5px; }
</style>

<script>
const PAGES = {"report": {"style": "\n  :root {\n    color-scheme: light;\n    --surface-0: #f6f5f2;\n    --surface-1: #ffffff;\n    --surface-2: #eeece6;\n    --surface-3: #e4e1d8;\n    --border: #ddd9d0;\n    --text-primary: #17191c;\n    --text-secondary: #5b5f5a;\n    --text-muted: #8b8d86;\n    --accent: #2a5ea6;\n    --accent-soft: #d9e6f5;\n    --accent-track: #e6ecf3;\n    --warn: #b5541f;\n    --warn-soft: #f4e3d6;\n    --good: #2f7d4f;\n    --good-soft: #dcefe2;\n    --skip: #8b8d86;\n    --skip-soft: #eceae4;\n    --font-display: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-body: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n  }\n  @media (prefers-color-scheme: dark) {\n    :root:where(:not([data-theme=\"light\"])) {\n      color-scheme: dark;\n      --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n      --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n      --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n      --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n      --skip: #83867f; --skip-soft: #24262b;\n    }\n  }\n  :root[data-theme=\"dark\"] {\n    color-scheme: dark;\n    --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n    --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n    --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n    --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n    --skip: #83867f; --skip-soft: #24262b;\n  }\n  :root[data-theme=\"light\"] {\n    color-scheme: light;\n    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6; --surface-3: #e4e1d8;\n    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;\n    --accent: #2a5ea6; --accent-soft: #d9e6f5; --accent-track: #e6ecf3;\n    --warn: #b5541f; --warn-soft: #f4e3d6; --good: #2f7d4f; --good-soft: #dcefe2;\n    --skip: #8b8d86; --skip-soft: #eceae4;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    background: var(--surface-0);\n    color: var(--text-primary);\n    font-family: var(--font-body);\n    line-height: 1.75;\n    -webkit-font-smoothing: antialiased;\n  }\n  .page { max-width: 860px; margin: 0 auto; padding: 40px 18px 100px; }\n  @media (min-width: 640px) { .page { padding: 60px 28px 120px; } }\n\n  .kicker { font-size: 12.5px; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 600; margin: 0 0 8px; }\n  h1 { font-family: var(--font-display); font-size: clamp(24px, 5vw, 32px); font-weight: 800; letter-spacing: -0.01em; margin: 0 0 6px; text-wrap: balance; }\n  .subtitle { color: var(--text-secondary); font-size: 15px; margin: 0 0 28px; }\n\n  .thesis {\n    background: var(--surface-1); border: 1px solid var(--border); border-left: 4px solid var(--accent);\n    border-radius: 10px; padding: 20px 22px; margin: 0 0 32px; font-size: 14px;\n  }\n  .thesis b { display: block; font-size: 16px; margin-bottom: 8px; }\n  .thesis p { margin: 0; color: var(--text-secondary); }\n  .thesis p + p { margin-top: 8px; }\n\n  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 40px; }\n  .stat { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; flex: 1 1 100px; text-align: center; }\n  .stat .n { font-family: var(--font-mono); font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }\n  .stat .l { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }\n\n  section { margin: 0 0 52px; }\n  h2 {\n    font-family: var(--font-display); font-size: 20px; font-weight: 700; margin: 0 0 6px;\n    display: flex; align-items: baseline; gap: 10px;\n  }\n  h2 .num { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); font-weight: 500; }\n  .lede { color: var(--text-secondary); font-size: 14px; margin: 0 0 20px; }\n\n  /* 出題形式テーブル */\n  .format-table { display: flex; flex-direction: column; gap: 8px; }\n  .format-row {\n    display: grid; grid-template-columns: 140px 1fr 70px 90px; gap: 12px; align-items: center;\n    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px;\n  }\n  .format-row.header { background: none; border: none; color: var(--text-muted); font-size: 11px; font-weight: 700; padding: 0 14px; }\n  .format-bar-track { background: var(--accent-track); border-radius: 999px; height: 18px; overflow: hidden; position: relative; }\n  .format-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; }\n  .format-row .pct { text-align: right; font-variant-numeric: tabular-nums; }\n  .low-acc-badge { font-weight: 700; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; text-align: center; }\n  .low-acc-badge.high { background: var(--warn-soft); color: var(--warn); }\n  .low-acc-badge.mid { background: var(--surface-2); color: var(--text-secondary); }\n  .low-acc-badge.low { background: var(--good-soft); color: var(--good); }\n\n  /* トピックランキング */\n  .rank-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }\n  @media (min-width: 640px) { .rank-grid.two-col { grid-template-columns: 1fr 1fr; } }\n  .rank-col h3 { font-size: 13px; font-weight: 700; margin: 0 0 10px; color: var(--text-secondary); }\n  .bar-row { display: grid; grid-template-columns: 130px 1fr 34px; gap: 8px; align-items: center; margin-bottom: 6px; font-size: 12.5px; }\n  .bar-row .label { color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  .bar-track { background: var(--accent-track); border-radius: 4px; height: 12px; overflow: hidden; }\n  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }\n  .bar-row .val { text-align: right; color: var(--text-muted); font-variant-numeric: tabular-nums; }\n\n  /* 業種 */\n  .industry-list { display: flex; flex-direction: column; gap: 8px; }\n  .industry-row { display: grid; grid-template-columns: 140px 1fr 50px; gap: 10px; align-items: center; font-size: 13px; }\n  .industry-row .bar-track { height: 14px; }\n  .industry-row .bar-fill { background: var(--good); }\n\n  /* 新旧比較 */\n  .compare-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }\n  @media (min-width: 640px) { .compare-grid { grid-template-columns: 1fr 1fr; } }\n  .compare-box { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }\n  .compare-box .cap { font-size: 12px; font-weight: 700; letter-spacing: .04em; margin-bottom: 10px; }\n  .compare-box.declining .cap { color: var(--warn); }\n  .compare-box.rising .cap { color: var(--good); }\n  .compare-box ul { margin: 0; padding-left: 18px; font-size: 13px; }\n  .compare-box li { margin-bottom: 6px; }\n\n  /* 設問例 */\n  .example-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }\n  .example-card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }\n  .example-card .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: var(--accent-track); color: var(--accent); }\n  .example-card .badge.warn { background: var(--warn-soft); color: var(--warn); }\n  .example-card .q-text { font-size: 13.5px; margin: 0 0 8px; }\n  .example-card .commentary { font-size: 12.5px; color: var(--text-secondary); background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }\n  .example-card .commentary .tag { font-size: 11px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 3px; }\n\n  .next-note {\n    background: var(--accent-soft); border-radius: 10px; padding: 18px 20px; font-size: 13.5px; color: var(--text-primary);\n  }\n\n  .footnote { margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }\n", "body": "\n\n<div class=\"page\">\n  <p class=\"kicker\">SC（情報処理安全確保支援士）午後試験</p>\n  <h1>午後 過去問分析レポート</h1>\n  <p class=\"subtitle\">2014〜2025年度、23回分の午後試験（問題冊子・解答例・採点講評）を全問構造化し、出題形式・頻出トピック・業種傾向・年度推移を分析した。</p>\n\n  <div class=\"thesis\">\n    <b>結論</b>\n    <p>午後は「知識を答える」午前と違い、「シナリオの中で技術的な理由や対策を文章で説明する」試験。全1,105設問の27.2%が採点講評で「正答率が低かった」と名指しされており、特に<b>記述(理由説明)</b>形式が最も苦戦されている(35%)。逆に空欄穴埋め・記号選択は知識さえあれば取れる問題が多い。</p>\n    <p>2023年秋に「午後I・II」から「午後」1本の統合形式に変わっており、過去問を使う際はこの前後で試験の構成が違うことを踏まえる必要がある。</p>\n  </div>\n\n  <div class=\"stat-row\">\n    <div class=\"stat\"><div class=\"n\">23</div><div class=\"l\">試験回</div></div>\n    <div class=\"stat\"><div class=\"n\">110</div><div class=\"l\">問</div></div>\n    <div class=\"stat\"><div class=\"n\">1,105</div><div class=\"l\">設問</div></div>\n    <div class=\"stat\"><div class=\"n\">27.2%</div><div class=\"l\">低正答率設問</div></div>\n  </div>\n\n  <section>\n    <h2><span class=\"num\">01</span>出題形式別の難易度</h2>\n    <p class=\"lede\">1,105設問を4つの主要形式に分類。「正答率が低いとされた割合」は採点講評に基づく実測値。</p>\n    <div class=\"format-table\">\n      <div class=\"format-row header\"><span>形式</span><span>割合</span><span>問数</span><span>低正答率</span></div>\n      <div class=\"format-row\">\n        <span>空欄穴埋め</span>\n        <span class=\"format-bar-track\"><span class=\"format-bar-fill\" style=\"width:30.5%\"></span></span>\n        <span class=\"pct\">337問</span>\n        <span class=\"low-acc-badge mid\">23%</span>\n      </div>\n      <div class=\"format-row\">\n        <span>記述(理由説明)</span>\n        <span class=\"format-bar-track\"><span class=\"format-bar-fill\" style=\"width:26.8%\"></span></span>\n        <span class=\"pct\">296問</span>\n        <span class=\"low-acc-badge high\">35%（最難）</span>\n      </div>\n      <div class=\"format-row\">\n        <span>記号選択</span>\n        <span class=\"format-bar-track\"><span class=\"format-bar-fill\" style=\"width:19.5%\"></span></span>\n        <span class=\"pct\">215問</span>\n        <span class=\"low-acc-badge low\">17%（最易）</span>\n      </div>\n      <div class=\"format-row\">\n        <span>記述(対策提案)</span>\n        <span class=\"format-bar-track\"><span class=\"format-bar-fill\" style=\"width:18.0%\"></span></span>\n        <span class=\"pct\">199問</span>\n        <span class=\"low-acc-badge high\">33%</span>\n      </div>\n      <div class=\"format-row\">\n        <span>その他記述</span>\n        <span class=\"format-bar-track\"><span class=\"format-bar-fill\" style=\"width:5.2%\"></span></span>\n        <span class=\"pct\">58問</span>\n        <span class=\"low-acc-badge mid\">31%</span>\n      </div>\n    </div>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">02</span>頻出トピック（午後I・午後IIで傾向が違う）</h2>\n    <p class=\"lede\">午後Iは「ネットワーク境界の防御」、午後IIは「Webアプリ攻撃と事後対応」に寄っている。</p>\n    <div class=\"rank-grid two-col\">\n      <div class=\"rank-col\">\n        <h3>午後I（TOP10）</h3>\n        <div class=\"bar-row\"><span class=\"label\">URLフィルタリング</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:100%\"></span></span><span class=\"val\">5</span></div>\n        <div class=\"bar-row\"><span class=\"label\">バッファオーバフロー</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">標的型攻撃</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">C&amp;Cサーバ</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">プロキシサーバ</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">ディジタル署名</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">DNSキャッシュポイズニング</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:80%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">SPF</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:60%\"></span></span><span class=\"val\">3</span></div>\n        <div class=\"bar-row\"><span class=\"label\">SQLインジェクション</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:60%\"></span></span><span class=\"val\">3</span></div>\n        <div class=\"bar-row\"><span class=\"label\">OSコマンドインジェクション</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:60%\"></span></span><span class=\"val\">3</span></div>\n      </div>\n      <div class=\"rank-col\">\n        <h3>午後II（TOP10）</h3>\n        <div class=\"bar-row\"><span class=\"label\">SQLインジェクション</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:100%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">XSS</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:100%\"></span></span><span class=\"val\">4</span></div>\n        <div class=\"bar-row\"><span class=\"label\">C&amp;Cサーバ</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:75%\"></span></span><span class=\"val\">3</span></div>\n        <div class=\"bar-row\"><span class=\"label\">CSIRT</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:75%\"></span></span><span class=\"val\">3</span></div>\n        <div class=\"bar-row\"><span class=\"label\">脆弱性診断</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:75%\"></span></span><span class=\"val\">3</span></div>\n        <div class=\"bar-row\"><span class=\"label\">反射型XSS</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:50%\"></span></span><span class=\"val\">2</span></div>\n        <div class=\"bar-row\"><span class=\"label\">最小権限</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:50%\"></span></span><span class=\"val\">2</span></div>\n        <div class=\"bar-row\"><span class=\"label\">パスワードリスト攻撃</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:50%\"></span></span><span class=\"val\">2</span></div>\n        <div class=\"bar-row\"><span class=\"label\">標的型攻撃</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:50%\"></span></span><span class=\"val\">2</span></div>\n        <div class=\"bar-row\"><span class=\"label\">ランサムウェア</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:50%\"></span></span><span class=\"val\">2</span></div>\n      </div>\n    </div>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">03</span>シナリオの舞台になる業種</h2>\n    <p class=\"lede\">「業種・シナリオ設定」を分類（自由記述からの粗い分類のため目安）。製造業とEC・小売で4割弱を占める。</p>\n    <div class=\"industry-list\">\n      <div class=\"industry-row\"><span>製造業</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:100%\"></span></span><span>29問</span></div>\n      <div class=\"industry-row\"><span>EC・小売</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:48%\"></span></span><span>14問</span></div>\n      <div class=\"industry-row\"><span>システム開発・SIer</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:34%\"></span></span><span>10問</span></div>\n      <div class=\"industry-row\"><span>金融・決済</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:24%\"></span></span><span>7問</span></div>\n      <div class=\"industry-row\"><span>クラウド・SaaS事業者</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:17%\"></span></span><span>5問</span></div>\n      <div class=\"industry-row\"><span>医療・健康</span><span class=\"bar-track\"><span class=\"bar-fill\" style=\"width:7%\"></span></span><span>2問</span></div>\n    </div>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">04</span>2023年秋の形式統合で何が変わったか</h2>\n    <p class=\"lede\">午後I・IIが「午後」1本(4問から2問選択)に統合。旧形式18回・新形式5回で単純比較すると出題の重心がわずかに動いている（新形式はまだ回数が少なく参考値）。</p>\n    <div class=\"compare-grid\">\n      <div class=\"compare-box declining\">\n        <p class=\"cap\">旧形式で目立ち、新形式では出ていない</p>\n        <ul>\n          <li>C&amp;Cサーバ（旧8%→新0%）</li>\n          <li>DNSキャッシュポイズニング（旧6%→新0%）</li>\n          <li>バッファオーバフロー（旧4%→新0%）</li>\n          <li>ディジタル署名（旧4%→新0%）</li>\n          <li>CSIRT・インシデント対応（旧3%→新0%）</li>\n        </ul>\n      </div>\n      <div class=\"compare-box rising\">\n        <p class=\"cap\">新形式で増えている</p>\n        <ul>\n          <li>多要素認証（旧3%→新10%）</li>\n          <li>URLフィルタリング（旧7%→新10%）</li>\n          <li>SPF（旧3%→新5%）</li>\n          <li>最小権限・CSRF（旧3%→新5%）</li>\n          <li>脆弱性診断（旧4%→新5%）</li>\n        </ul>\n      </div>\n    </div>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">05</span>設問の実例（正答率が低かったもの）</h2>\n    <p class=\"lede\">採点講評に基づく、実際に受験者が苦戦した設問の例。</p>\n    <div class=\"example-card\">\n      <div class=\"meta\"><span class=\"badge\">2014年秋 午後I</span><span class=\"badge warn\">記述(対策提案)・正答率低</span></div>\n      <p class=\"q-text\">スタックバッファオーバフロー攻撃を防止するには、データ実行防止機能をどのメモリ領域に適用すればよいかを問う設問。</p>\n      <div class=\"commentary\"><span class=\"tag\">採点講評</span>スタックバッファオーバフロー攻撃を具体的に理解し、説明できる能力を求める問題である。本問の攻撃自体は基本的な例であるが、正確な知識がなければ解答は困難である。</div>\n    </div>\n    <div class=\"example-card\">\n      <div class=\"meta\"><span class=\"badge\">2022年秋 午後I</span><span class=\"badge warn\">記述(理由説明)・正答率低</span></div>\n      <p class=\"q-text\">HTTPSを利用して攻撃者のサーバから偽のファームウェアをダウンロードさせない実装を問う設問。</p>\n      <div class=\"commentary\"><span class=\"tag\">採点講評</span>暗号化を行うという解答や、サーバ証明書の確認に触れていない解答が散見された。安全な通信を行うためのTLSについて理解を深めてほしい。</div>\n    </div>\n    <div class=\"example-card\">\n      <div class=\"meta\"><span class=\"badge\">2022年秋 午後I</span><span class=\"badge warn\">記述(対策提案)・正答率低</span></div>\n      <p class=\"q-text\">POSTメソッドを用いたクロスサイトリクエストフォージェリ攻撃の仕組みとその対策を問う設問。</p>\n      <div class=\"commentary\"><span class=\"tag\">採点講評</span>リスク評価及び脆弱性の対策立案において、攻撃を受ける具体的な脅威を想定することは重要である。CSRFの仕組みとその対策について理解を深めてほしい。</div>\n    </div>\n  </section>\n\n  <div class=\"next-note\">\n    <b>次のステップ：</b>この分析結果をもとに、「午後をどの順番で・どの深さで学習すべきか」の戦略を次に作成する。記述(理由説明)・記述(対策提案)は\"暗記\"ではなく\"型で書けるようにする\"訓練が必要になる見込み。\n  </div>\n\n  <p class=\"footnote\">出典：IPA公式サイト公開の午後問題冊子・解答例・採点講評（2014年度〜2025年度、23回分）。分析データは output/pm_questions.json（110問・1,105設問、全問構造化済み）。トピック・業種分類は自由記述からの分類のため目安。</p>\n</div>\n", "script": ""}, "strategy": {"style": "\n  :root {\n    color-scheme: light;\n    --surface-0: #f6f5f2;\n    --surface-1: #ffffff;\n    --surface-2: #eeece6;\n    --surface-3: #e4e1d8;\n    --border: #ddd9d0;\n    --text-primary: #17191c;\n    --text-secondary: #5b5f5a;\n    --text-muted: #8b8d86;\n    --accent: #2a5ea6;\n    --accent-soft: #d9e6f5;\n    --accent-track: #e6ecf3;\n    --warn: #b5541f;\n    --warn-soft: #f4e3d6;\n    --good: #2f7d4f;\n    --good-soft: #dcefe2;\n    --skip: #8b8d86;\n    --skip-soft: #eceae4;\n    --font-display: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-body: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n  }\n  @media (prefers-color-scheme: dark) {\n    :root:where(:not([data-theme=\"light\"])) {\n      color-scheme: dark;\n      --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n      --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n      --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n      --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n      --skip: #83867f; --skip-soft: #24262b;\n    }\n  }\n  :root[data-theme=\"dark\"] {\n    color-scheme: dark;\n    --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n    --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n    --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n    --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n    --skip: #83867f; --skip-soft: #24262b;\n  }\n  :root[data-theme=\"light\"] {\n    color-scheme: light;\n    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6; --surface-3: #e4e1d8;\n    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;\n    --accent: #2a5ea6; --accent-soft: #d9e6f5; --accent-track: #e6ecf3;\n    --warn: #b5541f; --warn-soft: #f4e3d6; --good: #2f7d4f; --good-soft: #dcefe2;\n    --skip: #8b8d86; --skip-soft: #eceae4;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    background: var(--surface-0); color: var(--text-primary); font-family: var(--font-body);\n    line-height: 1.75; -webkit-font-smoothing: antialiased;\n  }\n  .page { max-width: 800px; margin: 0 auto; padding: 40px 18px 100px; }\n  @media (min-width: 640px) { .page { padding: 60px 28px 120px; } }\n\n  .kicker { font-size: 12.5px; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 600; margin: 0 0 8px; }\n  h1 { font-family: var(--font-display); font-size: clamp(24px, 5vw, 32px); font-weight: 800; letter-spacing: -0.01em; margin: 0 0 6px; text-wrap: balance; }\n  .subtitle { color: var(--text-secondary); font-size: 15px; margin: 0 0 28px; }\n\n  .thesis {\n    background: var(--surface-1); border: 1px solid var(--border); border-left: 4px solid var(--accent);\n    border-radius: 10px; padding: 22px 24px; margin: 0 0 40px;\n  }\n  .thesis .label { font-size: 12px; letter-spacing: 0.1em; color: var(--accent); font-weight: 700; margin: 0 0 8px; }\n  .thesis p { margin: 0; font-size: 17px; font-weight: 600; line-height: 1.65; }\n  .thesis p + p { margin-top: 10px; font-size: 14px; font-weight: 400; color: var(--text-secondary); }\n\n  section { margin: 0 0 44px; }\n  h2 { font-family: var(--font-display); font-size: 19px; font-weight: 700; margin: 0 0 4px; display: flex; align-items: baseline; gap: 10px; }\n  h2 .num { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); font-weight: 500; }\n  .lede { color: var(--text-secondary); font-size: 14.5px; margin: 0 0 18px; }\n  .basis { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }\n  .basis b { color: var(--text-secondary); font-weight: 600; }\n\n  /* 構造カード */\n  .structure-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }\n  @media (min-width: 640px) { .structure-grid { grid-template-columns: 1fr 1fr; } }\n  .structure-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }\n  .structure-card .cap { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }\n  .structure-card .big { font-family: var(--font-mono); font-size: 20px; font-weight: 700; margin-bottom: 4px; }\n  .structure-card .detail { font-size: 13px; color: var(--text-secondary); }\n\n  /* 失点源カード */\n  .loss-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }\n  .loss-card .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }\n  .loss-card .head b { font-size: 15px; }\n  .loss-card .head .rate { font-family: var(--font-mono); font-weight: 700; color: var(--warn); }\n  .loss-card .fix { background: var(--good-soft); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; margin-top: 8px; }\n  .loss-card .fix .tag { font-size: 11px; font-weight: 700; color: var(--good); display: block; margin-bottom: 3px; }\n  .loss-card .example { font-size: 12.5px; color: var(--text-muted); background: var(--surface-2); border-radius: 6px; padding: 6px 10px; margin-top: 6px; }\n\n  /* 選択戦略 */\n  .select-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }\n  .select-row { display: grid; grid-template-columns: 90px 1fr; gap: 12px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; align-items: center; }\n  .select-row .tag { font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 999px; text-align: center; }\n  .tag-go { background: var(--good-soft); color: var(--good); }\n  .tag-avoid { background: var(--warn-soft); color: var(--warn); }\n  .select-row .body b { display: block; font-size: 13.5px; }\n  .select-row .body .sub { font-size: 12px; color: var(--text-secondary); }\n\n  /* 頻出トピック */\n  .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }\n  .chip { background: var(--accent-soft); color: var(--accent); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 600; }\n\n  /* ロードマップ */\n  .roadmap { display: flex; flex-direction: column; }\n  .step { display: grid; grid-template-columns: 28px 1fr; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }\n  .step:last-child { border-bottom: none; }\n  .step .marker { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); font-family: var(--font-mono); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; }\n  .step b { display: block; font-size: 14.5px; margin-bottom: 3px; }\n  .step .detail { font-size: 13.5px; color: var(--text-secondary); }\n\n  .footnote { margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }\n", "body": "\n\n<div class=\"page\">\n  <p class=\"kicker\">SC（情報処理安全確保支援士）午後試験</p>\n  <h1>最短で合格ラインに乗せる対策戦略</h1>\n  <p class=\"subtitle\">23回・110問・1,105設問の実データから、「何が一番の失点源か」「直近で何が変わったか」を分析し、最短ルートに絞った。</p>\n\n  <div class=\"thesis\">\n    <p class=\"label\">結論</p>\n    <p>午後の合格を決めるのは「知識量」ではなく「短い文章で正確に答える技術」。理由説明・対策提案という記述問題だけで失点の約6割が集中しており、ここを直せば最も効率よく点が伸びる。トピックを丸暗記する戦略は午前ほど効かない（上位40個を覚えても実問題の7割にしか触れられない）ので、午前で作った知識の土台をそのまま使い、午後は「書き方の型」の練習に時間を集中させるのが最短ルート。</p>\n    <p>2023年秋に試験の形自体が変わっている（午後I・午後II→「午後」1本、150分・4問中2問選択）。この資料はその新形式を基準に組み立てている。</p>\n  </div>\n\n  <section>\n    <h2><span class=\"num\">01</span>合格ラインの構造（今の試験）</h2>\n    <p class=\"lede\">100点満点・60点以上で合格。2023年秋以降は下記の形。</p>\n    <div class=\"structure-grid\">\n      <div class=\"structure-card\">\n        <p class=\"cap\">試験時間・出題</p>\n        <p class=\"big\">150分・4問中2問選択</p>\n        <p class=\"detail\">1問あたり実質75分。2問の合計得点で60点以上必要（1問だけ極端に良くても、もう1問が悪ければ合格しない設計）。</p>\n      </div>\n      <div class=\"structure-card\">\n        <p class=\"cap\">設問の内訳（実測）</p>\n        <p class=\"big\">1問あたり平均10設問</p>\n        <p class=\"detail\">空欄穴埋め30.5%・記述(理由説明)26.8%・記号選択19.5%・記述(対策提案)18.0%。約45%が記述式。</p>\n      </div>\n    </div>\n    <p class=\"basis\"><b>出典:</b> IPA公式サイト（試験時間・選択数）、questions_pm.json（設問内訳の実測値）。旧形式(〜2023年春)は午後I=90分・3問中2問選択、午後II=120分・2問中1問選択だった。</p>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">02</span>最大の失点源と、その直し方</h2>\n    <p class=\"lede\">全1,105設問のうち27.2%が採点講評で「正答率が低い」と名指しされている。その内訳を見ると、記述式2種類に集中している。</p>\n\n    <div class=\"loss-card\">\n      <div class=\"head\"><b>記述(理由説明) — 全設問の26.8%</b><span class=\"rate\">低正答率 35%</span></div>\n      <p style=\"margin:0;font-size:13.5px;\">「なぜそうなるか」を説明する問題。平均文字数は39字（中央値33字）と短い。長い理屈を書こうとして外すパターンが多い。</p>\n      <div class=\"fix\">\n        <span class=\"tag\">直し方</span>\n        「〜だから」と論理で説明しようとせず、<b>該当する技術的事実・仕様を一言で言い切る</b>練習をする。模範解答の実例：「攻撃を成功させるためのジャンプ先アドレスの特定」「ルート特権化するマルウェアに感染したとき」のように、名詞で言い切る形が多い。\n      </div>\n    </div>\n\n    <div class=\"loss-card\">\n      <div class=\"head\"><b>記述(対策提案) — 全設問の18.0%</b><span class=\"rate\">低正答率 33%</span></div>\n      <p style=\"margin:0;font-size:13.5px;\">「何をすべきか」を答える問題。平均40字、49%が動詞で終わる「〜する」形。</p>\n      <div class=\"fix\">\n        <span class=\"tag\">直し方</span>\n        抽象的な方針（「セキュリティを強化する」等）ではなく、<b>誰が・何を・どうするか、を具体的な1動作で書き切る</b>。模範解答の実例：「インジェクションベクタを検知・破棄する。」「担当者の証明書を停止する権限を代表者に付与する」のように、実行可能な1文で終わる。\n      </div>\n    </div>\n\n    <p class=\"basis\"><b>出典:</b> pm_questions.json 全1,105設問の実測（正答率が低いとされた割合・文字数分布・文末パターン）。</p>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">03</span>問題選択の戦略（4問中どれを選ぶか）</h2>\n    <p class=\"lede\">問題番号ごとの低正答率を実測すると、明確に「易しい傾向のタイプ」がある。</p>\n    <div class=\"select-grid\">\n      <div class=\"select-row\">\n        <span class=\"tag tag-go\">選ぶ</span>\n        <div class=\"body\"><b>インシデント調査・ログ解析型</b><span class=\"sub\">「何が起きたか」を手がかりから読み解く物語型の問題。低正答率20〜25%と比較的易しい。マルウェア感染対応、不正アクセス調査、フィッシング対応など。</span></div>\n      </div>\n      <div class=\"select-row\">\n        <span class=\"tag tag-avoid\">避ける</span>\n        <div class=\"body\"><b>コード・プロトコル深掘り型</b><span class=\"sub\">バッファオーバフローの詳細、ASLR、低レベルの脆弱性メカニズムなど。低正答率33〜38%と最も苦戦されている。得意でない限り優先度を下げる。</span></div>\n      </div>\n      <div class=\"select-row\">\n        <span class=\"tag tag-avoid\">避ける</span>\n        <div class=\"body\"><b>抽象的リスクマネジメント型</b><span class=\"sub\">サプライチェーン全体のリスク評価、組織横断のリスクアセスメントなど。新形式で低正答率26%とやや高め。具体的な手順より判断力が問われる。</span></div>\n      </div>\n    </div>\n    <p class=\"basis\"><b>出典:</b> 問題番号スロット別の低正答率実測（午後I問1=38%・問3=20%、統合問1・2=15%前後・問4=26%）とテーマ内容の対応分析。</p>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">04</span>トピック暗記の限界（正直な数字）</h2>\n    <p class=\"lede\">午前と違い、午後は同じ技術用語がそのまま繰り返される率が低い。上位トピックを覚えても、頭打ちになる。</p>\n    <div class=\"structure-grid\">\n      <div class=\"structure-card\">\n        <p class=\"cap\">上位10個を覚えると</p>\n        <p class=\"big\">40%の問題に関連</p>\n      </div>\n      <div class=\"structure-card\">\n        <p class=\"cap\">上位40個を覚えても</p>\n        <p class=\"big\">73%が上限</p>\n      </div>\n    </div>\n    <p class=\"basis\" style=\"margin-top:10px;\">だからこそ、個別の用語を暗記する戦略ではなく、<b>learning-path.htmlで作った分野の土台（暗号・認証・Web攻撃・ネットワーク防御・インシデント対応など）をそのまま流用</b>し、午後ではその土台を使って「初めて見るシナリオでも読み解く力」と「短く言い切る書き方」を鍛える方が伸びる。<b>出典:</b> pm_topic_analysis.json 上位Kトピックのカバレッジ・シミュレーション。</p>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">05</span>直近5回（2023年秋〜2025年）で見えている傾向</h2>\n    <p class=\"lede\">新形式になってからの出題だけで見ると、以下が目立つ。標本が5回とまだ少ないので「参考値」だが、次の試験に一番近い情報。</p>\n    <div class=\"chip-list\">\n      <span class=\"chip\">脆弱性管理</span>\n      <span class=\"chip\">XSS（格納型・エスケープ処理）</span>\n      <span class=\"chip\">多要素認証</span>\n      <span class=\"chip\">URLフィルタリング</span>\n      <span class=\"chip\">無線LAN認証(WPA2-PSK/EAP-TLS)</span>\n      <span class=\"chip\">サーバ証明書の検証</span>\n      <span class=\"chip\">HSTS</span>\n    </div>\n    <p class=\"basis\" style=\"margin-top:12px;\">業種は製造業(5問)・Web/SaaS系(4問)・EC/小売(4問)が中心。旧形式で頻出していたC&amp;Cサーバ・DNSキャッシュポイズニング・バッファオーバフローは新形式では出題ゼロ（標本が少ないため断定はできないが、出題の重心が「攻撃検知後の対応」から「予防的な設計・認証の堅牢化」にやや移った可能性がある）。<b>出典:</b> pm_questions.json 新形式5回分(2023r05a, 2024r06a, 2024r06h, 2025r07a, 2025r07h)のトピック集計。</p>\n  </section>\n\n  <section>\n    <h2><span class=\"num\">06</span>最短ロードマップ</h2>\n    <div class=\"roadmap\">\n      <div class=\"step\">\n        <span class=\"marker\">1</span>\n        <div><b>午前の学習を先に固める（learning-path.htmlのステージ0〜7）</b><div class=\"detail\">午後はトピック暗記が効きにくい分、午前で作った概念の土台がそのまま午後の得点力になる。順番を逆にしない。</div></div>\n      </div>\n      <div class=\"step\">\n        <span class=\"marker\">2</span>\n        <div><b>「書き方の型」を先に練習する（暗記より先）</b><div class=\"detail\">記述(理由説明)は事実を名詞で言い切る、記述(対策提案)は1動作を動詞で言い切る。どちらも30〜40字。この型だけで失点の約6割の領域が改善する。</div></div>\n      </div>\n      <div class=\"step\">\n        <span class=\"marker\">3</span>\n        <div><b>直近5回分＋直近2〜3年の過去問から始める</b><div class=\"detail\">新形式になってからの出題が一番今の試験に近い。ここを先に解き、模範解答・採点講評と自分の解答を突き合わせて「型のズレ」を確認する。</div></div>\n      </div>\n      <div class=\"step\">\n        <span class=\"marker\">4</span>\n        <div><b>残りの年度を、インシデント調査型を優先しながら解く</b><div class=\"detail\">コード深掘り型・抽象的リスク管理型は後回しでよい。同じ書き方の型を繰り返し使って身体で覚える。</div></div>\n      </div>\n      <div class=\"step\">\n        <span class=\"marker\">5</span>\n        <div><b>本番形式で「4問中2問を選ぶ」練習をする</b><div class=\"detail\">知識よりも先に「どの2問を選ぶか」の判断練習をしておくと、本番で時間を無駄にしない。</div></div>\n      </div>\n    </div>\n  </section>\n\n  <p class=\"footnote\">分析対象：2014〜2025年度、23回分・110問・1,105設問（pm_questions.json）。トピック・業種分類は自由記述からの分類のため目安。直近傾向(セクション05)は標本数5回分のため参考値として扱うこと。</p>\n</div>\n", "script": ""}, "material": {"style": "\n  :root {\n    color-scheme: light;\n    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6; --surface-3: #e4e1d8;\n    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;\n    --accent: #2a5ea6; --accent-soft: #d9e6f5; --accent-track: #e6ecf3;\n    --warn: #b5541f; --warn-soft: #f4e3d6; --good: #2f7d4f; --good-soft: #dcefe2;\n    --skip: #8b8d86; --skip-soft: #eceae4;\n    --font-display: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-body: \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic UI\", \"Noto Sans JP\", system-ui, sans-serif;\n    --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n  }\n  @media (prefers-color-scheme: dark) {\n    :root:where(:not([data-theme=\"light\"])) {\n      color-scheme: dark;\n      --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n      --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n      --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n      --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n      --skip: #83867f; --skip-soft: #24262b;\n    }\n  }\n  :root[data-theme=\"dark\"] {\n    color-scheme: dark;\n    --surface-0: #131417; --surface-1: #1b1d21; --surface-2: #24262b; --surface-3: #2c2f35;\n    --border: #34373d; --text-primary: #f2f2f0; --text-secondary: #b7bab5; --text-muted: #83867f;\n    --accent: #6fa3e0; --accent-soft: #23364d; --accent-track: #263547;\n    --warn: #e59a6a; --warn-soft: #3d2c1d; --good: #6fc796; --good-soft: #1e3126;\n    --skip: #83867f; --skip-soft: #24262b;\n  }\n  :root[data-theme=\"light\"] {\n    color-scheme: light;\n    --surface-0: #f6f5f2; --surface-1: #ffffff; --surface-2: #eeece6; --surface-3: #e4e1d8;\n    --border: #ddd9d0; --text-primary: #17191c; --text-secondary: #5b5f5a; --text-muted: #8b8d86;\n    --accent: #2a5ea6; --accent-soft: #d9e6f5; --accent-track: #e6ecf3;\n    --warn: #b5541f; --warn-soft: #f4e3d6; --good: #2f7d4f; --good-soft: #dcefe2;\n    --skip: #8b8d86; --skip-soft: #eceae4;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: var(--surface-0); color: var(--text-primary); font-family: var(--font-body); line-height: 1.7; -webkit-font-smoothing: antialiased; }\n  .page { max-width: 880px; margin: 0 auto; padding: 36px 18px 100px; }\n  @media (min-width: 640px) { .page { padding: 56px 28px 120px; } }\n\n  .kicker { font-size: 12.5px; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 600; margin: 0 0 8px; }\n  h1 { font-family: var(--font-display); font-size: clamp(22px, 5vw, 30px); font-weight: 800; letter-spacing: -0.01em; margin: 0 0 6px; text-wrap: balance; }\n  .subtitle { color: var(--text-secondary); font-size: 14.5px; margin: 0 0 20px; }\n\n  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface-0); padding-top: 6px; z-index: 5; flex-wrap: wrap; }\n  .tab { appearance: none; border: none; background: none; cursor: pointer; font-family: var(--font-body); font-size: 13.5px; font-weight: 700; color: var(--text-muted); padding: 10px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; }\n  .tab[aria-selected=\"true\"] { color: var(--accent); border-bottom-color: var(--accent); }\n  .panel { display: none; }\n  .panel.active { display: block; }\n\n  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }\n  .controls input[type=\"search\"] { flex: 1 1 200px; min-width: 0; background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--text-primary); font-family: var(--font-body); }\n  select.chip-filter { appearance: auto; cursor: pointer; }\n  .chip-filter { appearance: none; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary); border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: var(--font-body); }\n  .chip-filter[aria-pressed=\"true\"] { background: var(--accent-soft); color: var(--accent); border-color: transparent; }\n  .count-line { font-size: 12.5px; color: var(--text-muted); margin: 0 0 12px; }\n  .progress-line { font-size: 12.5px; color: var(--text-muted); margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }\n  .progress-track { flex: 1; max-width: 160px; height: 6px; background: var(--accent-track); border-radius: 999px; overflow: hidden; }\n  .progress-fill { height: 100%; background: var(--good); border-radius: 999px; }\n  .progress-reset { background: none; border: none; color: var(--text-muted); font-size: 11.5px; text-decoration: underline; cursor: pointer; font-family: var(--font-body); }\n\n  .empty-state { text-align: center; padding: 30px 10px; color: var(--text-muted); font-size: 13.5px; }\n\n  /* 問カード共通 */\n  .prob-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }\n  .prob-card > summary { list-style: none; cursor: pointer; padding: 13px 16px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }\n  .prob-card > summary::-webkit-details-marker { display: none; }\n  .prob-card > summary .arrow { margin-left: auto; color: var(--text-muted); font-size: 12px; transition: transform .15s; flex-shrink: 0; }\n  .prob-card[open] > summary .arrow { transform: rotate(90deg); }\n  .prob-card > summary .meta { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }\n  .badge { font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }\n  .badge-year { background: var(--surface-2); color: var(--text-secondary); }\n  .badge-type-go { background: var(--good-soft); color: var(--good); }\n  .badge-type-avoid { background: var(--warn-soft); color: var(--warn); }\n  .badge-type-mid { background: var(--accent-track); color: var(--accent); }\n  .prob-body { padding: 0 16px 16px; font-size: 13.5px; }\n  .prob-body .intent { color: var(--text-secondary); background: var(--surface-2); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }\n  .prob-body .intent .tag { font-size: 11px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 3px; }\n  .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }\n  .chip { background: var(--accent-soft); color: var(--accent); border-radius: 999px; padding: 4px 10px; font-size: 11.5px; font-weight: 600; }\n\n  .setmon-row { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }\n  .setmon-row .sm-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }\n  .setmon-row .sm-head b { font-size: 12.5px; font-family: var(--font-mono); }\n  .setmon-row .sm-head .fmt-badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--surface-2); color: var(--text-secondary); }\n  .setmon-row .sm-head .low-badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--warn-soft); color: var(--warn); }\n  .setmon-row .prompt { font-size: 13px; margin: 0 0 8px; =\"progress-a\"></p>\n    <div id=\"pattern-list\"></div>\n  </div>\n\n  <div class=\"panel\" id=\"panel-b\">\n    <div class=\"controls\">\n      <input type=\"search\" id=\"search-b\" placeholder=\"テーマ・トピックで検索（例：SQLインジェクション）\">\n    </div>\n    <div class=\"controls\" id=\"type-filters\"></div>\n    <div class=\"controls\" id=\"year-filters\"></div>\n    <p class=\"count-line\" id=\"count-b\"></p>\n    <p class=\"progress-line\" id=\"progress-b\"></p>\n    <div id=\"problem-list\"></div>\n  </div>\n\n  <div class=\"panel\" id=\"panel-c\">\n    <div class=\"note-box\">実際の1回分（年度・午前I/II or 統合）を選び、本番と同じ「N問中M問選択」で解く。設問ごとに○(できた)/△(部分点)/✕(できなかった)を自己申告し、採点講評ベースの目安で合否判定する。自己採点なので厳密な点数ではないが、傾向をつかむ練習として使う。</div>\n    <div class=\"exam-setup\">\n      <select id=\"exam-sitting-select\" class=\"chip-filter\" style=\"min-width:220px;\"></select>\n      <button class=\"chip-filter\" id=\"exam-start-btn\">この回を始める</button>\n    </div>\n    <div id=\"exam-body\"></div>\n    <div id=\"exam-history-section\" style=\"margin-top:24px;\">\n      <p class=\"count-line\" style=\"display:flex; align-items:center; gap:10px;\">\n        <span>受験履歴（この端末に保存）</span>\n        <button class=\"progress-reset\" id=\"exam-history-reset\">履歴を消す</button>\n      </p>\n      <div id=\"exam-history-list\"></div>\n    </div>\n  </div>\n\n  <p class=\"footnote\">出典：pm_questions.json（2014〜2025年度・23回分・110問・1,105設問、全問構造化済み）。チェック状況・受験履歴はこの端末のブラウザにのみ保存される。</p>\n</div>\n\n", "script": "\nconst PM_DATA = [{\"paper_id\": \"2014h26a_sc_pm1\", \"problem_no\": 1, \"theme\": \"スマートフォンのルート特権化とバッファオーバフロー攻撃・運用対策\", \"industry_setting\": \"従業員5,000名の情報システム会社(K社)\", \"exam_intent\": \"近年，様々な場面でのスマートフォンの利用が増えており，個人所有のスマートフォンを，所属する組織での情報システムの中で活用することも期待されている。しかし，そのような利用において，新たな脅威が生まれることも想定できる。本問は，スマートフォン用OSを題材としているが，多くのOSに共通する知識を扱っており，ルート特権化に関する技術及びシステムの運用に関する問題である。特に，スマートフォン用OSのルート特権化の一手法であるスタックバッファオーバフロー攻撃及びその対策がどのような仕組みであるかを問う。また，それらがシステムインテグレーションや運用にどのように影響するのかのリスク分析能力・対案立案能力を問う。\", \"topics\": [\"バッファオーバフロー攻撃\", \"スタック破 。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"ルート特権化されていないスマホでは，アプリのデータの不正な読出しを，OSのファイルシステムがどのような仕様で制限しているか，40字以内で述べる。\", \"model_answer\": \"あるアプリから，ほかのアプリのデータへのアクセスを禁止するという仕様\", \"commentary\": \"設問4は，脆弱性をもつシステムの運用場面での脅威及び対処をストーリーに合わせて解答する問題であり，周辺技術の理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について，従業員がスマホ利用規程を守ったとしても残存する意図しないルート特権化が，どのような状況で起こり得るか，25字以内で述べる。\", \"model_answer\": \"ルート特権化するマルウェアに感染したとき\", \"commentary\": \"設問4は，脆弱性をもつシステムの運用場面での脅威及び対処をストーリーに合わせて解答する問題である。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑤(スマホのOSのバージョンをK社が確認する運用策)について，確認方法を具体的に20字以内で述べる。\", \"model_answer\": \"Mシステムを使って確認する。\", \"commentary\": \"設問4は，脆弱性をもつシステムの運用場面での脅威及び対処をストーリーに合わせて解答する問題である。\", \"low_accuracy\": true}], \"_source_file\": \"2014h26a_sc_pm1.json\", \"problem_type\": \"コード・プロトコル深掘り型\", \"year\": 2014, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-0\"}, {\"paper_id\": \"2014h26a_sc_pm1\", \"problem_no\": 2, \"theme\": \"代理店販売支援システムの暗号技術とSSLクライアント認証・PKI運用\", \"industry_setting\": \"中堅の損害保険会社(L社)\", \"exam_intent\": \"近年，インターネットに接続したWebサーバを用いて実に様々なサービスが提供されている。このようなサービスでは随所に暗号技術が利用されており，中でも，公開鍵認証基盤について適切な設計と運用方法を理解しておくことは，セキュリティ技術者にとって重要である。本問では，暗号技術の基礎知識と安全性についての考え方，公開鍵認証基盤の下で用いられるディジタル証明書の基礎知識と運用上の特徴及び制約についての知識を問う。また，目標とするセキュリティレベルに合わせて，必要な技術や手法を柔軟に組み合わせ，システムを設計する能力についても問う。\", \"topics\": [\"暗号アルゴリズムの安全性\", \"セキュリティ強度\", \"SSLクライアント認証\", \"ディジタル証明書\", \"公開鍵認証基盤(PKI)\", \"証明書の失効・更新\", \"役割と権限の分離\", \"ハッシュ関数\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2の暗号アルゴリズムの安全性で，256ビット安全性と同じセキュリティ強度をもつRSAの鍵長(空欄a)とハッシュ関数のビット数(空欄b)を答える。\", \"model_answer\": \"a:15,360 / b:512\", \"commentary\": \"設問1(1)及び(2)は，攻撃への耐性の視点から様々な種類の暗号技術を比較する問題であった。本問の正答率はおおむね想定どおりであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"鍵長3,072ビットのRSAアルゴリズムと同等又はそれ以上のセキュリティ強度をもつと考えられるハッシュ関数を解答群から全て選ぶ。\", \"model_answer\": \"カ，キ (SHA-256，SHA-512)\", \"commentary\": \"本問にあるように，攻撃への耐性の視点から異なった種類の暗号技術を比較評価する方法を理解し，今後活用してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"空欄c(Qシステムが採用すべき最低限のセキュリティ強度のビット数)に入れる数値を答え，その数値がQシステムのどのような要件から導かれるかを20字以内で述べる。\", \"model_answer\": \"c:112 / 要件:利用期間は2025年8月までである。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①(Qシステムにアクセスしていた端末を交換及び廃棄する場合に代理店が実施すべき処理)について，代理店が実施すべき処理を30字以内で具体的に述べる。\", \"model_answer\": \"端末に発行された証明書の利用停止を申請する。\", \"commentary\": \"設問2(1)は，正答率が若干低かった。端末のディスク内のデータの削除に言及する解答が目立ったが，本問の状況においては，端末に発行された証明書を利用停止させる方法が最も適切である。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図1・図2中の空欄d〜hに入れる字句を答える。d:新規発行手順で端末から送信するもの，e:利用停止時に入力する項目，f:識別番号が登録されていないことを確認するリスト，g・h:ログイン検証で一致を確認する項目。\", \"model_answer\": \"d:公開鍵 / e:シリアル番号 / f:受付拒否リスト / g:入力された利用者ID / h:利用者ID\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②(証明書の新規発行手順で代理店の管轄下にない端末でアクセスできる問題)について，代理店がとる対策を40字以内で具体的に述べる。代表者は不適切な行為をしないものとする。\", \"model_answer\": \"代理店の管轄下の端末に証明書がインストールされていることを代表者が確認する。\", \"commentary\": \"設問3(1)は，正答率が低かった。代理店内に設置されたネットワークの管理に言及する解答が散見されたが，Qシステムはインターネット経由でアクセスできるので，代理店内のネットワーク管理で対応できる範囲は限られている。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表3中の空欄i(証明書利用停止手順の修正案(2)における役割と権限の見直し内容)に入れる適切な内容を30字以内で述べる。\", \"model_answer\": \"担当者の証明書を停止する権限を代表者に付与する\", \"commentary\": \"技術一辺倒ではなく，弱点を補う運用や役割分担など，幅広い視点をもって，目標とするセキュリティレベルを達成するシステムの設計を行えるように理解を深めてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③(本来発行されるべきでない証明書が発行される可能性)のような証明書発行を防ぐために，登録サーバの処理内容にどのような処理を追加すればよいか，40字以内で述べる。\", \"model_answer\": \"受付拒否リスト 　f：キ（不正アクセス禁止法）\", \"commentary\": \"設問2は，データの保護に関係する法令についての問題である。設問2(1)の(d)，(e)及び(f)は，正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め(記述)\", \"prompt_summary\": \"本文中の空欄b(5字以内)，c(15字以内)に入れる適切な字句を答える。営業秘密として保護されるための要件に関する空欄。\", \"model_answer\": \"b：営業秘密　c：公然と知られていない\", \"commentary\": \"設問2(2)は，正答率が低かった。技術だけでなく，法令も考慮した上で，効果的なデータ保護を実現できるようになってほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"空欄穴埋め(記述)\", \"prompt_summary\": \"表3(NPCのディスクの暗号化方式)中の空欄g，hに入れる適切な字句をそれぞれ5字以内で答える。\", \"model_answer\": \"g：OS　h：暗号化\", \"commentary\": \"設問3は，データの保護に利用される暗号技術についての問題である。設問3(1)，(3)の(i)と(k)，及び(4)の正答率は高く，ほかは低めであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③(ディスクやファイルの暗号化にECBモードをそのまま用いること)について，セキュリティ上の問題を45字以内で具体的に述べる。\", \"model_answer\": \"平文が同じブロックは同じ暗号文になるので，暗号文から平文を推測されやすい。\", \"commentary\": \"設問3(1)，(3)の(i)と(k)，及び(4)の正答率は高く，ほかは低めであった。暗号は，“AESだから安全”，“鍵が長いから安全”と簡単に決まるものではなく，同時に利用される様々な技術に依存して，特性に大きな違いが生まれる。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(3)\", \"format\": \"空欄穴埋め(数値)\", \"prompt_summary\": \"本文中の空欄i〜mに入れる適切な数値を答える。512バイト平文の一部1ブロック修正・復号に必要な暗号化処理回数を，ECB/CBC/OFB各モードについて求める。\", \"model_answer\": \"i：1　j：24　k：1　l：1　m：5\", \"commentary\": \"設問3(1)，(3)の(i)と(k)，及び(4)の正答率は高く，ほかは低めであった。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(4)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄n，oに入れる適切な暗号の利用モードを，図6中の三つの利用モード(ECB/CBC/OFB)の中から選んで答える。複数ブロックの並列処理の可否に関する空欄。\", \"model_answer\": \"n：CBCモード　o：OFBモード\", \"commentary\": \"設問3(1)，(3)の(i)と(k)，及び(4)の正答率は高く，ほかは低めであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について，QサービスのクラッキングやX社自身の行為に対してQサービスの暗号化機能の効果が期待できないのは，Qサービスのどのような仕様によるものか，30字以内で述べる。\", \"model_answer\": \"鍵は，サーバごとに生成し，Qサービス内で管理される。\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図7中の下線⑤(フォルダごとにパスワード・鍵を割り当てる方式)について，一つの鍵を全ての機密フォルダで共有して利用する方法と比較した場合に，下線⑤の方法が優れている点を35字以内で具体的に述べる。\", \"model_answer\": \"鍵が危殆化しても，当該鍵が利用されるフォルダ以外には影響がない。\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(3)\", \"format\": \"記述\", \"prompt_summary\": \"下線⑥について，暗号化対象ファイルに関係するどのような情報が秘匿されないか，二つ挙げそれぞれ15字以内で答える。\", \"model_answer\": \"①ファイルの名称　②おおよそのファイルサイズ\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(4)\", \"format\": \"空欄穴埋め(数値)\", \"prompt_summary\": \"本文中又は図9中の空欄p〜tに入れる適切な数値を答える。数字16文字と同等以上の場合の数をもつ英数字パスワード文字数の算出。p〜sは整数，tは小数第2位を四捨五入し小数第1位まで求める。\", \"model_answer\": \"p：9　q：62　r：2（順不同）　s：31　t：8.9\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問5(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑦(マルウェア感染ファイルの拡散防止対策が不十分)について，指摘に対応するには図7の拡張機能をどのように修正すればよいか，修正内容を50字以内で具体的に述べる。\", \"model_answer\": \"暗号化フォルダに登録されたファイルは，復号した後で，マルウェアスキャンを行うようにする。\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問5(2)\", \"format\": \"記述\", \"prompt_summary\": \"下線⑧について，どのような場合にファイルが平文のままQサービスに保管され続けるのかを35字以内で具体的に述べ，さらにこの状況を防ぐための同期用FSの拡張機能の修正内容を30字以内で述べる。\", \"model_answer\": \"場合：利用者が，暗号化していないファイルをWebブラウザで登録した場合　修正内容：暗号化されていないバックアップのファイルを自動で削除する。\", \"commentary\": \"全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問6\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑨について，IPA“組織における内部不正防止ガイドライン”を参考に，Uさんがまとめた委託先に対する対策(技術的対策とは別のもの)を35字以内で述べる。\", \"model_answer\": \"委託先のデータ管理の実態を監査によって把握して監督する。\", \"commentary\": \"設問6は，委託先管理についての問題である。正答率は低かった。重要なデータを委託先に開示する場合には，守秘義務を含めた契約を委託先と締結するだけでなく，監査によって委託先のデータ管理の実態を把握し監督するなどの手法が有効である。\", \"low_accuracy\": true}], \"_source_file\": \"2015h27a_sc_pm2_p2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2015, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-14\"}, {\"paper_id\": \"2015h27h_sc_pm1\", \"problem_no\": 1, \"theme\": \"Webアプリの脆弱性検査技能試験を題材にしたHTTPヘッダインジェクションとセッションフィクセーション\", \"industry_setting\": \"情報システムの構築・運用・コンサルティングを提供する企業S社(Webアプリの脆弱性検査サービスを提供)\", \"exam_intent\": \"近年，インターネット回線からのサイバー攻撃による被害が，大々的に報道されるようになった。現在，Webアプリケーションソフトウェアを利用するサービス事業にとって，サイバー攻撃への対策は必須である。Webアプリケーションソフトウェアの開発者には，脆弱性を作り込まないように，既知の対策を実施することに加えて，攻撃者が悪意をもって操作をした場合でも，問題が起きないような設計と実装を行うことが求められる。本問では，よく知られた脆弱性であるHTTPヘッダインジェクション及びセッションフィクセーションを題材に，攻撃者の視点での攻撃方法を意識した，脆弱性の検出能力と，脆弱性への対策能力を問う。\", \"topics\": [\"HTTPヘッダインジェクション\", \"セッションフィクセーション\", \"secure属性\", \"セッションID\", \"Set-Cookieヘッダ\", \"クロスサイトスクリプティング\", \"Cookie Monster Bug\", \"URLエンコード\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"secure属性が設定されていないと，どの画面に遷移するときにセッションIDを盗聴されるリスクがあるか。遷移直後の画面を画面A〜Eから一つ選ぶ。\", \"model_answer\": \"画面B\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"secure属性が設定されていないと，セッションIDを盗聴されるリスクがある理由を40字以内で述べる。\", \"model_answer\": \"暗号化されないHTTP通信において，セッションIDが送信されるから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図7中の空欄aに入れる適切な文字列(検査コードの一部)をURLエンコード済の形式で答える。\", \"model_answer\": \"a：%0d%0a%0d%0a\", \"commentary\": \"設問2(1)は，正答率が低かった。改行コードを二つ続けるHTTPヘッダインジェクション攻撃に関する問題であったが，攻撃の仕組みを理解していないと思われる解答が多かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄b(この脆弱性を突いた攻撃と同様に任意のスクリプトをクライアント側で実行できる攻撃)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"b：ウ(クロスサイトスクリプティング)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の空欄c(ヘッダ出力用の関数やAPIが使用できない場合に開発者が自身で実装する処理)に入れる適切な処理を30字以内で具体的に述べる。\", \"model_answer\": \"・出力文字列に改行コードがあるとエラー画面を出力／・出力文字列の改行コード以降の文字列を削除\", \"commentary\": \"設問2(3)は，正答率が低かった。改行コードの処理に関して，具体的な対策内容を期待したが，そのような解答は少なかった。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄d，e(セッションフィクセーションの脆弱性が疑われる根拠となる図6のHTTPヘッダの行番号)に入れる適切な行番号を答える。\", \"model_answer\": \"d：09 又は 17(順不同)　e：27\", \"commentary\": \"設問3は，正答率が高かった。セッションフィクセーションの脆弱性や対策についてはよく理解されていたが，(1)のような少し実践的な問題については正答率が低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図9中の空欄f(攻撃用クエリ文字列に含まれる，攻撃者Jが取得したセッションIDの値)に入れる適切な字句を答える。\", \"model_answer\": \"f：01234\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図9の手順4，5について，利用者Kがログインした後，攻撃者Jが利用者Kになりすますことができる理由を，\\\"セッションID\\\"を含めて40字以内で述べる。\", \"model_answer\": \"攻撃者Jが取得したセッションIDで利用者Kにログインさせているから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の空欄g(ログイン後に画面Eから画面Cへ遷移する際のサーバ側処理で行うべきセッションフィクセーション対策)に入れる適切な対策を30字以内で述べる。\", \"model_answer\": \"新しいセッションIDによるセッションを開始する\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2015h27h_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2015, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-15\"}, {\"paper_id\": \"2015h27h_sc_pm1\", \"problem_no\": 2, \"theme\": \"運用担当者PCのマルウェア感染を題材にした情報漏えいインシデントの調査と対応\", \"industry_setting\": \"従業員数700名のシステムインテグレータL社\", \"exam_intent\": \"近年，標的型攻撃又は新しいタイプの攻撃と呼ばれる外部からの攻撃が，業種や企業規模を問わず仕掛けられている。これらの攻撃ではソーシャルエンジニアリングと未知のマルウェアを組み合わせることによって，防御システムを回避して攻撃者が侵入し，長期間にわたりひそかに情報の窃取や破壊行為を行う。このような攻撃による情報漏えいインシデントの調査においては，情報漏えいを防ぎながら，侵入経路及び被害の特定を行う必要があり，適切な調査及び対策の計画立案及び実施が重要である。本問では，運用担当者のPCへのマルウェア感染を題材に，未知のマルウェアによる情報セキュリティインシデントの調査及び対策を計画立案し，実施する能力を問う。\", \"topics\": [\"標的型攻撃\", \"未知のマルウェア\", \"C&Cサーバ\", \"プロキシサーバ\", \"URLブラックリスト\", \"ディジタルフォレンジックス\", \"ログ改ざん\", \"インシデント対応\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(このIPアドレスから当該C&Cサーバへの通信が発生していたことも確認できた)について，確認の具体的な方法を30字以内で述べる。\", \"model_answer\": \"FWのログで当該通信の記録を確認する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3中の空欄a〜c(調査で経由した機器や特定に用いた情報)に入れる適切な字句をそれぞれ10字以内で答える。\", \"model_answer\": \"a：FW　b：プロキシサーバ　c：MACアドレス\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図4中の下線②の試み(プロキシサーバを利用せずにC&Cサーバへ接続を試みる)がL社のPCからでは必ず失敗し，かつFWのログに記録されない理由を35字以内で述べる。\", \"model_answer\": \"DNSによる名前解決ができず，TCP/IP接続要求が出ないから\", \"commentary\": \"設問2は(1)，(2)共に正答率が低かった。ネットワーク構成を理解し，侵入及び漏えいの経路をあらかじめ想定しておくことは，インシデント対応だけでなくセキュリティ対策を考える上で重要である。ネットワーク上及びPC上でのマルウェアと侵入者の動きを具体的にイメージできるよう，ネットワーク及びコンピュータの動作原理並びにそれらに対する攻撃手法への理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③(この調査で明らかになったC&Cサーバへの通信方法を考慮した新たな遮断方法)について，遮断の具体的な方法を40字以内で述べる。\", \"model_answer\": \"プロキシサーバでC&Cサーバへの通信のURLをブラックリストに設定する。\", \"commentary\": \"設問2は(1)，(2)共に正答率が低かった。ネットワーク構成を理解し，侵入及び漏えいの経路をあらかじめ想定しておくことは，インシデント対応だけでなくセキュリティ対策を考える上で重要である。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図5中の下線④(最初のマルウェア感染後にファイル配信サーバから配信されたファイルの調査)は，どのような攻撃を想定したものか。想定した攻撃を30字以内で述べる。\", \"model_answer\": \"ファイル配信サーバからマルウェアを拡散する攻撃\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑤(不正操作の形跡がなくサービス停止できない3台のサーバ上で実行可能で効果の見込まれる対策)について，これら3台のサーバ上で実施すべき対策を20字以内で述べる。\", \"model_answer\": \"Vさんの利用者IDの無効化\", \"commentary\": \"設問3(2)は，正答率が低かった。不正アクセスされる可能性はあるが，不正操作が行われた形跡はないサーバにおける，サービス停止が業務に大きく影響する場合の対策を問う問題であったが，サービス停止を伴う対策，又は実施までに時間が掛かる対策が解答として散見された。インシデント対応では，業務影響を抑えながら速やかに被害の拡大を食い止める対策を立案・実施することが重要であることを理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑥(3台のサーバ上のログに対する改ざんの痕跡が残っていないことの確認)について，ログの改ざんの痕跡を確認する方法を30字以内で述べる。\", \"model_answer\": \"ログ管理サーバに保存されているログとの比較\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2015h27h_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2015, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-16\"}, {\"paper_id\": \"2015h27h_sc_pm1\", \"problem_no\": 3, \"theme\": \"衣料品ショッピングサイトへの不正ログインを題材にしたパスワード攻撃とその対策\", \"industry_setting\": \"従業員数300名の衣料品販売企業Z社(会員数約400万人のショッピングサイトを運営)\", \"exam_intent\": \"近年，ミドルウェアの脆弱性やWebアプリケーションソフトウェアの脆弱性を狙った攻撃被害の他に，Webサイトへの不正ログインの被害が多数報告されるようになった。こうしたWebサイトへの不正ログインに対してセキュリティ対策を講じるには，Webサイト管理者と利用者のそれぞれが脅威を正しく理解する必要がある。本問では，衣料品のショッピングサイトにおける不正アクセスを題材に，パスワード攻撃に対する正しい理解と，その脅威に対して適切な対策を講じる能力を問う。\", \"topics\": [\"パスワード攻撃\", \"リバースブルートフォース攻撃\", \"パスワードリスト攻撃\", \"レインボーテーブル\", \"ソルト\", \"SHA-256\", \"アカウントロック\", \"パスワード総当たり攻撃\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図2中の下線①(ソルトとパスワードを結合したものをSHA-256でハッシュ化して保存)について，ソルトを用いることによって防ぐことができる攻撃方法を60字以内で具体的に述べる。\", \"model_answer\": \"多くの文字列のハッシュ値を計算したものと，漏えいしたファイル中のハッシュ値を突合し，パスワードを推測する攻撃\", \"commentary\": \"設問1は正答率が低かった。ハッシュ化だけが施されたパスワードファイルに対する具体的な攻撃方法を問う問題であったが，ソルトなどの対策やレインボーテーブルを用いた攻撃が成功しない理由などを述べる解答が多かった。一般的な知見で解答するのではなく，本文に記載された事例に即して解答してほしかった。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄a(改修後のハッシュ値保存に必要な1アカウント当たりのバイト数)に入れる適切な数値を答える。\", \"model_answer\": \"a：32\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(空欄穴埋め)\", \"prompt_summary\": \"図3中の空欄b(方法(イ)で設定するしきい値の対象)に入れる適切な字句を30字以内で述べる。\", \"model_answer\": \"b：単位時間当たりの同一IPアドレスからのログイン試行数\", \"commentary\": \"設問2(2)と(3)は，正答率が高かった。パスワード攻撃の検知について問う問題であったが，パスワード攻撃手法ごとの特徴や，その検知方法ついて，よく理解されているようであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中及び図4中の空欄c(方法(ウ)で検知するパスワード攻撃の送信元)に入れる適切な字句を15字以内で答える。\", \"model_answer\": \"c：多数のIPアドレス\", \"commentary\": \"設問2(2)と(3)は，正答率が高かった。パスワード攻撃手法ごとの特徴や，その検知方法ついて，よく理解されているようであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図4中の空欄d〜f(パスワードの全組合せ数や攻撃成功までの所要日数)に入れる適切な数式又は実際の値を答える。\", \"model_answer\": \"d：10^6　e：200　f：80^8\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②(他のサイトで使っていないパスワードを設定してもらうよう注意喚起)は，どのような攻撃による被害を避けるための注意喚起か。攻撃方法を45字以内で具体的に述べる。\", \"model_answer\": \"他のサイトから流出した利用者IDとパスワードの組合せによるパスワード攻撃\", \"commentary\": \"設問4は正答率が高かった。パスワードリスト攻撃の具体的な方法を問う問題であったが，Webサイトに対するパスワード攻撃は，マスコミに取り上げられることも多かったので，理解が進んでいると思われる。\", \"low_accuracy\": false}], \"_source_file\": \"2015h27h_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2015, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-17\"}, {\"paper_id\": \"2015h27h_sc_pm2\", \"problem_no\": 1, \"theme\": \"連休明けの標的型攻撃によるウイルス感染と、ウイルス対策の見直し・Webフォームによる問合せ受付の設計\", \"industry_setting\": \"従業員数500名のシステム開発会社(N社)\", \"exam_intent\": \"標的型攻撃の事例として，就職活動者を装い，採用担当として公開されている問合せ用メールアドレス宛てにウイルスを含むファイルを送り付ける手口が報告されている。そういった手口に対抗するためには，ウイルス対策について有効性を常に確認し継続的に見直していくことが重要である。本問では，休暇明けのウイルス感染を題材に，システム管理者が実施するウイルス対策能力，及びメールによる問合せ受付の代替としてのWebフォームによる問合せ受付機能の設計能力を問う。\", \"topics\": [\"標的型攻撃\", \"ダウンローダ型マルウェア\", \"C&Cサーバ\", \"DNSSEC\", \"オープンリゾルバ\", \"SMTP不正中継防止\", \"URLフィルタリング\", \"ウイルス定義ファイル\", \"Webフォーム(入力値検証)\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄a。DNSサーバのDNS拡張仕様で、公開鍵暗号方式によるディジタル署名のDNSレコードへの付加と検証を可能にする仕組みを英字8字以内で答える。\", \"model_answer\": \"a：DNSSEC\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄b、c。b：DNSサーバがインターネットからの再帰的名前解決問合せを拒否して踏み台にされないようにする=何リゾルバか。c：外部メールサーバでSMTPの何の中の宛先情報を用いて不正中継防止設定を行うか。各10字以内。\", \"model_answer\": \"b：オープン（リゾルバ）　c：エンベロープ\", \"commentary\": \"設問1(2)のbは，正答率が低かった。オープンリゾルバを踏み台にする攻撃事例もあるので，DNSの仕組みと設定をよく理解しておいてほしい。設問1(2)のcは，正答率が低かった。不正中継防止を確実に行うために，SMTPの仕組みをよく理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄d。外部メールサーバが、宛先メールアドレスのドメイン名が何であるメールを内部メールサーバに転送するか、適切なドメイン名を答える。\", \"model_answer\": \"d：n-sha.co.jp\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3中の空欄e。外部メールサーバから転送されたメールのSMTPウイルススキャンで、検出時に宛先ではなく送信者アドレスに通知すると迷惑メールになり得るため通知しない対象=何か。15字以内。\", \"model_answer\": \"e：送信者メールアドレス\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①（初期設定用ネットワークからの接続サイトを制限する設定）について、プロキシサーバのURLフィルタリング機能に追加すべき設定内容を45字以内で具体的に述べる。\", \"model_answer\": \"脆弱性修正プログラム及びウイルス定義ファイルを提供するサイトに制限する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②（先頃、改善されたN社の環境を活用しマルウェアXを駆除した）について、改善されたN社の環境を活用して実施した内容を45字以内で具体的に述べる。\", \"model_answer\": \"初期設定用ネットワークに接続し，W社の駆除ツールをダウンロードして適用した。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③（プロキシサーバのサーバ管理者登録ブラックリストに設定を追加して中継サーバ経由アクセスを遮断する）について、追加する設定の内容を30字以内で具体的に述べる。\", \"model_answer\": \"中継サーバのサーバ名を部分一致でマッチさせる。\", \"commentary\": \"設問4(2)は，正答率が低かった。パターンマッチングの方式を誤った解答が目立った。パターンマッチングは，URLフィルタリングだけでなく，ログ分析でも使用される。パターンマッチングについて学習しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④（メールについて追加の調査と対処を行った）について、調査した内容と対処した内容を併せて55字以内で述べる。（感染原因が採用/広報宛ての同報メールである点を踏まえる）\", \"model_answer\": \"Gさん以外の広報グループのメンバに届いたメールを調査し，マルウェアXを含むメールを削除した。\", \"commentary\": \"設問4(3)は，ウイルス感染が同報メールによるものであることを理解していない解答が散見された。同報メールによってウイルス感染が発生した場合の，調査及び対処の範囲を理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(4)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑤（図3中の結果の通知条件を変更した）について、変更した内容を25字以内で述べる。\", \"model_answer\": \"スキャン不能の場合も通知するようにした。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑥（D部長の指示に従いウイルス対策集中管理ソフトの活用方法を検討）について、E主任とFさんが検討した活用方法を二つ挙げ、それぞれ50字以内で述べる。\", \"model_answer\": \"①1週間を超えてフルスキャンが実行されないPCを指定して，フルスキャンを実行させる。②ウイルス定義ファイルが更新されないPCを指定して，ウイルス定義ファイルを更新させる。（別解：アップロードされるウイルス感染情報を基に感染したPCを特定し，ウイルスを駆除する。）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問6(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑦（採用問合せ用Webフォームを悪用されるおそれがある）について、連絡用メールアドレスとお問合せ内容に何を入力すれば悪用できるかを、それぞれ20字以内で答える。\", \"model_answer\": \"連絡用メールアドレス：攻撃対象のメールアドレス　お問合せ内容：誘導するWebサイトのURL\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問6(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図11中の空欄f。図10のreplaceAll処理（http://・https://を除去）を回避してクリック可能なURLとして表示させてしまう入力文字列の先頭部分を一つ挙げ、英字及び記号15字以内で答える。\", \"model_answer\": \"f：hhttp://ttp（別解：hhttp://ttps、hhttps://ttp、hhttps://ttps のいずれか）\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2015h27h_sc_pm2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2015, \"season\": \"春\", \"part_label\": \"午後II\", \"uid\": \"pm-18\"}, {\"paper_id\": \"2015h27h_sc_pm2\", \"problem_no\": 2, \"theme\": \"製造業における製造装置のLAN接続、LAN分離とファイル転送方式、協力会社との情報共有システム(Kサーバ)のPKIによる端末認証設計\", \"industry_setting\": \"金属製品製造会社(J社)の主力工場(K工場)\", \"exam_intent\": \"製造装置，医療機器などには，汎用OSを利用しているにもかかわらず，脆弱性修正プログラムを適用できない機器が存在している。これらの機器は，脆弱性の存在を前提として稼働を続けなければならない。このような状況で，個々の業務の状況に応じて安全な稼働を実現するための対策を決定することが求められている。さらに，近年の製造業者及び医療機関においては，他の組織とのネットワーク接続を迫られている。このようなネットワークを活用して，安全で使いやすいシステムを構築することがセキュリティ技術者に対して与えられた課題である。本問では製造業における製造装置のLAN接続を題材として，これらの課題について対策を検討する能力を問う。\", \"topics\": [\"汎用OSの脆弱性\", \"LAN分離\", \"マルウェア感染方法(脆弱性攻撃型/ファイルばらまき型)\", \"USBメモリ方式/中継PC方式\", \"SANの単方向レプリケーション\", \"PKI(CA/RA/IA)\", \"クライアント証明書による端末認証\", \"証明書の失効(CRL)\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表4中の空欄a。中継PC方式が脆弱性攻撃型マルウェアに対して「製造装置への感染を防止できない」とした理由を、マルウェアの感染方法を踏まえて75字以内で具体的に述べる。\", \"model_answer\": \"事務系LANへの接続時にマルウェアに感染した転送用PCを，その状態のままで製造系LANへ接続すると，製造装置へマルウェアの感染が広がる。\", \"commentary\": \"設問1及び設問3は，LANを分離した上で安全にデータを送受信する仕組みについて出題した。このような仕組みの設計に当たっては，脅威を洗い出した上で，それらの脅威に直面した場合に情報資産を守れるのかを検討する必要がある。各種の対策が脅威に対して有効かどうか評価する能力を身につけてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表6中の空欄b、c、d。b：他人による接続端末の利用を防止するため、離席する場合にどうするよう指導するか。c：パスワードはどのようなものを使用するよう指導するか。d：他人にパスワードをどのように管理するよう指導するか。各10字以内。\", \"model_answer\": \"b：操作禁止状態に　c：他人が推測できない　d：知られないように\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表6中の空欄e。接続端末に関する脆弱性が公表された場合に、速やかにどうするか（脆弱性対策）を35字以内で具体的に述べる。\", \"model_answer\": \"影響を評価し，必要であれば脆弱性修正プログラムを適用する\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表7中の空欄f、g。図4の構成で、情報共有系LANが脆弱性攻撃型マルウェア・ファイルばらまき型マルウェアそれぞれについて製造装置への感染を防止できる理由を、fは40字以内、gは60字以内で述べる。\", \"model_answer\": \"f：情報共有系LANと製造系LANの間で通信が成立することがない。　g：情報共有系LAN上の機器へ実行形式ファイルが書き込まれても，製造系LANにファイルが転送されることがない。\", \"commentary\": \"設問1及び設問3は，LANを分離した上で安全にデータを送受信する仕組みについて出題した。脅威を洗い出した上で，情報資産を守れるのかを検討し，対策が脅威に対して有効かどうか評価する能力を身につけてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①（実施規程に示されたKサーバを利用する接続端末の限定は、アクセス元IPアドレスによる端末認証では実現できない）について、Pさんがそう考えた根拠を二つ挙げ、それぞれ50字以内で述べる。\", \"model_answer\": \"①IPアドレスが動的に割り当てられるインターネット回線を利用している協力会社に対応できない。②プロキシサーバを利用している協力会社の場合，社内の接続端末の個別識別ができない。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"表8中の空欄h～l。証明書の発行・利用に関する役割の責任をもつ組織を、協力会社・K工場・J社本社の中から選ぶ。h：Subject一意性の確保、i：発行可否の判断、j：発行者としてのディジタル署名付与、k：接続端末が提示した証明書の有効性検証、l：CRLの発行。\", \"model_answer\": \"h：K工場　i：K工場　j：J社本社　k：K工場　l：J社本社\", \"commentary\": \"設問4は，Webサーバへアクセスする端末の認証に関する問題である。(2)はPKIの基本とも言える内容である。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"接続端末用の証明書発行の際、鍵ペアを利用する主体が作成するのが原則であるのに、K工場で鍵ペアを作成してもよい理由を35字以内で述べる。\", \"model_answer\": \"Kサーバへのアクセスだけに使用する鍵ペアだから\", \"commentary\": \"(3)及び(4)では，証明書の有効性検証では端末がもっている秘密鍵（鍵ペア）の正当性を検証していることを理解していない解答が目立った。これらを理解できていなければ，PKIを応用したシステムを設計できないので確実に理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②（協力会社がKサーバの利用を取りやめる申請をした場合）以外に、証明書の失効処理が必要な場合を二つ挙げ、それぞれ30字以内で述べる。\", \"model_answer\": \"①証明書に対応した秘密鍵の漏えいが疑われる場合　②接続端末を廃棄する場合\", \"commentary\": \"(3)及び(4)では，証明書の有効性検証では端末がもっている秘密鍵（鍵ペア）の正当性を検証していることを理解していない解答が目立った。これらを確実に理解してほしい。\", \"low_accuracy\": false}], \"_source_file\": \"2015h27h_sc_pm2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2015, \"season\": \"春\", \"part_label\": \"午後II\", \"uid\": \"pm-19\"}, {\"paper_id\": \"2016h28a_sc_pm1\", \"problem_no\": 1, \"theme\": \"組込み機器(LTE対応ルータ)を利用した工場遠隔監視システムのセキュリティ対策とインシデント対応\", \"industry_setting\": \"製造事業者向けの機械・制御用コンピュータを製作販売するC社(従業員1,200名)\", \"exam_intent\": \"IoT（Internet of Things）への取組みが進み，モノとモノがつながることによるリスクの増大が予想されている。本問では，IoTへのセキュリティ対策を進める上で基本となる，組込み機器のセキュリティ対策に焦点を当て，組込み機器に発生しがちな情報セキュリティインシデントを踏まえ，インシデント対応やセキュリティ対策に必要となる知識，能力を問う。\", \"topics\": [\"IoT/組込み機器\", \"IPsec\", \"IKEv2\", \"SSH\", \"辞書攻撃\", \"公開鍵認証\", \"TCP Wrapper\", \"ディジタル署名\"], \"questions\": [{\"setmon\": \"設問1a\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"IPsecでルータ間の通信を全て暗号化する際に使用する通信モードを解答群から選ぶ。\", \"model_answer\": \"エ（トンネル）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1b\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"片側ルータのIPアドレスが動的に変わる環境でIKEv1が使用する必要のあるモードを解答群から選ぶ。\", \"model_answer\": \"ア（アグレッシブ）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)c\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"netstatの実行結果から、SSHサービスに不正ログインしている送信元のグローバルIPアドレスを答える。\", \"model_answer\": \"x1.x2.x3.x4\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)d\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"攻撃者がSSHのポートフォワード機能を使ってSMTPで電子メールを転送している宛先のグローバルIPアドレスを答える。\", \"model_answer\": \"y1.y2.y3.y4\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①「SSHのログイン認証をパスワード強度に依存しない方式に設定変更した」について、実施したSSHの設定変更を30字以内で述べる。\", \"model_answer\": \"パスワード認証を無効化し，公開鍵認証を使用する。\", \"commentary\": \"設問2(2)は、パスワード強度に依存しないSSHのログイン認証方式について問う問題である。正答率は低かった。辞書攻撃への対策には、公開鍵認証を有効にすることに加えて、パスワード認証を無効化する設定が必要であるということを理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)e\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"監視端末を利用した場合だけSSHサービスにアクセスできる仕様を、TCP Wrapperを使って実現するための設定内容を30字以内で述べる。\", \"model_answer\": \"送信元IPアドレスを監視端末のIPアドレスに限定\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②「SSHのホスト鍵が同一モデルで全て同じになっている」脆弱性を悪用する攻撃手法を20字以内で述べる。\", \"model_answer\": \"中間者攻撃による通信内容の盗聴\", \"commentary\": \"設問3(2)は、SSHのホスト鍵が組込み機器の同一モデルで全て同じである場合に、同じホスト鍵を使ってどのような攻撃が行われるかについて問う問題である。ホスト鍵は、SSHサーバの真正性を担保するものであるが、その目的を理解していない解答が多く見受けられた。同一のホスト鍵が使われた場合、SSHサーバのなりすましに気付くことができないので、中間者攻撃による通信内容の盗聴や改ざんが行われてしまうということを理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③「イメージファイルが改ざんされていないか検証できるようにする」について、作成時と更新時に行うディジタル署名関連の処理を、使用する鍵の種類を明示した上でそれぞれ35字以内で述べる。\", \"model_answer\": \"作成時：秘密鍵を使用してイメージファイルにディジタル署名を付与する。／更新時：公開鍵を使用してイメージファイルのディジタル署名を検証する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について、イメージファイルを暗号化しても攻撃者が復号のための鍵を入手する方法を35字以内で具体的に述べる。\", \"model_answer\": \"LTEルータにログインしてファイルシステムの中から見つける。\", \"commentary\": \"設問3(4)は、イメージファイルを復号するための鍵を、攻撃者がどのように入手するかについて問う問題である。平文の状態の鍵を探すといった攻撃側の視点を踏まえて対策が立案できるようになることを期待したい。\", \"low_accuracy\": false}], \"_source_file\": \"2016h28a_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2016, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-20\"}, {\"paper_id\": \"2016h28a_sc_pm1\", \"problem_no\": 2, \"theme\": \"ソフトウェア開発におけるバッファオーバフロー(BOF)脆弱性の仕組みと対策\", \"industry_setting\": \"ディジタル機器の開発及びソフトウェア受託開発を行うV社(従業員400名)\", \"exam_intent\": \"依然として報告件数が減らないバッファオーバフロー脆弱性についての問題である。状況設定では開発ベンダとしているが，ソフトウェア開発業務に従事していなくても，今日の情報セキュリティスペシャリストならば，単なるキーワードの理解だけではなく，そのメカニズムと具体的対策も知っておくべきものである。本問では，それらを問う問題と共に，ソフトウェア開発における脆弱性対策全般についての取組みも問う。\", \"topics\": [\"バッファオーバフロー racy\": false}, {\"setmon\": \"設問2(1)c\", \"format\": \"記号選択\", \"prompt_summary\": \"管理PCで行うプログラム起動禁止設定の対象として、(i)OS管理用コマンド、(ii)攻撃用プログラム、(iii)マルウェアZの適切な組合せを選ぶ。\", \"model_answer\": \"オ（(ii)）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"プログラム名指定とハッシュ値指定の両方で起動禁止設定を行っても攻撃用プログラムの起動を防ぎきれないのはどのような攻撃用プログラムの場合かを30字以内で具体的に述べる。\", \"model_answer\": \"プログラムの内容を変え，かつ，プログラム名を変える場合\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について、プロキシ2のログだけでは送信元PCが特定できない理由を30字以内で述べる。\", \"model_answer\": \"送信元IPアドレスがプロキシ1のIPアドレスとなるので\", \"commentary\": \"設問3(1)は、プロキシサーバのログに関する問題である。正答率は低かった。ログから送信元PCを特定できない理由について、他者に誤解なく伝わるように、必要な情報を正確に記述してほしかった。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)d\", \"format\": \"記号選択\", \"prompt_summary\": \"プロキシ1で追加しプロキシ2でログ出力する、送信元PCを特定できるHTTPヘッダフィールドを解答群から選ぶ。\", \"model_answer\": \"オ（X-Forwarded-For）\", \"commentary\": \"設問3(2)は、プロキシサーバが処理するHTTPヘッダに関する問題である。正答率は低かった。広く使われているHTTPプロトコルについての知識を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について、プロキシ認証に対応したマルウェアがどのようにして認証を成功させるかを50字以内で具体的に述べる。\", \"model_answer\": \"Webブラウザからプロキシサーバへの通信を盗聴して認証情報を取得し，プロキシサーバに送信する。\", \"commentary\": \"設問4(1)は、プロキシサーバの認証機能を通過する最新のマルウェアに関する問題である。正答率は低かった。認証機能を通過する仕組みについて、他者に誤解なく伝わるように、必要な情報を正確に記述してほしかった。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③について、業務に必要かつ安全なURLは許可しそれ以外は遮断するために、プロキシ2のURLフィルタリング機能及びカテゴリ単位フィルタリング機能をそれぞれどのように設定すべきかを各40字以内で具体的に述べる。\", \"model_answer\": \"URLフィルタリング機能：ホワイトリストに業務に必要かつ安全であることを確認したURLを設定する。／カテゴリ単位フィルタリング機能：業務に不要であるカテゴリを遮断する。\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2016h28a_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2016, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-22\"}, {\"paper_id\": \"2016h28a_sc_pm2\", \"problem_no\": 1, \"theme\": \"ICカードとPKIを用いた共通利用者認証システム(Jシステム)の構築・運用設計\", \"industry_setting\": \"全国でマンションの開発・メンテナンスを手掛ける中堅の不動産デベロッパD社グループ(持株会社と4子会社)\", \"exam_intent\": \"パスワードを用いた利用者認証の仕組みには限界があり，IC カードやOTP トークン，携帯電話を用いた利用者認証の仕組みがますます重要になってきた。これらの仕組みにおいては，公開鍵暗号技術をはじめとする各種の暗号技術，認証技術が幅広く採用され，利用されている。本問では，利用者認証システムの構築を題材に，IC カード，PKI，暗号及び認証についての基礎的知識と，これらの技術を利用したシステムの構築及び運用についての設計能力を問う。\", \"topics\": [\"ICカード認証\", \"PKI\", \"公開鍵暗号\", \"エンティティ認証プロトコル\", \"デジタル署名\", \"証明書失効(CRL/OCSP)\", \"サーバ証明書/TLS\", \"CRYPTREC電子政府推奨暗号リスト\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄a〜c,k,lに入る適切な字句を解答群から記号で選ぶ。パスワード認証で確認するもの/認証カード認証で確認するもの/PIN併用時の認証方式/認証成立に必要な鍵の状態/CRL以外の失効情報提供方式。\", \"model_answer\": \"a:ウ(記憶) b:オ(所持) c:ス(複数要素) k:エ(危たい化) l:イ(OCSP)\", \"commentary\": \"設問1は基礎的な暗号技術及び認証技術について問う問題である。正答率は高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について、R主任が想定している不適切な行為(認証カードとPINを組み合わせても効果が望めない行為)を35字以内で具体的に述べる。\", \"model_answer\": \"認証対象者が，認証カードとPIN を他人に又貸しして使わせる行為\", \"commentary\": \"設問1は基礎的な暗号技術及び認証技術について問う問題である。正答率は高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文及び図2中の空欄d,e,fに入る適切な字句を解答群から記号で選ぶ。エンティティ認証プロトコルにおける検証者B/要求者Aの対応先と、送信されるf(利用者証明書)。\", \"model_answer\": \"d:ウ(事業用システム) e:カ(認証対象者) f:ク(利用者証明書)\", \"commentary\": \"設問1は基礎的な暗号技術及び認証技術について問う問題である。正答率は高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線②について、CRYPTRECの\\\"電子政府推奨暗号リスト\\\"(平成28年3月29日版)に含まれている暗号技術(ハッシュ関数を含む)を解答群から全て選ぶ。\", \"model_answer\": \"ア(AES)，イ(Camellia)，エ(ECDSA)，キ(RSA-OAEP)，ク(SHA-256)，ケ(SHA-512)\", \"commentary\": \"設問1は基礎的な暗号技術及び認証技術について問う問題である。正答率は高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(5)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図2中の空欄g〜jに入る適切な式(署名生成・署名検証の対象データや鍵)を解答群から記号で選ぶ。\", \"model_answer\": \"g:イ(Ks) h:オ(Ra||Rb||Sn) i:ア(Kp) j:セ(X)\", \"commentary\": \"設問1は ムの利用の認可が得られないから\", \"commentary\": \"設問4はICカードを利用した利用者認証システムの設計及び効果について問う問題である。正答率は低かった。各種セキュリティ技術の特徴及び限界をよく理解し，条件・状況に照らして最適なセキュリティ技術及び適用方法を選び，最適なシステムを構築及び運用を設計できる人材になるように努めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"方式Bの方が非機能要件に適合している理由を表3の内容に基づいて二つ挙げ、それぞれ40字以内で具体的に述べる。\", \"model_answer\": \"①事業部門は管理責任者の役割を担わず，認証カードの配布・回収を担当しないから ②プロジェクトをまたいで認証カードが共用され，配布・回収の回数が少ないから\", \"commentary\": \"設問4はICカードを利用した利用者認証システムの設計及び効果について問う問題である。正答率は低かった。各種セキュリティ技術の特徴及び限界をよく理解し，条件・状況に照らして最適なセキュリティ技術及び適用方法を選び，最適なシステムを構築及び運用を設計できる人材になるように努めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑦(認証カードを入退室カードとしても利用する措置)について、見つかった不正(認証カードの置き忘れ・現場事務所での保管による他人利用)に対してこの措置が効果をもつと判断した根拠を40字以内で述べる。\", \"model_answer\": \"入退室に必要なため，認証カードの置き忘れ及び現場事務所内での保管がなくなる。\", \"commentary\": \"設問4はICカードを利用した利用者認証システムの設計及び効果について問う問題である。正答率は低かった。各種セキュリティ技術の特徴及び限界をよく理解し，条件・状況に照らして最適なセキュリティ技術及び適用方法を選び，最適なシステムを構築及び運用を設計できる人材になるように努めてほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2016h28a_sc_pm2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2016, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-23\"}, {\"paper_id\": \"2016h28a_sc_pm2\", \"problem_no\": 2, \"theme\": \"頻発する脆弱性(SQLインジェクション/bashのShellshock)への技術面・運用面での組織的対応\", \"industry_setting\": \"従業員3,000名の製造会社A社(経営管理本部のデータセンタ部と3つの製品本部からなる)\", \"exam_intent\": \"本問は，情報システムを運用する組織における脆弱性対応に関する問題である。昨今，広く利用されている機器において重大な脆弱性が連続的に報告されることがあり，機器を利用する側としては，緊急性を要する脆弱性にどのように対処するのかが問われるケースが増えてきた。個別の脆弱性に場当たり的に対処するのでは非効率であり，脆弱性対応を行う作業者の負荷も考慮し，迅速かつ的確に脆弱性に対応する必要性が増している。本問では，脆弱性が及ぼす影響を技術的に判断する能力，及び頻発する脆弱性への組織的対応方法に関する知識を問う。\", \"topics\": [\"CVSS基本値\", \"リスクレベル評価\", \"bash脆弱性(Shellshock)\", \"SQLインジェクション\", \"CGI/環境変数\", \"WAF(オンプレミス型/クラウド型)\", \"DNS CNAMEレコード\", \"クロスオリジンリクエスト/CORS(Access-Control-Allow-Origin)\", \"プロキシサーバ悪用\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①について、公開Webサーバに対するX脆弱性(CV
