内で具体的に述べる。\", \"model_answer\": \"パス名を送信しないという仕様\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③（複合機用メールアドレスを詐称するメール対策としての外部メールサーバ設定変更）について、変更箇所（表2中の字句で10字以内）と変更内容（30字以内）を答える。\", \"model_answer\": \"変更箇所: ブラックリスト3 ／ 変更内容: scanner@u-sha.co.jp を登録する。\", \"commentary\": \"設問4変更内容では，エンベロープとメールヘッダの違いを理解していない解答が散見された。SMTPの仕組み及び電子メールの構造は，偽装した電子メールへの対策を行う上で基本となるので，よく理解しておいてほしい。\", \"low_accuracy\": false}], \"_source_file\": \"2016h28h_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2016, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-26\"}, {\"paper_id\": \"2016h28h_sc_pm1\", \"problem_no\": 3, \"theme\": \"スマートフォンアプリのサーバ証明書検証試験と、検証不備を用いた中間者攻撃\", \"industry_setting\": \"ECサービス会社S社（従業員100名、ショッピングサイトと専用スマホアプリを開発）\", \"exam_intent\": \"スマートフォンアプリケーションが増加している中，各種の脆弱性が見つかっており，その中でもサーバ証明書の検証不備の脆弱性は多い。これは，サーバ証明書を，その役割を正しく認識せずに，単に暗号化通信を行うために使用していることが原因だと考えられる。本問では，スマートフォンアプリケーションの試験を題材に，サーバ証明書の検証不備に焦点を当て，検証不備を確認するための試験方法及び試験環境を設計する能力，並びにサーバ証明書の検証不備を用いた中間者攻撃についての理解を問う。\", \"topics\": [\"サーバ証明書の検証不備\", \"HTTP over TLS（HTTPS）\", \"商用認証局・プライベート認証局\", \"サブジェクトのコモンネーム検証\", \"有効期間検証\", \"中間者攻撃（MITM）\", \"無線LANアクセスポイント（SSID・事前共有鍵）\", \"検証試験環境設計（DNS/DHCP）\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表1・表2の空欄aに入る、試験用DNSサーバでAレコードの名前解決元となるFQDNを持つ構成要素を、図1または図3中から選び答える。\", \"model_answer\": \"Sサーバ\", \"commentary\": \"設問1は，全体的に正答率は高かったが，(1)と(2)については，Sシステムの構成とサーバ証明書の検証試験環境の対応を理解していない解答が散見された。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表1の空欄bに入る、名前解決先のIPアドレスを持つ構成要素を、図1または図3中から選び答える。\", \"model_answer\": \"試験用Webサーバ\", \"commentary\": \"設問1は，全体的に正答率は高かったが，(1)と(2)については，Sシステムの構成とサーバ証明書の検証試験環境の対応を理解していない解答が散見された。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2の項番2（有効期間内でないことの検出）で、試験用証明書に設定する有効期間の終了（空欄c）を15字以内で答える。\", \"model_answer\": \"試験の実施よりも前の日時\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表2の試験でSアプリが試験項目どおりに動作している場合の期待される結果（空欄d）を、本文中または図表中の字句を用いて30字以内で具体的に述べる。\", \"model_answer\": \"Sアプリがサーバ認証エラー画面を表示する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"表4の空欄e～gに入る、中間者攻撃が成功するサーバ証明書を、表3中から全て選び証明書番号で答える（e:発行者・CN両方の検証不備あり、f:発行者のみ不備、g:CNのみ不備）。\", \"model_answer\": \"e: 1，2，3，4 ／ f: 3 ／ g: 1\", \"commentary\": \"設問2は，(1)eと(2)の正答率が低かった。(1)eについては，中間者攻撃が成功するサーバ証明書として，プライベート認証局で発行されたサーバ証明書だけを選んだ解答が散見された。サーバ証明書の検証不備の状況によっては，商用認証局が発行したサーバ証明書でも中間者攻撃が成功することを理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について、攻撃者がW-APの設定をどのように細工すると、公衆無線LAN利用者のスマートフォンを自動的にW-APに接続させられるか、W-APの設定上の細工を45字以内で具体的に述べる。\", \"model_answer\": \"SSID，暗号化方式と事前共有鍵に，公衆無線LANで使用されているものを設定する。\", \"commentary\": \"設問2(2)については，無線LANアクセスポイントへの接続の仕組みを理解していない解答が散見された。\", \"low_accuracy\": true}], \"_source_file\": \"2016h28h_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2016, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-27\"}, {\"paper_id\": \"2016h28h_sc_pm2\", \"problem_no\": 1, \"theme\": \"CSIRT(A社IRT)の構築とインシデントハンドリングの改善、及びセキュリティ設計の見直し\", \"industry_setting\": \"従業員数3,000名の独立系ソフトウェア開発会社(A社)\", \"exam_intent\": \"近年，公共機関，金融機関を中心にCSIRTを設立する組織が急増している。インシデントハンドリングは，CSIRTの主要な機能の一つと言える。多くの組織では，CSIRTを設立する以前から，情報システム部門などがインシデントハンドリングに類する活動を行っているが，組織内の役割や権限などが不明確であるため，有効に機能していないケースも散見される。そのような組織では，CSIRT設立時に，既存のインシデントハンドリングのどのような点を改善するのかを明確にすることが重要である。本問は，CSIRTの構築とセキュリティ設計を題材に，インシデントハンドリングの問題点を検出して改善する能力，及び脆弱性情報に関する評価能力を問う。\", \"topics\": [\"CSIRT\", \"インシデントハンドリング\", \"トリアージ\", \"標的型攻撃メール\", \"リバースブルートフォース攻撃\", \"運用管理セグメント\", \"脆弱性情報ハンドリング\", \"CVSS\", \"攻撃元区分(AV)\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表1(A社IRTの運用手順)の空欄aに入る、トリアージでA社IRTが決定すべきことを10字以内で答える。\", \"model_answer\": \"対応の要否\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2及び本文中の空欄bに入る、A社IRTの現状を踏まえて不明確となっている事柄を20字以内で答える。\", \"model_answer\": \"報告すべきインシデントの範囲\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(表1の対応指示をA社IRTが直接行えるようにした)改善策の目的を40字以内で述べる。\", \"model_answer\": \"インシデントがA社全体に与える影響度に基づいた対応を指示するため\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"下線②について、運用管理セグメントを新設することで、現状では防げないがどのような攻撃に対処できるようになるか、攻撃のシナリオを70字以内で具体的に述べる。\", \"model_answer\": \"IT部のOA用PCに攻撃メールが送信され，PCがマルウェアに感染し，起動したマルウェアがサーバLANに不正アクセスする攻撃\", \"commentary\": \"設問3は正答率が低かった。(1)は，運用管理セグメントを新設すれば防げるが，現状の構成では防げない具体的な攻撃のシナリオを問うたが，攻撃のシナリオが不明確なままOA用PCがマルウェアに感染するという状況だけを説明した解答や，運用管理セグメントを新設しても防げない攻撃のシナリオについての解答が散見された。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③について、連続した認証失敗回数のカウントに加え、リバースブルートフォース攻撃も検知できる新たな検知方法を40字以内で具体的に述べる。\", \"model_answer\": \"IT部運用チームのメンバのLDAP ID以外によるログイン要求の検知\", \"commentary\": \"設問3は正答率が低かった。(2)は，リバースブルートフォース攻撃の検知方法を問うたが，A社のLDAPサーバの運用管理への考慮がない解答や，単にリバースブルートフォース攻撃を説明した解答が散見された。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"図5の課題1について、脆弱性情報ハンドリングにおいて各部署の情報機器の現状が示された構成管理情報を活用することによる効果を35字以内で述べる。\", \"model_answer\": \"A社IRTが収集すべき脆弱性情報を把握するため\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"A社IRTが各部署の構成管理情報を把握しておくと、インシデントハンドリングにおいてどのように有効活用できるかを45字以内で具体的に述べる。\", \"model_answer\": \"A社IRTが，各部署のインシデント発生時や対策時の，影響範囲の特定に活用する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"図5の課題2について、下線④の各部署の取組みとどのように連携して対応すべきか、連携方法を30字以内で述べる。\", \"model_answer\": \"各部署が収集している脆弱性情報の提供を受ける。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問6(1)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"図5の課題3について、CVSSにおいてゼロデイ攻撃が可能な脆弱性か否かが最も反映される評価基準の基準名を答える。\", \"model_answer\": \"現状評価基準\", \"commentary\": \"設問6は正答率が高かった。ファイアウォールに関する脆弱性をA社のケースについて評価する設問であったが，CVSSについてよく理解されているようであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問6(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄c〜eに入る字句を答える。c・dは表5(攻撃元区分)の区分名から選び、eはFW1・FW2のどちらかで答える。\", \"model_answer\": \"c:ネットワーク、d:ローカル、e:FW1\", \"commentary\": \"設問6は正答率が高かった。CVSSについてよく理解されているようであった。\", \"low_accuracy\": false}], \"_source_file\": \"2016h28h_sc_pm2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2016, \"season\": \"春\", \"part_label\": \"午後II\", \"uid\": \"pm-28\"}, {\"paper_id\": \"2016h28h_sc_pm2\", \"problem_no\": 2, \"theme\": \"テレワーク環境のモバイル端末のマルウェア感染を題材としたインシデント対応と、未知マルウェア対策(VDI等)の検討\", \"industry_setting\": \"従業員数700名のシステムインテグレータ(Q社)\", \"exam_intent\": \"近年，クラウドサービスやモバイル端末の活用によって業務環境及び業務形態の変化が進んでいる。一方，マルウェアを利用した攻撃はますます巧妙化し，従来型の対策だけでは検知・防御が難しくなっている。そのため，組織においては，クラウドサービスやモバイル端末を意識した検知・防御の仕組みとセキュリティ運用を実現するとともに，侵入されることを前提にした，インシデント対応体制の構築が必要となっている。本問では，モバイル端末のマルウェア感染を題材に，インシデント発生時の対応能力を問う。\", \"topics\": [\"テレワーク\", \"モバイルPC\", \"クラウドサービス\", \"C&Cサーバ\", \"User-Agent\", \"ドライブバイダウンロード\", \"DLLインジェクション\", \"URLフィルタ/RHフィルタ\", \"未知マルウェア対策\", \"VDI\", \"ハードディスク暗号化\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"下線①(貸与PCの標準ブラウザからアクセスすると404 Not Foundが返る)の動作を実現するために、C&Cサーバでどのような仕組みが必要か、表3の記載内容を用いて40字以内で具体的に述べる。\", \"model_answer\": \"UAがDL2以外の場合には\\\"404 Not Found\\\"を返す。\", \"commentary\": \"設問1(1)は，正答率が低かった。C&Cサーバが，HTTPリクエストヘッダのUser-Agentに応じてHTTPステータスコードを変化させていることを，表3と本文から読み取ってほしかった。攻撃の仕組みを理解するためにも，HTTPについてはよく理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②(マルウェアからC&Cサーバへの通信のブロック)について、テレワーク環境で述べられている機能を用いて実現する方法が二つある。どの機能でブロックすべきか、それぞれ20字以内で答える。\", \"model_answer\": \"①JプロキシのURLフィルタ機能  ②JプロキシのRHフィルタ機能\", \"commentary\": \"\", \ ーバ証明書の種類についての問題。正答率は低かった。市場で販売されているサーバ証明書には複数の種類があり，適材適所がある。Webサーバの目的に照らして最適なサーバ証明書を採用できるように，サーバ証明書の仕様及び発行時の審査の違いを正しく理解しておいてほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2017h29a_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2017, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-32\"}, {\"paper_id\": \"2017h29a_sc_pm2\", \"problem_no\": 1, \"theme\": \"IoT機器(ネットワークカメラ)を使ったクラウド型ビデオ監視システムのセキュリティ検査と対策立案\", \"industry_setting\": \"ネットワークカメラを使ったクラウド型ビデオ監視システムを開発・提供するファブレス企業(Z社)\", \"exam_intent\": \"昨今，Miraiボットネットに代表される，今までに類を見ないほど大量のIoT機器から成るボットネットによる，DDoS攻撃が発生している。ネットワークカメラやインターネットルータ，ネットワークストレージなどのメーカが，これらへの対策として販売停止，あるいはファームウェア更新を実施する必要に追われたのは記憶に新しい。IoTマルウェアの感染手法はITシステムにおいては古典的であるとも言えるが，ITシステムにおいては常識になっているセキュリティ対策が，IoT機器では実施されていないことが多いという点と，IoT機器の脆弱性が悪用されて，大規模な攻撃が発生したという点で，注目に値する。本問では，IoTシステムについて，ネットワークカメラを使ったビデオ監視システムを題材に，セキュリティ検査を実施し，セキュリティ対策を立案する能力を問う。\", \"topics\": [\"IoTセキュリティ\", \"Miraiボットネット\", \"SYNスキャン/ポートスキャン\", \"TCP3ウェイハンドシェーク\", \"中間者攻撃(MITM)\", \"DNSキャッシュポイズニング\", \"TLS/サーバ証明書検証\", \"リスト型攻撃/リバースブルートフォース攻撃\", \"端末認証(クライアント証明書)\", \"共通鍵暗号\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表3中の空欄aに入れる検査項目(1〜65535のTCPポートにSYNを送信し応答結果からポートの開閉を確認する検査)の名称を答える。\", \"model_answer\": \"SYNスキャン\", \"commentary\": \"設問1(1)は知識問題であり，正答率が高かった。情報セキュリティに関する一般的な用語については，受験者の知識が高いことがうかがえる。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①について，ポートが開いている場合と閉じている場合に期待される応答結果を，それぞれ解答群から全て選ぶ。\", \"model_answer\": \"開いている場合:カ(SYN ACK受信) / 閉じている場合:エ(RST ACK受信)，ク(応答なし)\", \"commentary\": \"設問1(2)はTCP/IPの3ウェイハンドシェークについての知識を問う問題であるが，特に“閉じている場合”について，正答率が低かった。サイバー攻撃に関するインシデント対応やセキュリティ検査においては，ネットワークの知識は重要である。基本的な事項は理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"表3中の空欄bに入れるプロセス(項番5で起動したプロセス)の動作を30字以内で具体的に述べる。\", \"model_answer\": \"HTTPを用いて，インターネット上のサーバと通信\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②について，出荷済みのZカメラ(デバッグ用プログラムと起動スクリプトが残存)に対する対策を60字以内で具体的に述べる。\", \"model_answer\": \"デバッグ用プログラムとその起動スクリプトを削除したファームウェアを作成し，Zカメラに配布する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"表4中の空欄c，dに入れる攻撃手法を解答群から選ぶ。cは暗号通信の盗聴に用いる攻撃，dは偽Zクラウドへの誘導に使う攻撃。\", \"model_answer\": \"c:カ(中間者攻撃) / d:ア(DNSキャッシュポイズニング攻撃)\", \"commentary\": \"設問2(1)は知識問題であり，正答率が高かった。情報セキュリティに関する一般的な用語については，受験者の知識が高いことがうかがえる。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄eに入れる適切な字句を英字で答える(カメラIF通信を暗号化しているプロトコル)。\", \"model_answer\": \"HTTPS\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について，プライベート認証局のルート証明書を信頼されたルート証明機関のものとして登録してはいけない理由を30字以内で述べる。\", \"model_answer\": \"証明書パスの検証が行われているかを確認できなくなるから\", \"commentary\": \"設問2(3)は，正答率が低かった。セキュリティ検査では，検査の目的に応じて，手法とテスト環境を検討し選択することが必要である。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④について，アクセス元の端末を制限する方法としてZシステムに適した方法を25字以内で具体的に述べる。\", \"model_answer\": \"クライアント証明書を用いた端末認証を行う。\", \"commentary\": \"設問3(1)は，正答率が低かった。クラウドの利用拡大によって，クラウドにアクセスする端末が増える一方で，不正アクセス対策の重要度が増している。利用者認証だけでなく，端末を認証する方法についても理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄f(ZクラウドのWebサーバ上のコンテンツの予期せぬ変更の原因となる脅威)に該当する全ての脅威を表5中の整理番号で答える。\", \"model_answer\": \"A2，C2，D1，D2\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"リバースブルートフォース攻撃の攻撃手法を40字以内で述べる。\", \"model_answer\": \"利用者IDを変更しながら，よく用いられるパスワードでログインを試行する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑤について，リバースブルートフォース攻撃やリスト型攻撃をログイン制限では防ぐのが難しい理由を40字以内で述べる。\", \"model_answer\": \"一つの利用者IDでのログイン試行が1回ないしは少ない回数しか行われないから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(5)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"下線⑥について，利用者ID・パスワードに加え電話番号や電子メールアドレスで認証してもリスト型攻撃を防げないのはどのような場合か，50字以内で具体的に述べる。\", \"model_answer\": \"ほかのWebサイトから漏えいした情報に電話番号や電子メールアドレスが含まれていた場合\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(6)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑦について，Zカメラが譲渡や転売される可能性を考慮に入れて，追加認証する適切な方法を25字以内で述べる。\", \"model_answer\": \"利用者番号の入力を求める。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(7)\", \"format\": \"記述(その他)\", \"prompt_summary\": \"下線⑧について，Zクラウドにおけるログイン認証の状況を踏まえ，平常時と異なる状況だと判断されるのはどのような場合か，40字以内で述べる。\", \"model_answer\": \"全利用者の単位時間当たりの認証失敗数がしきい値を超えた場合\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(8)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑨について，開発委託先との委託契約に盛り込むべき条項を25字以内で具体的に述べる。\", \"model_answer\": \"脆弱性検査合格を受入条件とする。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(9)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑩について，構成管理を導入した脆弱性対応の仕組みを構築していない場合の問題点を40字以内で述べる。\", \"model_answer\": \"脆弱性がZ社のシステムに影響するかを短時間で判断できない。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(10)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑪について，D1・D2への対策として共通鍵暗号方式で暗号化する場合，Zクラウドの管理者に見られないことを重視したときの共通鍵の生成・動画の暗号化・動画の復号を行うZシステムの構成要素を図1から選び，共通鍵の安全な共有方法を25字以内で述べる。\", \"model_answer\": \"共通鍵の生成:Zアプリ / 動画の暗号化:Zカメラ / 動画の復号:Zアプリ / 共通鍵の安全な共有方法:Bluetooth経由で受け渡す。\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2017h29a_sc_pm2_p1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2017, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-33\"}, {\"paper_id\": \"2017h29a_sc_pm2\", \"problem_no\": 2, \"theme\": \"DBMSとハードウェアセキュリティモジュール(HSM)を用いたデータベース暗号化の設計\", \"industry_setting\": \"保険会社X社(契約情報を扱う基幹システムK1/K2をシステム開発ベンダY社の支援で更改)\", \"exam_intent\": \"2005 年の個人情報保護法施行以降，個人情報を暗号化して保存することが求められるようになった。DBMS製品においてもデータ暗号化の機能が備わってきており，重要なデータを暗号化してデータベースに保管するシステムが増えてきている。 データベース暗号化及び暗号鍵の管理においては，やみくもにデータ暗号化や鍵管理機能を実装するのではなく，想定するリスクと残存リスクを明確にし，目的に沿って設計・実装することが重要である。鍵管理においては，暗号化に使用する鍵を安全に管理するための手段として，ハードウェア暗号モジュールが用いられてきた。 本問では，データ暗号化を題材に，暗号方式及びハードウェア暗号モジュールに関する基本的な知識並びに目的に沿ったデータ暗号方式の設計能力を問う。\", \"topics\": [\"DBMS表領域暗号化\", \"HSM(ハードウェア暗号モジュール)\", \"共通鍵暗号(56bitDES/AES)\", \"マスタ鍵・データ鍵の鍵管理\", \"耐タンパ性\", \"PKCS#11/API\", \"FISC安全対策基準/CRYPTREC/FIPS 140-2\", \"残留リスク分析\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄a(英字4字)・b(英字8字)に入る語句を答える。aは日本国内で金融機関などがよりどころとすべき共通の安全対策基準、bは電子政府における調達のために参照すべき暗号のリスト。\", \"model_answer\": \"a：FISC　b：CRYPTREC\", \"commentary\": \"設問1(1)は，知識問題であるが，正答率が低かった。業界ごとの代表的なセキュリティ基準，データ暗号化に関する基準は，セキュリティ要件を定義する際に参照すべきものであり，代表的なものについては知識をもっておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"Y社が提示した前提条件に基づき試算した場合、2017年製のPCを利用して同じ時間内に56bitDESを解読するにはPCは最低何台必要か。小数第1位を切り上げて整数で求める(133,920=540×248)。\", \"model_answer\": \"162\", \"commentary\": \"設問1(2)及び設問1(3)は，正答率が高かった。多くの受験者が，比較的簡単な前提条件に基づいて，リスクを特定したり数値化したりする能力をもっていることがうかがえる。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"指摘2の状況(鍵が平文でファイルに保管され、オペレータ及びシステム管理者に当該ファイルのアクセス権が付与されている)によって、誰がどのような方法で契約情報を取得するリスクが発生するかを60字以内で述べる。\", \"model_answer\": \"オペレータ及びシステム管理者が，暗号化された契約情報を暗号化・復号に用いられる鍵を用いて復号し，取得するリスク\", \"commentary\": \"設問1(2)及び設問1(3)は，正答率が高かった。多くの受験者が，比較的簡単な前提条件に基づいて，リスクを特定したり数値化したりする能力をもっていることがうかがえる。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄c(英字4字)に入る語句を答える。NISTが定めたc 140-2は暗号モジュールに求められるセキュリティ要件を定義したもの。\", \"model_answer\": \"c：FIPS\", \"commentary\": \"設問2は，HSMに関する知識問題であるが，(5)を除いて正答率があまり高くなかった。HSMは，データ暗号化に用いられる鍵を安全に管理する技術である。基本的な知識をもっておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"製品Hの仕様1(3人の鍵管理者が別々に入力した部分鍵の排他的論理和でマスタ鍵を生成)の効果を、1人の鍵管理者が三つの部分鍵を入力し3枚のICカードに保管して管理する場合と比べて25字以内で述べる。\", \"model_answer\": \"単独の鍵管理者ではマスタ鍵を復元できない。\", \"commentary\": \"設問2は，HSMに関する知識問題であるが，(5)を除いて正答率があまり高くなかった。HSMは，データ暗号化に用いられる鍵を安全に管理する技術である。基本的な知識をもっておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"ICカードに記録される部分鍵は、何を実施した場合にどのような目的のために必要か。場合と目的をそれぞれ15字以内で述べる。\", \"model_answer\": \"場合：製品Hを交換した場合　目的：マスタ鍵を復元するため\", \"commentary\": \"設問2は，HSMに関する知識問題であるが，(5)を除いて正答率があまり高くなかった。HSMは，データ暗号化に用いられる鍵を安全に管理する技術である。基本的な知識をもっておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"下線①(センサが規定の事象を検知するとマスタ鍵をゼロ化し、製品H自身を使用不能で元に戻せない状態にする)によって実現される暗号モジュールの性質を7字以内で答える。\", \"model_answer\": \"耐タンパ性\", \"commentary\": \"設問2は，HSMに関する知識問題であるが，(5)を除いて正答率があまり高くなかった。HSMは，データ暗号化に用いられる鍵を安全に管理する技術である。基本的な知識をもっておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(5)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"製品Hを運搬する際に必ず静電気防止シートで覆うと定めた理由。静電気防止シートで覆わなかった場合に発生し得る不都合な事象、及びその事象によって実行される製品Hの機能を、それぞれ40字以内で述べる。\", \"model_answer\": \"事象：静電気の放電による規定の範囲を超える電源電圧の発生　機能：事象をセンサが検知し，製品H自身を使用不能で戻せない状態にする。\", \"commentary\": \"設問2は，HSMに関する知識問題であるが，(5)を除いて正答率があまり高くなかった。((5)については正答率が比較的高かった旨の言及)\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"DB及び表領域の作成手順中、(i)の代わりにHSMサーバ1とHSMサーバ2の両方を稼働させた場合、(ii)〜(viii)のどの手順がエラーとなるか記号で選び、エラーが発生するAPI-Xのコマンド及びエラーの原因をそれぞれ35字以内で具体的に述べる(コマンドは図3形式、鍵はどのDBのものかも記述)。\", \"model_answer\": \"エラーとなる手順：(v)　API-Xのコマンド：暗号化(DBαのDBデータ鍵，DBαのDBマスタ鍵ID)　API-Xのエラーの原因：DBαのDBマスタ鍵が鍵ストアファイル2に存在しないこと\", \"commentary\": \"設問3(1)は，DBMSの暗号化機能，HSM，及びHSMをネットワーク経由で利用するためのソフトウェアの3種類の構成要素を組み合わせたデータ暗号化の設計に関する設問であるが，正答率が低かった。鍵を安全に保護した上でデータを暗号化する仕組みについての理解を深めてほしい。また，設問文で求められている解答形式から大きく逸脱した解答が多かった。他者と協力して業務を行う技術者は，問いと解答形式を正しく理解し，求められている解答を的確に表現できるよう基本的なコミュニケーション能力を身につけてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"Hクライアントにおいて、HクライアントIDをデータ鍵IDに付け加える機能がなかった場合、特定の条件においてDB作成がエラーになる。その条件を40字以内で述べる。\", \"model_answer\": \"複数のHクライアントが送信したデータ鍵IDが重複した場合\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"対策1(週次で業務アプリケーションのログから業務時間外のアクセス及び大量の契約情報へのアクセスをチェックする)は、誰がどのような方法で契約情報を取得するリスクに対する対策か。リスクを45字以内で述べる。\", \"model_answer\": \"業務担当者及び契約者が業務アプリケーションを利用して持ち出すリスク\", \"commentary\": \"設問4は，セキュリティ対策後の残留リスクに関する設問であるが，正答率が低かった。セキュリティ対策の設計において，対策後の残留リスクを正しく分析する能力を身につけてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"対策2(DBサーバ又はWebアプリケーションサーバのメモリダンプに関する作業を履歴として残す)は、誰がどのような方法で契約情報を取得するリスクに対する対策か。リスクを50字以内で述べる。\", \"model_answer\": \"オペレータ及びシステム管理者が，メモリダンプから平文の契約情報を読み出し，持ち出すリスク\", \"commentary\": \"設問4は，セキュリティ対策後の残留リスクに関する設問であるが，正答率が低かった。セキュリティ対策の設計において，対策後の残留リスクを正しく分析する能力を身につけてほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2017h29a_sc_pm2_p2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2017, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-34\"}, {\"paper_id\": \"2017h29h_sc_pm1\", \"problem_no\": 1, \"theme\": \"社内ネットワークへの不正侵入インシデント（ARPポイズニングによる通信盗聴とセグメント分離対策）\", \"industry_setting\": \"従業員数100名のシステム開発会社D社\", \"exam_intent\": \"標的型攻撃メールなどによる社内PCのマルウェア感染を起点とした，社内ネットワークからの情報漏えいや社内ネットワークでのランサムウェア感染が度々報道されている。そうした事故では，社内ネットワークのセグメントが適切に分離されていなかったことが，被害拡大の要因の一つに挙げられることが多い。本問では，社内ネットワークへの不正侵入インシデントを題材に，ARPポイズニングによる盗聴の原理及びそれに対するセグメント分離の効果を理解し，社内ネットワークの安全性を適切に評価する能力を問う。\", \"topics\": [\"ARPポイズニング\", \"中間者攻撃\", \"通信盗聴\", \"ネットワークセグメント分離\", \"ステートフルパケットインスペクション型FW\", \"SSH\", \"TCPコネクション\", \"サーバ証明書検証\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"盗聴されている時点の管理用PCのARPテーブル(表3)の空欄a、およびAさんのPCのARPテーブル(表4)の空欄b・cに入るMACアドレスを、図1中の機器のMACアドレスから記号(ア〜キ)で選ぶ。\", \"model_answer\": \"a：カ、b：オ、c：エ\", \"commentary\": \"設問1(1)はaがb、cと比較して正答率が低かった。他セグメントとの通信を盗聴される場合、ゲートウェイとの間の通信が攻撃者に中継されてしまうことを理解し、ARPの仕組みを理解していれば正答できる問題であった。ARPテーブルがどのように改ざんされると盗聴が成立するのか、理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"管理用PCのIPアドレスを総当たりで推測した場合に記録されるはずのログに対応する、表1中のFWフィルタリングルールの項番(1〜5)を空欄dに答える。\", \"model_answer\": \"d：5\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①について、攻撃者が管理用PCのIPアドレスを特定するために盗聴した通信の送信元・宛先・サービスを、それぞれ解答群から記号で選ぶ。\", \"model_answer\": \"送信元：ケ(管理用PC)、宛先：カ(LDAPサーバ)、サービス：キ(SSH)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②(サーバ証明書検証に失敗したら接続しない設定)が、AさんのPCに侵入した攻撃者によるどのような攻撃への対策になるか、攻撃名を10字以内で答え、攻撃に際して詐称される対象の機器名を図1中から選ぶ。\", \"model_answer\": \"攻撃名：中間者攻撃、機器名：CRMサーバ\", \"commentary\": \"設問2は正答率が低かった。中間者攻撃によって、通信を経路の途中で一度復号し、再度暗号化するという形で中継されると、暗号化通信を利用していても通信内容を盗聴され得る。そのような攻撃を防ぐためには、サーバ証明書検証などの手段で通信相手の真正性を確認する必要があることを理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について、ネットワーク構成とFWルールの変更によって図3の6(盗聴による管理用PCのIPアドレス特定)を防ぐことができる理由を35字以内で具体的に述べる。\", \"model_answer\": \"PCセグメント内に管理用PCとサーバ間の通信が流れなくなるから\", \"commentary\": \"設問3(1)は正答率が高かった。ネットワークセグメントを分離したことによって、対象通信がPCセグメントを通過しなくなり、盗聴を防げるようになることが良く理解されているようであった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線④について、TCPコネクション確立開始時のSYNパケットとSYN-ACKパケットがそれぞれ図4中のどのような経路をたどるか、通過する順に(A)〜(C)の記号で答える。\", \"model_answer\": \"SYNパケット：(C)→(A)、SYN-ACKパケット：(A)→(B)\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2017h29h_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2017, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-35\"}, {\"paper_id\": \"2017h29h_sc_pm1\", \"problem_no\": 2, \"theme\": \"会員制飲食店情報提供WebサイトのCSRF・XSS脆弱性の検査と対策\", \"industry_setting\": \"従業員数200名の情報サービス事業者E社（会員制Webサイトαを運営）\", \"exam_intent\": \"Webサイトは安全な状態で公開されることが望まれているので、脆弱性対策を積極的に進めている企業が増えてきている。しかし、開発者やシステム管理者の、Webアプリケーションソフトウェアの脆弱性に対する理解が不足しているために、対策しているつもりであっても脆弱性が存在した状態でWe , \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④について、同じL2SWに接続されたPC同士のワーム感染を防ぐために行う設定を25字以内で述べる\", \"model_answer\": \"VLANを使い、PC間の通信を禁止する。\", \"commentary\": \"設問4(2)は有線LANのL2SWに接続されたPC同士のワーム感染を防ぐ対策を問う問題であったが正答率は低かった。L2SWに接続されたPC同士が直接通信を行うというワームの特性を踏まえて、VLANによるセグメントの分離といったネットワークのレイヤでの対策が立案できるようになることを期待したい。\", \"low_accuracy\": true}], \"_source_file\": \"2018h30a_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2018, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-41\"}, {\"paper_id\": \"2018h30a_sc_pm1\", \"problem_no\": 3, \"theme\": \"アプリケーションフレームワークの脆弱性を悪用した攻撃への対応とWAF導入\", \"industry_setting\": \"B社(従業員500名の食品販売会社、インターネット通信販売システムを運用)\", \"exam_intent\": \"インターネット公開サイトにおいて，OSやミドルウェアの脆弱性を突いた攻撃が頻発しており，情報漏えいなど，甚大な被害を受ける例が後を絶たない。それに対して，セキュリティ担当者は，業務継続を意識した対策を見出すことが求められている。本問では，アプリケーションフレームワークについてのインシデント対応とWAFの導入を題材に脆弱性を悪用する攻撃に対する対応と，与えられた条件下でセキュリティ上の課題を特定し改善する能力を問う。\", \"topics\": [\"アプリケーションフレームワーク脆弱性\", \"OSコマンドインジェクション\", \"CVSS\", \"NTP時刻同期\", \"インシデント対応/被害拡大防止\", \"ログ調査(SSH/HTTP)\", \"WAF(クラウド型/ハードウェア型)\", \"DNS(CNAME/FQDN)\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記述(手段説明)\", \"prompt_summary\": \"下線①(ログに書かれる各FW及び各サーバの時刻を整合させている)を実現するための手段を15字以内で述べる\", \"model_answer\": \"NTPによる時刻同期\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2a\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図2中の空欄a(基本評価基準・現状評価基準・環境評価基準の三つの基準で脆弱性の深刻さを評価するシステム)に入る字句を英字4字で答える\", \"model_answer\": \"CVSS\", \"commentary\": \"設問2は基本評価基準、現状評価基準、環境評価基準の三つの基準で脆弱性の深刻さを評価するCVSSの名称を問う問題であったが正答率は低かった。基礎的な知識であり正確に覚えてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②(被害拡大を防止するために必要な措置)について、KリーダがS君に指示した措置を30字以内で述べる\", \"model_answer\": \"EサーバをネットワークからB切り離して、待機サーバを公開する。\", \"commentary\": \"設問3はセキュリティインシデント発生後の被害拡大防止のために必要な措置を問う問題であったが正答率は高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記述(調査方法)\", \"prompt_summary\": \"下線③について、仮に接続先IPアドレスとして外部メールサーバがSSHコマンド履歴に含まれていた場合、どの機器のログで何を調査すべきか。調査すべき機器の名称を図1から選び、調査すべき内容を30字以内で具体的に述べる\", \"model_answer\": \"①調査すべき機器:外部メールサーバ又はログ管理サーバ／調査内容:外部メールサーバからサイトZへの接続の有無を確認する。 ②調査すべき機器:Eサーバ又はログ管理サーバ／調査内容:外部メールサーバへのSSHコマンドの接続の有無を確認する。 ③調査すべき機器:FW1又はログ管理サーバ／調査内容:サイトZとHTTPを使用した通信を確認する。 (①②③のいずれか又は組合せ)\", \"commentary\": \"設問4は攻撃が拡散したかを調査する方法を問う問題であったが正答率は高かった。ただし攻撃内容とかけ離れた解答も散見された。攻撃内容から何を調査すべきかをよく見極めて解答してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問5(1)b\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"モニタリングモードでアラート通知時に、検知した通信がbであるかどうかを直ちに確認しなければならない、その空欄bに入る字句を5字以内で答える\", \"model_answer\": \"攻撃\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記述(機能説明)\", \"prompt_summary\": \"ハードウェア型WAF導入時、通販システム利用者の通信プロトコル(HTTPS)を考慮すると下線④(暗号通信に関する機能)が必要である。その機能を30字以内で具体的に述べる\", \"model_answer\": \"インターネットからのHTTPS通信を復号する機能\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(3)c\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"クラウド型WAF利用時、Eサーバへのアクセス経路をクラウド型WAF経由に変えるため設定を変更する空欄cのサーバ名を図1中から選び答える\", \"model_answer\": \"外部DNSサーバ\", \"commentary\": \"設問5(3)は正答率が低かった。クラウド型WAFサービスを使用する上での留意点をよく理解してほしかった。\", \"low_accuracy\": true}, {\"setmon\": \"設問5(3)d\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"クラウド型WAFのIPアドレス変更時も設定に影響が出ないよう、Eサーバの別名としてクラウド型WAF事業者指定のFQDNを記述するために定義するレコードの名称(空欄d)を答える\", \"model_answer\": \"CNAME\", \"commentary\": \"設問5(3)は正答率が低かった。クラウド型WAFサービスを使用する上での留意点をよく理解してほしかった。\", \"low_accuracy\": true}], \"_source_file\": \"2018h30a_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2018, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-42\"}, {\"paper_id\": \"2018h30a_sc_pm2\", \"problem_no\": 1, \"theme\": \"ハイブリッドクラウド環境におけるセキュリティ設計（オンプレミスとクラウドの併存環境でのID管理・アクセス管理・エンドポイント管理・モバイル対応）\", \"industry_setting\": \"日本・米国・欧州に展開する従業員80,000名の製造会社X社（重要インフラ設備を製造）\", \"exam_intent\": \"クラウドサービスが普及している一方，企業・組織にはクラウド環境に移行できないシステムも存在している。このような背景から，当面，企業・組織は，オンプレミス環境とクラウド環境が併存するハイブリッドクラウド環境においてシステムを運用する必要性に迫られている。ハイブリッドクラウド環境においても，セキュリティの確保は重要な考慮点であるが，ハイブリッドクラウド環境のセキュリティ設計においては，クラウド環境に移行すべきシステムの選定，ハイブリッドクラウド環境における利用者ID管理及びアクセス管理，クラウド環境におけるエンドポイント管理，モバイル環境の考慮といった点がしばしば議論になる。本問では，ハイブリッドクラウド環境におけるセキュリティ設計に関する知識と能力を問う。\", \"topics\": [\"ハイブリッドクラウド\", \"GDPR\", \"IaaS/SaaS\", \"SAML 2.0\", \"SPNEGO\", \"NIST CSF\", \"NAT/プライベートIPアドレス重複\", \"エンドポイント管理\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"下線①（各国及び各地域の個人情報保護に関する法規制）について，2018年5月25日に適用が開始された欧州連合の規則の略称を英字4字で答える。\", \"model_answer\": \"GDPR\", \"commentary\": \"設問1は，正答率が低かった。欧州だけでなく，日本における個人情報保護にも影響を与える規則であるので，知識として知っておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"条件2について，プロジェクト専用サーバをクラウド環境に移行した場合に満たせなくなる基本要件の具体的内容を60字以内で述べる。\", \"model_answer\": \"R&D情報は，物理的な入退室管理が行われているプロジェクトルーム内に配置されたプロジェクト専用サーバに保管する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"条件4について，生産関連サーバをクラウド環境に移行し，かつIaaS Cのサービスを全て利用した場合に満たせなくなる基本要件の具体的内容を三つ挙げ（各50字以内），さらにそのうち一つの理由となるIaaS Cのサービス仕様の内容を50字以内で述べる。\", \"model_answer\": \"①生産関連サーバは，X社の工場及びデータセンタに配置する。 ②生産関連サーバのバックアップを他の工場又はデータセンタに配置する。 ③同じ重要インフラ設備を製造する工場及び生産関連サーバは同一の国又は地域内の2か所以上に配置する。 ／ IaaS Cのサービス仕様の内容：日本国内のデータセンタが被災した場合はシンガポールのデータセンタでサービスが継続される。\", \"commentary\": \"設問2(2)は，正答率は高かったが，要件や仕様を言葉で正確に表現できていない解答が多く見受けられた。文書において，要件や仕様を言葉で正確に表現する能力を身につけてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"X社社内ネットワークとIaaS Cとの接続でFWのNAT機能を用いることにしたのは，IaaS Cのサービス仕様の制約から起こるどのような問題を回避するためか，70字以内で述べる。\", \"model_answer\": \"X社のシステムの機器に割り当てているIPアドレスが，IaaS Cで予約されているプライベートアドレスと重複する可能性があるという問題\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"各認証サーバ及び各SaaSをSAML 2.0プロトコルやSPNEGOプロトコルで通信させることによって，X社の従業員にどのような利便性が提供されるかを30字以内で述べる。\", \"model_answer\": \"一度のログインで全システムにアクセスできるという利便性\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"案2を選択した場合，案1と比べて利用者認証後の通信経路上の構成要素の負荷が高くなるのは社内PCからどの業務サーバへの通信か（図2の㋐〜㋚で全て選ぶ）。また負荷が高くなる構成要素を全て選ぶ。\", \"model_answer\": \"業務サーバ：㋑，㋒ ／ 構成要素：㋗，㋘，㋙，㋚\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線②（フレームワークインプリメンテーションティア1からティア4）について，ティア1からティア3に該当するものを解答群（ア:繰返し適用可能／イ:部分的／ウ:リスク情報を活用）から選ぶ。\", \"model_answer\": \"ティア1：イ ／ ティア2：ウ ／ ティア3：ア\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"運用サービス1及び2が提供される場合，標準ソフトウェア以外のソフトウェアがサーバ又はPCに導入されていたとすると，セキュリティ管理上どのような不都合が生じるかを40字以内で述べる。\", \"model_answer\": \"標準ソフトウェア以外のソフトウェアは，脆弱性管理がされないという不都合\", \"commentary\": \"設問4(2)は，正答率が低かった。この設問においても，不都合の内容を言葉で正確に表現できていない解答が多く見受けられた。文書において，言葉で正確に表現する能力を身につけてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"情報セキュリティ標準を基に手作業及び目視でセキュリティ設定パラメタの設定値をチェックする方法と比べて，製品Dによる方法にはどのような利点があるかを二つ挙げ，それぞれ15字以内で答える。\", \"model_answer\": \"①正確である。 ②作業が速くできる。\", \"commentary\": \"設問4(3)は，正答率が低かった。運用管理ツールの効果を正しく理解し，ツールを有効に活用する能力を身につけてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問5(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"案A及びBにおける利用者認証後の通信経路のうち，案Cに比べて構成要素の負荷が高くなるのは，どのクライアントからどの業務サーバへの通信か。案Aは2組，案Bは3組挙げ，図3の記号Ⓐ〜Ⓘで答える。\", \"model_answer\": \"案A：①クライアントⒽ・業務サーバⒹ ②Ⓘ・Ⓓ ／ 案B：①Ⓖ・Ⓑ ②Ⓗ・Ⓑ ③Ⓘ・Ⓑ\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図4（スマートフォンからSaaS Qへアクセスする際の通信シーケンス）中のa〜hに入れる適切な通信メッセージを解答群（ア〜ク）から選び記号で答える。\", \"model_answer\": \"a：カ（認証サーバB1が発行したトークン要求） b：ウ（接続要求） c：イ（クライアント証明書の要求） d：ア（クライアント証明書） e：オ（トークン発行要求） f：ク（利用者ID及びパスワードの入力要求） g：キ（利用者ID，パスワード） h：エ（トークンの発行）\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2018h30a_sc_pm2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2018, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-43\"}, {\"paper_id\": \"2018h30a_sc_pm2\", \"problem_no\": 2, \"theme\": \"セキュリティインシデントへの対応（マルウェア侵入に端を発した情報漏えいインシデントの対応体制整備とログ調査）\", \"industry_setting\": \"玩具を製造販売する従業員1,500名の企業A社（国内本社，海外工場）\", \"exam_intent\": \"サイバー攻撃の技術は高度化し，攻撃者の侵入を完全に防ぐことはますます困難になってきた。これに伴い，セキュリティインシデント（以下，インシデントという）となり得る事象を素早く検知し，調査し，対処する能力の重要性が高まっている。本問では，マルウェアの侵入に端を発した情報漏えいインシデントを題材として，インシデント対応をスムーズに行うための仕組みを検討して構築する能力と，ログやそのほかの情報を組み合わせて，インシデントの全容を整理し，理解する能力を問う。\", \"topics\": [\"インシデント対応\", \"CSIRT\", \"NIST SP 800-61\", \"インシデント対応ポリシ\", \"ログ管理\", \"プロキシサーバログ解析\", \"C&Cサーバ/遠隔操作マルウェア\", \"フォレンジック\", \"タイムライン分析\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"図4中のa，b（インシデント対応チームが提供するサービスの例）に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"a：エ（侵入検知） b：イ（教育と意識向上）（a，bは順不同）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図5中のc〜e（インシデント対応ポリシに記載する項目の例）に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"c：ケ（マネジメント層） d：ウ（インシデント） e：コ（優先順位付け）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中のf〜h（ログ管理ポリシの要件：取得するログについての要件と取得したログについての要件）に入れる適切な字句を，それぞれ12字以内で答える。\", \"model_answer\": \"f：ログを取得する機器 g：取得するログの種類 h：保存期間（f，g，hは順不同）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中のi，j（各機器が出力するログに記録する時刻情報のiをjするという要件）に入れる適切な字句を，それぞれ8字以内で答える。\", \"model_answer\": \"i：タイムゾーン j：統一\", \"commentary\": \"設問2(2)iは，正答率が低かった。インシデント発覚時には，様々な機器が出力したログを見比べて，経緯などを調査する必要が生じる。各ログに記録された時刻が正しいこと，及び，時刻のタイムゾーンが同じであることが重要である。ログ間でタイムゾーンが異なると，認識違いによって，調査が難航する場合がある。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について，取得した通常時プロファイルの利用方法を35字以内で具体的に述べる。\", \"model_answer\": \"ネットワークトラフィック量と比較して異常を検知する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について，サイトMにアクセスしたPC（PC-A）を特定した方法を60字以内で具体的に述べる。\", \"model_answer\": \"プロキシサーバのログからアクセス先がサイトMのエントリを抽出し，このエントリからPC-AのIPアドレスを得た。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③（PC-Aが特定サイトに頻繁にアクセスを繰り返す）について，マルウェアがHTTPリクエストによる活動（30字以内）とHTTPレスポンスによる活動（20字以内）で何を行っていたと考えられるかを具体的に述べる。\", \"model_answer\": \"HTTPリクエストによる活動：C&Cサーバへのコマンド要求又は応答 ／ HTTPレスポンスによる活動：C&Cサーバからのコマンド受信\", \"commentary\": \"設問3(2)及び(3)は，正答率が低かった。社内に侵入した遠隔操作機能をもつマルウェアは，攻撃者が準備したC&Cサーバと通信して攻撃者の指示を受け取り，これに従って動作する場合が多い。この動作を正しく理解しておくことは，侵入の検知や被害の未然防止のために重要である。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④（PC-Aをネットワークから切断して回収）について，調査の観点から見たときの問題を40字以内で述べ，またその問題を軽減するために下線④を実行する前に行うべき措置を30字以内で述べる。\", \"model_answer\": \"問題：PCのネットワークインタフェースや通信の状態についての情報が失われること ／ 措置：メモリダンプを取得する。\", \"commentary\": \"設問3(2)及び(3)は，正答率が低かった。マルウェアが検知されたPCをネットワークから即座に切り離すことには長所と短所がある。これを正しく理解した上で，マルウェア検知時の初動活動を設計してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"本文中のk（PC-A回収後，マルウェアKがほかの機器にも感染している可能性を簡易的に確認するための調査内容）に入れる適切な調査内容を40字以内で具体的に述べる。\", \"model_answer\": \"プロキシサーバのログから，IPnのサイトにアクセスした機器がほかにないか\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(5)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図7中の下線⑤について，DさんのユーザIDを用いたPC-Bへのログインに最初に成功するまでに，攻撃者が何回ログインに失敗したことが記録されているか（lastb実行結果より）。\", \"model_answer\": \"7回\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(6)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中のl（Y社にファイル解析を依頼する際にファイルを一意に識別・照合するためのキー）に入れる適切な字句を8字以内で答える。\", \"model_answer\": \"ハッシュ値\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(7)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑥（当該ファイルが社外に送信された可能性）について，ファイルの社外送信の可能性を示す記録を図6中から選び行番号で答える。またプロキシサーバ又はFWが取得できる情報のうち，当該記録と併せて見ることでファイル送信の有無を判断するのに役立つ情報を35字以内で答える（送信元IPアドレス及び図6中の情報は対象外）。\", \"model_answer\": \"行番号：28行目 ／ 役立つ情報：プロキシサーバがインターネットに送信したデータのサイズ\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表2（インシデントQのタイムライン）中のア〜ウに入れる適切な日時を答える。\", \"model_answer\": \"ア：9／4 14：31 イ：9／4 14：37 ウ：9／5 10：41\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"表2中のm〜sに入れる適切な字句を解答群（ア〜タ）から選び記号で答える。\", \"model_answer\": \"m：タ（マルウェアL） n：コ（サイトM） o：ソ（マルウェアK） p：ケ（遠隔操作） q：シ（ファイルA） r：カ（PC-B） s：オ（PC-A）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑦（インシデント対応能力について未対応の課題を解決するための措置）について，図3中の(6)に示された課題a〜dの中からこの時点で未対応の課題を選び記号で答え，その課題を解決するための措置を25字以内で具体的に述べる。\", \"model_answer\": \"課題：b ／ 措置：インシデント対応の作業手順書を作成する。\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2018h30a_sc_pm2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2018, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-44\"}, {\"paper_id\": \"2018h30h_sc_pm1\", \"problem_no\": 1, \"theme\": \"Use-After-Free脆弱性を悪用した任意コード実行の仕組みと対策\", \"industry_setting\": \"従業員100名のソフトウェア開発会社（V社）でのセキュリティ教育\", \"exam_intent\": \"ヒープ領域に関連する脆弱性は，特定の手順でメモリ操作を行った場合だけ発現するものが多いことから，発見しづらく，スタック領域に関連する脆弱性よりも対策漏れが起きやすい。近年では，Web ブラウザ製品などで特に多く発見されており，ドライブ・バイ・ダウンロード攻撃に悪用されるものも多い。本問では，Use-After-Free 脆弱性を題材に，メモリ上の任意のアドレスに攻撃コードが書き込まれて実行される仕組みを理解し，脆弱性対策が適切に実装されているかを評価する能力を問う。\", \"topics\": [\"Use-After-Free\", \"バッファオーバフロー\", \"ヒープ領域\", \"データ実行防止(DEP)\", \"ASLR\", \"関数テーブル\", \"リトルエンディアン\", \"system関数\", \"C++\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記号選択\", \"prompt_summary\": \"空欄a（確保済みメモリ領域を超えてデータを書き込む脆弱性）とb（解放したメモリ領域を後から使用する脆弱性）に入る脆弱性名を解答群から選ぶ。\", \"model_answer\": \"a：カ（バッファオーバフロー）、b：ウ（Use-After-Free）\", \"commentary\": \"問1全体として，正答率は低かった。\", \"low_accuracy\": true}, {\"setmon\": \"設問2\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"下線②のようになるために下線①で読み込まれる攻撃者からの入力値を、指定アドレス0x12345678・改行コード0x0aとした場合の具体的なバイト列を14字以内の16進数文字列で答える（32ビット・リトルエンディアン）。\", \"model_answer\": \"785634120a\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問3\", \"format\": \"記号選択\", \"prompt_summary\": \"空欄c（CreateNote呼出し時に攻撃コードへ処理を遷移させるため関数テーブルに書き込むアドレス）を表1中の（ア）〜（シ）から選ぶ。\", \"model_answer\": \"c：（エ）0x08049e40（new の実行コードの先頭アドレスが記録されているアドレス）\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問4\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄d（関数テーブルに書き込む値）に入る適切な値を16進数で答える。攻撃コードの先頭アドレスは0x0b123400。\", \"model_answer\": \"d：0x0b123400\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問5\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄e（RegisterMsgで攻撃コードが書き込まれるメモリ領域の名称）を答える。\", \"model_answer\": \"e：ヒープ\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問6\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③（共有ライブラリ内のメモリアドレスを選べばDEPが有効でも任意処理を実行できる）の理由を45字以内で述べる。\", \"model_answer\": \"ライブラリ関数はデータ実行防止の対象ではないメモリ領域に配置されているから\", \"commentary\": \"設問6は，正答率が低かった。実行コードが置かれることを想定していないメモリ領域であれば，全てデータ実行防止機能の保護対象にできる。一方，実行コードが置かれることを想定しているメモリ領域は，実行を防止するわけにはいかないので，通常は保護対象にできないことを理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問7\", \"format\": \"記号選択\", \"prompt_summary\": \"空欄f（DEPが有効でも/bin/shを起動して任意のシェルコマンドを実行するために関数テーブルに書き込むアドレス）を表2中の（ア）〜（ク）から選ぶ。\", \"model_answer\": \"f：（ア）0xf7cc8da0（system の実行コード）\", \"commentary\": \"設問7は，正答率が低かった。シェルコマンドの実行に使われるsystem 関数について知っておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問8\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄g（ASLR有効時にRegisterNameと組み合わせて共有ライブラリのアドレスを特定するために利用するメンバ関数）の名前を答える。\", \"model_answer\": \"g：DisplayNote\", \"commentary\": \"設問8は，正答率が低かった。メモリアドレスを特定するためには，何らかの手段でメモリアドレスを出力させる必要がある。メンバ関数一つ一つについて，メモリの内容を出力させられるかどうかを読み取れていれば，解答できる問題であった。\", \"low_accuracy\": true}, {\"setmon\": \"設問9\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"空欄h（Use-After-Free脆弱性を修正するため図1の39行目直後に加える1文のソースコード）を答える。\", \"model_answer\": \"h：m_note = NULL;\", \"commentary\": \"\", \"low_accuracy\": true}], \"_source_file\": \"2018h30h_sc_pm1.json\", \"problem_type\": \"コード・プロトコル深掘り型\", \"year\": 2018, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-45\"}, {\"paper_id\": \"2018h30h_sc_pm1\", \"problem_no\": 2, \"theme\": \"サーバの情報セキュリティ対策強化（メール経路・FW・運用PC）\", \"industry_setting\": \"従業員300名の小売業者（T社）\", \"exam_intent\": \"サーバの運用管理に利用するPC は，特権ID を用いたサーバへのログインに用いられることが多い。そのため，当該PC にログインできるアカウント情報が窃取されると重大な被害につながることから，一般の業務に利用されるPC より強固な情報セキュリティ対策が求められる。本問では，サーバの情報セキュリティ対策強化を題材に，運用管理に利用するPC，ネットワーク及びサーバの情報セキュリティ対策に関する設計能力を問う。\", \"topics\": [\"SPF\", \"SMTPメール転送経路\", \"ファイアウォールルール\", \"プロキシサーバ\", \"CONNECTメソッド悪用\", \"オープンリゾルバ対策\", \"特権ID\", \"運用管理PC分離\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図2（T社ドメインのTXTレコード v=spf1 +ip4:[a] -all）の空欄aに入る適切な字句を答える。\", \"model_answer\": \"a：x1.y1.z1.4（外部メールサーバのIPアドレス）\", \"commentary\": \"設問1(1)は，正答率が低かった。T社におけるインターネットへのメール転送経路を理解した上で解答してほしかった。迷惑メール対策において，SPF（Sender Policy Framework）は重要であるので，よく理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表3（FWフィルタリングルール）の空欄b,c,d（SMTP通信の送信元・宛先サーバ）に入る適切なサーバ名を図1中の字句を用いて答える。\", \"model_answer\": \"b：迷惑メール対策サーバ、c：Web メールサーバ、d：外部メールサーバ\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表4（サーバ設定チェックリスト）の空欄e（DNSサーバがDMZ上の他のサーバからだけ許可すべき通信の内容）を30字以内で述べる。\", \"model_answer\": \"インターネット上のドメイン名についての名前解決\", \"commentary\": \"\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①（CONNECTメソッド悪用でトンネルを確立しWebメールサーバの機能を回避）によって生じる問題を二つ挙げ、それぞれ40字以内で具体的に述べる。\", \"model_answer\": \"・インターネットへのメールの送信を許可されていない従業員が，送信できるという問題／・送信者メールアドレスを詐称したメールを送信できるという問題／・マルウェアのスキャンを行わずにメールを送信できるという問題（以上のうち二つ）\", \"commentary\": \"設問2(2)は，図3に示した通信がプロキシサーバから外部メールサーバへのSMTP通信であることを理解していない解答が散見された。インターネットとの通信でよく使用されるポート番号は，知っておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(対策提案)\", \"prompt etmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表4の空欄e〜g（マルウェアβが窃取してファイル転送サーバにアクセスするために必要な情報）を各15字以内で答え、これら全ての情報をまとめて窃取する方法を30字以内で述べる。\", \"model_answer\": \"e：利用者ID、f：パスワード、g：アップロード用URL（e〜gは順不同）／方法：事務PCのHTTPリクエストを監視する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表4下線②（不正ファイルが原因で研究開発PCが感染する可能性が低い）とA氏が判断した理由を50字以内で述べる。\", \"model_answer\": \"研究開発PCからファイル転送サーバにアクセスして，ファイルをダウンロードする必要があるから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表6の空欄h〜k（配信サーバの設置位置ごとの研究開発PCからの感染可能性と理由）を答える。h・jは「低い」「高い」で、i・kは各30字以内で述べる。\", \"model_answer\": \"h：高い、i：通信経路上に感染活動を遮断する機器が存在しないから、j：低い、k：FW2によって感染活動を遮断できるから\", \"commentary\": \"設問3は，全体的に正答率が高かったが，iでは“研究開発PCはマルウェアに感染しないから”という解答が一部に見られた。分離されたネットワークであっても，マルウェア感染は起き得ることを前提にセキュリティ対策を検討する必要があることを理解しておいてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"空欄l（製品Zで正当なファイル転送であることを確認するため図4の手順2の後に追加する手順）を15字以内で答える。\", \"model_answer\": \"上長による承認\", \"commentary\": \"設問4は，正答率が低かった。マルウェアが既にパスワードを窃取していることを読み取れていない，“再度パスワードを入力する”という解答が散見された。秘密情報を窃取するマルウェアは実際に存在するので，その仕組みを理解した上で対策を検討してほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2018h30h_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2018, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-47\"}, {\"paper_id\": \"2018h30h_sc_pm2\", \"problem_no\": 1, \"theme\": \"脆弱性検査とリスクアセスメント結果に基づくセキュリティ対策の評価・立案\", \"industry_setting\": \"科学技術分野のノウハウを持つ職員数300名の一般社団法人（R団体、精密機器のプロトタイプ製作等）\", \"exam_intent\": \"セキュリティインシデントを未然に防ぐには，新しい攻撃方法の出現や，システムの変更，業務の変更など様々な環境の変化に合わせて，企業・組織がリスクを見直し，必要となる対応をしていくことが重要である。本問では，一般社団法人におけるセキュリティ対策の評価を題材に，脆弱性検査で検出された脆弱性や，リスクアセスメントによって新たに分かった情報漏えいリスクなどについて，評価し，対策を立案する能力を問う。\", \"topics\": [\"DOM-based XSS\", \"反射型XSS\", \"HttpOnly属性\", \"Cookie／セッション管理\", \"共通管理者アカウント\", \"踏み台サーバ／操作記録機能\", \"FWフィルタリングルール\", \"DRM方式／コンテナ方式による図面流出防止\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について、サーバからのレスポンスの内容を見て脆弱性を判断するツール（検知方法1）では脆弱性2（DOM-based XSS）を検知できない理由を35字以内で具体的に述べる。\", \"model_answer\": \"脆弱性の有無によってサーバからのレスポンスに違いがないから\", \"commentary\": \"設問1(1)，(2)は，DOM-based XSSに関する設問であったが，反射型XSSについて言及した解答が散見された。DOM-based XSSが引き起こされる原理についてよく理解しておいてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について、脆弱性2（DOM-based XSS）の原理を踏まえ、Rポータルへのアクセスを繰り返すことなく攻撃者が脆弱性の有無を分析する方法を40字以内で述べる。\", \"model_answer\": \"スクリプトを分析し，フラグメント識別子の値の変化による挙動を確認する。\", \"commentary\": \"設問1(1)，(2)は，DOM-based XSSに関する設問であったが，反射型XSSについて言及した解答が散見された。DOM-based XSSが引き起こされる原理についてよく理解しておいてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について、Cookie発行時にHttpOnly属性を付与する修正が、Rポータルがどのような実装方法を用いている場合に動作に影響するかを45字以内で述べる。\", \"model_answer\": \"Rポータルが利用しているスクリプトがCookieの値を利用している場合\", \"commentary\": \"設問1(3)は，正答率が低かった。HttpOnly属性はCookieの値を不正に操作されることを防ぐために有効なので，よく理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について、サーバセグメント内のサーバで共通管理者アカウントを用いるR団体が、どのような機能を使ってどのような証跡を取得しているかを、本文中の字句を用いて70字以内で具体的に述べる。\", \"model_answer\": \"踏み台サーバの操作記録機能によって，ログインした利用者のデスクトップ画面，実行したコマンド，及びキーボード入力を記録する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表5（追加するFWフィルタリングルール）の空欄a〜cに入れる適切な字句（送信元・宛先・サービス）を答え、また表4のルールのうち不要となるものを項番で答える。\", \"model_answer\": \"a：WebAPサーバ　b：DBサーバ　c：ODBC　不要となるルール：ルール9\", \"commentary\": \"設問3は，全体的に正答率が高かった。本文中に示したデータベースサーバの移設に伴うリスクについて，正しく理解できていることがうかがわれた。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑤について、DBサーバをサーバセグメントに移動する案2で、誰がどのようなアクセス経路で何を行うとセキュリティ対策基準違反になるかを、本文の内容を基に55字以内で具体的に述べる。\", \"model_answer\": \"人事総務課の職員が踏み台サーバを経由してDBサーバに共通管理者アカウントでログインする行為\", \"commentary\": \"設問3は，全体的に正答率が高かった。本文中に示したデータベースサーバの移 )\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄b〜d（オリジンの一致判定に用いる要素）に入れる適切な字句を解答群から選び記号で答える。\", \"model_answer\": \"b：イ（FQDN）／c：キ（スキーム）／d：ク（ポート番号）　※b・c・dは順不同\", \"commentary\": \"設問1(1)，(2)は，正答率が低かった。WebサイトAとWebサイトBのオリジンが異なるので，Same-Originポリシによって，アクセスは制限される。用語とその意味を適切に理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について，攻撃者が被害者にさせる特定の操作の具体的な内容を20字以内で答える。\", \"model_answer\": \"WebサイトBへのログイン\", \"commentary\": \"設問1(3)は，正答率が低かった。攻撃者が被害者の会員情報を窃取する流れを理解できれば，解答できる問題であった。\", \"low_accuracy\": true}, {\"setmon\": \"設問2\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄e（withCredentialsがtrueのときtest2.example.comのCookieが送られる動作）に入れる適切な記号を図3の(iii)〜(vi)から選ぶ。\", \"model_answer\": \"(ⅴ)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表1中の空欄f（API-YがAccess-Control-Allow-Originヘッダフィールドに設定するURL）に入れる適切なURLを答える。\", \"model_answer\": \"https://site-a.m-sha.co.jp\", \"commentary\": \"設問3(1)は，CORSの仕組みを理解していない解答が散見された。異なるOriginのリソースにアクセスを許可する際には，CORSを使う場合があるので，理解しておいてほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(空欄補充)\", \"prompt_summary\": \"表1中の空欄g（WebブラウザがAccess-Control-Allow-Originの値と照合する対象）に入れる適切な字句を30字以内で答える。\", \"model_answer\": \"売れ筋商品情報配信の申込ページのオリジン\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(空欄補充)\", \"prompt_summary\": \"本文中の空欄h・i（許可オリジンリストとの突合に用いる要素）を20字以内で，空欄j（突合して合致した状態）を5字以内で答える。\", \"model_answer\": \"h：Originヘッダフィールドの値／i：許可するオリジンのリスト／j：一致\", \"commentary\": \"設問3(3)は，正答率が高かった。複数のオリジンからのアクセスを許可する場合に，どのように実装すればよいかを，本文から正しく読み取り解答されていた。\", \"low_accuracy\": false}], \"_source_file\": \"2019h31h_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2019, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-50\"}, {\"paper_id\": \"2019h31h_sc_pm1\", \"problem_no\": 2, \"theme\": \"偽アクセスポイントを用いた中間者攻撃への対策としてのクラウドサービス認証方式の強化（OTP／パスワードレス認証）\", \"industry_setting\": \"東京に本社をもつ従業員数1,000名の商社U社（海外拠点でクラウド型Webメールサービスを利用）\", \"exam_intent\": \"近年，クラウドサービスに対するパスワード認証が破られての不正アクセス事件が度々発生している。さらに，利用するサービスが増えると，サービス毎に別々のパスワードを人が記憶することも難しくなるので，クラウドサービス利用においては，認証連携及びより強力な認証方式が必要になってきている。そうした背景もあり，パスワードレス認証方式の標準化が進められている。本問では，クラウドサービスの利用における認証方式の強化を題材に，認証方式の安全性を評価する能力を問う。\", \"topics\": [\"フィッシング\", \"中間者攻撃\", \"偽無線LANアクセスポイント\", \"DNSなりすまし\", \"HSTS\", \"OTP(TOTP)\", \"WebAuthn/パスワードレス認証\", \"ディジタル署名\", \"オリジン検証\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①について，攻撃者が用意した無線LANアクセスポイントに何が設定されていたと考えられるか，設定を30字以内で述べる。\", \"model_answer\": \"ホテルWi-Fiと同じSSIDと事前共有鍵\", \"commentary\": \"設問1(1)，(2)は，全体的に正答率が高かった。攻撃者の用意した無線アクセスポイントに誘導される仕組みについて十分理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(空欄補充)\", \"prompt_summary\": \"図2中の空欄a・b（攻撃者のDNSサーバがAレコードで関連付けていたFQDNとIPアドレスの対象）に入れる適切な字句を本文・図1・図2の字句を用いて答える。\", \"model_answer\": \"a：メールサービスP／b：攻撃者が用意したWebサーバ\", \"commentary\": \"設問1(1)，(2)は，全体的に正答率が高かった。攻撃者の用意した無線アクセスポイントに誘導される仕組みについて十分理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について，サーバ証明書が信頼できない旨のエラーが表示されなかった理由を，HSTS未実装を踏まえ20字以内で述べる。\", \"model_answer\": \"HTTPで接続が開始されたから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について，偽サイトにおいてどのような処理が行われればメールサービスPへの不正アクセスが成立するか，行われる処理を35字以内で述べる。\", \"model_answer\": \"OTPの入力を要求し，OTPを認証サーバXに中継する処理\", \"commentary\": \"設問2(1)は，正答率が低かった。通信を攻撃者に中継され得る環境下では，ネットワーク上を流れる情報は，ワンタイムパスワードのような毎回変わる情報であっても，攻撃者に悪用され得ることを理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図5・図6中の空欄c〜f（オーセンティケータ登録・認証で署名生成・検証に用いる鍵）に入れる適切な字句を解答群から選び記号で答える。\", \"model_answer\": \"c：ウ（秘密鍵A）／d：ア（公開鍵A）／e：エ（秘密鍵K）／f：イ（公開鍵K）\", \"commentary\": \"設問2(2)は，正答率が低かった。公開鍵と秘密鍵を取り違えている解答が散見された。ディジタル署名の仕組みについて理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について，パスワードレス認証方式を利用すれば要求2を満たせると考えられる理由を図5又は図6中の字句を用いて40字以内で述べる。\", \"model_answer\": \"認証サーバXでオリジンbとオリジンsの一致を確認しているから\", \"commentary\": \"設問2(3)は，正答率が低かった。中間者攻撃では偽装できない情報が何かを考えれば，解答できる問題であった。被害者が署名したデータを攻撃者がそのまま悪用することを想定していない，“攻撃者が入手できないオーセンティケータの秘密鍵で署名しているから”といった解答が一部に見られた。\", \"low_accuracy\": true}], \"_source_file\": \"2019h31h_sc_pm1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2019, \"season\": \"春\", \"part_label\": \"午後I\", \"uid\": \"pm-51\"}, {\"paper_id\": \"2019h31h_sc_pm1\", \"problem_no\": 3, \"theme\": \"家庭用ゲーム機（IoT機器）における複数サーバ間の認証連携と物理的不正アクセスへの対策\", \"industry_setting\": \"IoT機器を製造・販売する従業員数3,000名のV社（家庭用ゲーム機ゲームシステムVを開発）\", \"exam_intent\": \"近年，IoT機器が増加しており，そのセキュリティ対策も重要になってきている。IoT機器はネットワーク経由だけでなく，物理的なアクセスも可能なので，それも考慮してセキュリティ設計を進める必要がある。また，IoT機器が接続するサーバが複数あると，それらを連携して動作させるために，認証連携が必要になることも多い。本問では，家庭用ゲーム機の開発を題材に，IoT機器と複数のサーバ間での認証連携について設計する能力，及びIoT機器のセキュリティ対策を検討する能力を問う。\", \"topics\": [\"認証トークン\", \"MAC(HMAC)\", \"共通鍵\", \"ディジタル署名/公開鍵暗号\", \"クライアント証明書\", \"耐タンパ性\", \"TPM\", \"セキュアブート(CRTM/ハッシュ値リスト)\", \"IoT物理セキュリティ\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①について，MAC（FQDNと利用者IDに対しハッシュ関数を共通鍵と組み合わせて生成）に該当する方式を解答群から選び記号で答える。\", \"model_answer\": \"エ（HMAC）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②について，ゲームプログラムAB間で認証トークンが使い回せる問題への対策として認証トークンに追加する必要がある情報を15字以内で答える。\", \"model_answer\": \"ゲームプログラムID\", \"commentary\": \"設問2(1)は，正答率が高かった。本問のような認証連携方式では，利用を許可するリソースの範囲を認証トークンに含める必要があることについて，よく理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について，ゲームサーバ管理者が認証トークンを不正に生成できてしまう原因となるゲームサーバの仕様を30字以内で述べる。\", \"model_answer\": \"ゲームサーバに認証サーバと同じ共通鍵を保存する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について，ゲームプログラムごとに別の共通鍵を用いても不正生成できてしまう 1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図3の下線①(表1先頭にポート6379/tcpへのパケットを破棄するiptablesルールを挿入)について、挿入されなかった場合、攻撃者の意図に反してどのようなことが起こると想定できるか75字以内で述べる。\", \"model_answer\": \"DBMS-Rにおける同じ脆弱性を悪用されて，別のマルウェアXまたはほかのマルウェアに再度感染してしまい，マルウェアXの動作が阻害される。\", \"commentary\": \"設問1(1)は，正答率が低かった。マルウェアには，目的の遂行のための機能だけでなく，発見されないように自らの動作や存在の痕跡を消す機能も組み込まれているものがある。今回のマルウェアXは，ワームであるので感染拡大機能をもつが，その機能によって，既に感染しているサーバが再度感染してしまう可能性がある。再度感染すると，例えばマルウェアXの処理が始めに戻ってしまい，目的の遂行の妨げになることがある。このようなマルウェアの機能の背景に関する知識も深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中及び図4中の空欄α〜γ(ルートキットYが隠蔽に用いるプロセス監視コマンド・書き換えられる関数・アクセスするディレクトリ)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"α：カ(top)、β：ク(ライブラリ)、γ：ア(/proc/123)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②(サーバAからの会員情報の漏えいはなかったとS社は結論付けた)について、結論に至った根拠を100字以内で述べる。\", \"model_answer\": \"マルウェアXには，暗号資産の採掘プログラムによる採掘演算結果以外の情報を外部に送信する機能はなく，マルウェアX以外による遠隔コマンド実行及びSSHサービスへの接続がなかったから\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"表2中の対策1〜4は、図2中の3の(ア)〜(オ)のどの機能への対策となるか、それぞれ該当する機能を全て選び記号で答える。\", \"model_answer\": \"対策1：(イ)、対策2：(イ)、対策3：(ア),(エ)、対策4：(ウ),(エ),(オ)\", \"commentary\": \"設問2(1)は，正答率が低かった。表2に示された対策はいずれも典型的なものである。しかし，具体的にそれらの対策がどのような攻撃に対して効果を発揮するのかは，正確な理解を必要とする。様々な脅威と，対応するセキュリティ対策をしっかりと理解しておいてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中及び表3中の空欄あ〜う(サーバAの制限すべきポート番号2つと、送信元を限定すべきIPアドレス)に入れる適切な字句を答える。\", \"model_answer\": \"あ：22/tcp、い：6379/tcp、う：a2.b2.c2.d2\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄a、b(マルウェアXがファイルのダウンロードに用いたコマンド名、図2の(ウ)を実行したコマンド名)に入れるコマンド名を、本文中又は図中の字句を用いて答える。\", \"model_answer\": \"a：curl、b：iptables\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(4)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄え〜か(サーバAで行うファイル改ざん検知における、計算・保存する値、値の照合方法、検知対象となる変化)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"え：オ(ハッシュ値)、お：カ(比較)、か：キ(変更)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線③(設計プロセスで参考になりそうなセキュリティ対策の標準)について、該当する用語を解答群から全て選ぶ。\", \"model_answer\": \"ア(CIS Benchmarks)，ウ(OWASP ASVS)\", \"commentary\": \"設問3(1)は，正答率が低かった。セキュリティに関する規格，標準，フレームワークなどは多数ある。それらの目的を正確に把握し，活用していってほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④(収集する情報を必要十分な範囲に絞るため、情報収集に先立って必要な措置)とは何かを60字以内で述べる。\", \"model_answer\": \"S社のシステムを構成する実行環境のバージョン情報を把握して，その情報を常に最新にしておくこと\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄き、く(脆弱性情報が報告された際に社内で実施する内容、検証環境でパッチを適用し行う内容)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"き：ア(CVSSによる脆弱性アセスメント)、く：ウ(回帰テスト)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図6(システム変更手順)中の空欄け、こに入れる適切な字句をそれぞれ5字以内で答える。\", \"model_answer\": \"け：レビュー、こ：第三者\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄c〜h(コンテナ技術に関する用語:コンテナエンジン・アプリ・コンテナ・変更の履歴・本番・検証)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"c：オ(コンテナエンジン)、d：ア(アプリ)、e：エ(コンテナ)、f：カ(変更の履歴)、g：キ(本番)、h：ウ(検証)\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2019r01a_sc_pm2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2019, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-58\"}, {\"paper_id\": \"2019r01a_sc_pm2\", \"problem_no\": 2, \"theme\": \"OTとITが混在する工場でのランサムウェア感染対応と、APT攻撃を踏まえたネットワーク分離・無線認証・脆弱性管理・セキュリティ規程の抜本的見直し\", \"industry_setting\": \"A社(車両・産業用機械向け金属部品の製造会社。本社オフィスと3か所の工場をもち、基幹ネットワークA-NETを運用)\", \"exam_intent\": \"産業用制御システムなどのOTのシステムとITのシステムは分離すべきと言われている。しかし，実際には，中規模，又は大規模な工場であっても，OT用とIT用のネットワークが分離されていないケースが多く見られる。本問では，OTとITが混在する環境の課題を示し，それぞれの目的を念頭に置きながら，課題解決のための案を検討する。インシデント対応，APT攻撃の概念モデル，ネットワーク分離，無線アクセス認証，セキュリティ規程など，幅広い分野についての実践的な知識と，目的・条件に合わせて様々な技術を組み合わせ，課題を解決する能力を問う。\", \"topics\": [\"ランサムウェア\", \"OT/ITネットワーク分離\", \"APT攻撃(サイバーキルチェーン)\", \"データダイオード\", \"無線LAN認証(WPA2エンタープライズ/MACアドレス認証)\", \"CVSS(基本値・現状値・環境値)\", \"脆弱性管理\", \"セキュリティ規程・リスクアセスメント\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(User-Agentヘッダフィールドがcurl/7.64.0のHTTPリクエスト)について、ログに記録されたUser-Agentの値からはマルウェアによる通信と判定するのが難しいケースはどのようなケースか50字以内で述べる。\", \"model_answer\": \"User-Agentヘッダフィールドの値がA社で利用しているWebブラウザを示す値であるケース\", \"commentary\": \"設問1(1)は，正答率が低かった。社内に侵入したマルウェアを発見する手法の一つとして，社外と交換されるHTTPメッセージを監視するという手法がある。HTTPメッセージの構造，ヘッダフィールドなどについての理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図3中の空欄a(CAD-Vの開発元が公開していた脆弱性情報の対策)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"a：エ(パッチ)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"図3中の空欄b(PC-Sに対して実施する対処)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"b：ア(初期化)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3中の空欄c(ファイルTを配布していたWebサイトと併せて、社内からのアクセスをFWで遮断すべき対象)に入れる適切な字句を10字以内で答える。\", \"model_answer\": \"c：サイトU\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"表1(APT攻撃の典型的なステップ)中の空欄d〜f(正常なファイルに偽装するおとりファイルの偽装対象、長期侵入継続のため設置するもの、C&Cで受け取るもの)に入れる適切な字句を解答群から選ぶ。\", \"model_answer\": \"d：カ(ドキュメント)、e：キ(バックドア)、f：オ(攻撃者の指示)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"挙げられた活動1〜3(SNS調査、ファイルサーバからの秘密情報窃取、マルウェア入りUSBメモリ設置)が、表1中のどのステップに該当するか番号で答える。\", \"model_answer\": \"活動1：1(偵察)、活動2：7(目的の実行)、活動3：3(配送)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄g、h(MACアドレス認証を採用するAPに対し、攻撃者がAP付近で行う行為と、それにより入手できる値)に入れる適切な字句をそれぞれ10字以内で答える。\", \"model_answer\": \"g：電波を傍受、h：MACアドレス\", \"commentary\": \"設問3のgは，正答率が低かった。無線LANで利用される\\\"MACアドレス認証\\\"は，これを認証技術としてみると明らかに欠点がある。工場などでは無線LANが利用されることも多いと思われるが，採用する技術の利点や欠点，限界を正しく理解し，有効な技術を採用することに留意してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"見直し案でFA端末が表1のAPT攻撃を受け番号5のステップまで成功したと想定した場合、番号6以降のステップでのデータダイオード方式のセキュリティ上の効果は何かを25字以内で具体的に述べる。\", \"model_answer\": \"攻撃者の操作指示がFA端末に伝えられない。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"表4(各方式の評価結果)中の空欄i〜k(FW方式・中継用PC方式・データダイオード方式の、データ転送の即時性とセキュリティの評価)に入れる適切な組合せを解答群から選ぶ(重複不可)。\", \"model_answer\": \"i：オ(【え】オ)相当…FW方式=オ、j：カ相当…中継用PC方式、k：…データダイオード方式。※解答例記号:i=オ、j=カ、k=キ\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②及び下線③(USBメモリをFA端末に接続して作業する)について、FA端末のマルウェア感染リスクを低下させるために共通して接続前に行うべき措置は何かを30字以内で具体的に述べる。\", \"model_answer\": \"USBメモリをマルウェア対策ソフトでスキャンする。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"事務LAN用、センサNET用の認証サーバをどこに設置するのが適切か、図1中の(あ),(い)及び図5中の(う)〜(か)から選び記号で答える。\", \"model_answer\": \"事務LAN用：(い)、センサNET用：(か)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"APへの不正接続を考慮した場合、図5のネットワーク構成が図4に比べプロジェクトWの目的達成の面で優れていると考えられる点及びその理由を、安全な転送の仕組みを導入しなかった場合を想定して60字以内で具体的に述べる。\", \"model_answer\": \"事務LANとセンサNETはF-NETと分離されており，APに不正接続してもFA端末を攻撃できないから\", \"commentary\": \"設問5(2)は，正答率が低かった。ネットワークの構成を工夫することで，リスクを回避，又は低減できるケースは多い。ネットワーク構成の変更の効果を正確に捉え，理解する力を高めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問6(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"表5中の下線④(その時点での自社にとっての深刻度を評価する際の値)について、この値はどれか解答群から選ぶ。\", \"model_answer\": \"イ(CVSS環境値)\", \"commentary\": \"設問6(1)は，正答率が低かった。脆弱性情報について評価する際に役立つCVSSについての設問であった。CVSSには基本値，現状値，環境値の三つがある。これらを正しく理解し，妥当かつ効果的な脆弱性対策の実現に有効活用してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問6(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表5中の下線⑤について、図5中の業務サーバのソフトウェアにネットワーク経由での遠隔操作につながる可能性がある深刻度の高い脆弱性が見つかった場合に、A-NETへの被害を防ぐために適切と考えられる措置の例を二つ、それぞれ25字以内で具体的に述べる。\", \"model_answer\": \"①当該脆弱性に対応したパッチを適用する。 ②脆弱性をもつソフトウェアの利用を停止する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問7(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"図4中の工場LAN・標準PC・FA端末、及び図5中の事務LAN・F-NET・センサNET・標準PC・FA端末は、図2のセキュリティ規程に従うとそれぞれどの部門が管理を担うことになるか、適切な部門を解答群から選ぶ。\", \"model_answer\": \"図4→工場LAN：エ(システム部)、標準PC：エ(システム部)、FA端末：ア(α工場)。図5→事務LAN：エ(システム部)、F-NET：ア(α工場)、センサNET：ア(α工場)、標準PC：エ(システム部)、FA端末：ア(α工場)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問7(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑥(申請時に書面に記す事項を追加する)について、追加すべき事項を二つ挙げ、本文中の用語を用いてそれぞれ20字以内で具体的に述べる。\", \"model_answer\": \"①各部門が定めた管理・維持のための措置 ②リスクアセスメントの結果\", \"commentary\": \"設問7(2)は，正答率が低かった。ネットワークやシステムの運用に責任をもつ部署が知るべきこと，判断に必要な情報について理解しておいてほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2019r01a_sc_pm2.json\", \"problem_type\": \"抽象的リスク管理型\", \"year\": 2019, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-59\"}, {\"paper_id\": \"2020r02o_sc_pm1\", \"problem_no\": 1, \"theme\": \"スマートフォンを用いたモバイル決済アプリのなりすまし対策とパスワードリスト攻撃対策\", \"industry_setting\": \"全国500店舗を展開する従業員数10,000名の飲食業者N社\", \"exam_intent\": \"モバイル決済が身近なものになってきた。しかし，一たび設計を誤ると，不正な決済が行われるリスクが生じる。モバイル決済でバーコード又はQRコードを使用する場合は，なりすまし対策をバーコード若しくはQRコードそのもの又はアプリケーションプログラムに行うことがポイントとなる。また，近年は，スクリーニングによってパスワードリスト攻撃の精度が向上している。攻撃者にスクリーニングを行われないような対策が必要である。本問では，スマートフォン用決済アプリケーションプログラムの開発を題材に，メッセージ認証を用いたなりすまし対策及びスクリーニング対策を検討する能力を問う。\", \"topics\": [\"バーコード決済\", \"QRコード\", \"HMAC\", \"メッセージ認証\", \"サーバ証明書検証\", \"subjectAltName\", \"パスワードリスト攻撃\", \"スクリーニング\", \"2段階認証\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"会員番号をバーコード表示する仕様で、どのような手段でなりすまし決済ができるか(30字以内)、及びその攻撃が成功してしまう決済アプリにおける問題(25字以内)を具体的に述べる。\", \"model_answer\": \"手段: ・他者のバーコードを会員番号から推測して表示する。 ・他者の会員番号を窃取してバーコードを生成し，決済する。 / 問題: ・バーコードの内容が会員番号であること ・バーコードが永続的に利用できること\", \"commentary\": \"設問1(1)\\\"問題\\\"は，正答率がやや低かった。本問で扱うバーコードは，仕様上，決済のなりすましにつながるおそれがある。決済のなりすましが成功してしまう原因と防ぐ手段をよく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3のQRコード検証手順の空欄aに入る適切な字句を30字以内で述べる(HMAC値による検証手順)。\", \"model_answer\": \"a: HMAC値αとHMAC値βの一致を検証する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①(攻撃者が無線LANルータの設定を変更する)について、攻撃者はどの設定項目の内容をどのように変更するか。変更する設定項目を表5から記号で選び、変更後の設定内容を25字以内で述べる。\", \"model_answer\": \"変更する設定項目: い / 変更後の設定内容: 攻撃者のDNSサーバのIPアドレス\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図4のサーバ証明書の検証条件の空欄b～dに入る字句を答える。b,dは解答群から記号で、cは5字以内で答える。\", \"model_answer\": \"b: オ(subjectAltName) / c: FQDN / d: イ(commonName)\", \"commentary\": \"設問2(2)は，正答率が低かった。サーバ証明書のフィールドと，その検証方法をよく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②(事前にスクリーニングを実行したパスワードリスト)について、Nシステムのどのような挙動を利用してスクリーニングを実行したと考えられるか、40字以内で具体的に述べる。\", \"model_answer\": \"メールアドレスが会員登録されているかどうかで表示が異なるという挙動\", \"commentary\": \"設問3(1)は，正答率がやや高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③(表3の会員登録処理を修正)について、表3中の修正すべき処理を記号で答え、どのように修正すべきか修正後の処理を25字以内で述べる。\", \"model_answer\": \"修正すべき処理: 2-b / 修正後の処理: 2-aと同じメッセージを表示する。\", \"commentary\": \"(2)\\\"修正後の処理\\\"の正答率は平均的だった。\\\"修正後の処理\\\"では，登録されているメールアドレスにエラーを通知するといった誤った解答が多かった。スクリーニングを防止するには，会員登録されている場合とされていない場合で表示内容を同じにする必要があることをよく理解してほしい。\", \"low_accuracy\": false}], \"_source_file\": \"2020r02o_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2020, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-60\"}, {\"paper_id\": \"2020r02o_sc_pm1\", \"problem_no\": 2, \"theme\": \"S/MIMEを用いた委託先との電子メールの暗号化とディジタル署名による送信者検証\", \"industry_setting\": \"従業員数100名のシステム開発会社R社\", \"exam_intent\": \"コミュニケーション手段は多様化しているが，コミュニケーション手段としての電子メールは欠かせない。しかし，多くの電子メールは平文での送受信となっている。さらに，送信者メールアドレスの詐称によるフィッシングも起きている。これらの問題を，暗号化及びディジタル署名によって解決する手段の一つがS/MIMEである。本問では，委託先との間の，電子メールの暗号化を題材に，S/MIMEを使った電子メールシステムの設計能力を問う。\", \"topics\": [\"S/MIME\", \"電子メール暗号化\", \"ディジタル署名\", \"クライアント証明書\", \"OCSP\", \"LDAP\", \"証明書失効\", \"メーリングリスト\", \"SMTP over TLS\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表1中の空欄a(ディレクトリへのアクセスに標準でTCPポート389番を使用するプロトコル)に入る適切なプロトコル名を英字5字以内で答える。\", \"model_answer\": \"a: LDAP\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄b(RFC 6960で規定され、サーバ証明書が失効していないことを確認するのに利用する仕組み)に入る適切なプロトコル名を英字5字以内で答える。\", \"model_answer\": \"b: OCSP\", \"commentary\": \"設問1(2)は，正答率がやや低かった。SSHやFTPといった解答が散見された。OCSPは，X.509公開鍵証明書の失効状態をタイムリーに確認できるプロトコルである。OCSPの仕組みをよく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(メールの通信を暗号化しただけでは表3の項番1を満たせない)の理由を35字以内で述べる。\", \"model_answer\": \"メールサーバ上では，メールが暗号化されていないから\", \"commentary\": \"設問2(1)は，正答率が平均的であった。SMTP over TLS及びPOP3 over TLSによって，通信は暗号されるが，メールサーバ上の電子メールは暗号化されていないということをよく理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄c(攻撃者が委託先を装って用意し、その真正性を確認して検出できる対象)に入る適切な字句を10字以内で答える。\", \"model_answer\": \"c: メールサーバ\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②(復号できなくなる場合に備えて復号してファイルサーバに保存する)について、復号できなくなるのはどのような場合か25字以内で述べる。\", \"model_answer\": \"復号に必要な秘密鍵を意図せず削除した場合\", \"commentary\": \"設問2(3)は，正答率が高かった。S/MIMEでの電子メールの復号の仕様について，よく理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄d～gに入る適切な字句を答える。d,fは10字以内、e,gは5字以内。(S/MIME証明書によるディジタル署名・検証、及びML宛メールの暗号化案の関係者)\", \"model_answer\": \"d: ディジタル署名 / e: 検証 / f: MLの登録メンバ / g: ML\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2020r02o_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2020, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-61\"}, {\"paper_id\": \"2020r02o_sc_pm1\", \"problem_no\": 3, \"theme\": \"ECサイトのポイントシステムに対する脆弱性診断計画の策定\", \"industry_setting\": \"ECサイトを運営する従業員数800名のL社(ポイントサービス部が管理するPシステム)\", \"exam_intent\": \"情報システムのセキュリティ対策が適切に行われているかどうかを確認する手段として，専門業者による脆弱性診断サービスを受ける企業が増加してきている。診断を受ける企業において，診断効果を高めるためには，診断要件や目標を診断計画として定義することが必要である。本問では，ECサイトへの脆弱性診断を題材に，診断を受ける企業での診断計画の策定能力を問う。\", \"topics\": [\"脆弱性診断\", \"プラットフォーム診断\", \"Webアプリケーション診断\", \"ネットワーク型IPS\", \"ホスト型IPS\", \"ホワイトリスト\", \"ステージング環境\", \"ファイアウォール\", \"診断計画\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(N-IPSの脅威通信判定を無効にすると、より多くの脆弱性を検出する可能性がある)について、その理由を35字以内で述べる。\", \"model_answer\": \"N-IPSで遮断されていたPF診断の通信が通過するから\", \"commentary\": \"設問1は，(1)の正答率が高かった。プラットフォーム診断を実施する際のネットワーク型IPSの基本的な挙動は，よく理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②(N-IPSの設定を変更すれば、無効にすることによるリスクは生じない)について、どのような設定変更をすべきか、設定変更の内容を30字以内で述べる。\", \"model_answer\": \"ホワイトリストに診断PCのIPアドレスを登録する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中及び表2中の空欄a(内部ネットワークからのPF診断で診断PCを接続する箇所)に入る接続箇所を、図1中の接続点(a)～(f)の記号で答える。\", \"model_answer\": \"a: (a)\", \"commentary\": \"(3)は正答率が低かった。診断PCの接続箇所を，管理LANにある接続箇所から選択した誤った解答が多かった。表2の\\\"診断1\\\"は，インターネットから本番Webサーバへの攻撃を想定した診断を内部のネットワークから実施するものであり，管理LANからでは適切な診断ができない。脆弱性診断の計画策定においては，どのような脅威を想定したものなのかを念頭に置くことが重要である。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄b(ステージング環境での診断終了後に削除すべきもの)に入る適切な字句を15字以内で具体的に答える。\", \"model_answer\": \"b: 診断用の利用者ID\", \"commentary\": \"設問2(1)～(3)は，診断対象システムの業務影響や，既存のセキュリティ機器の運用への影響に関するマネジメントの問題であった。診断において重要であるので，よく理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③(計画の一部を変更する)について、何をどのように変更すべきか。Pシステムの通信量に着目し、変更する項目を表2から選び、変更する内容を20字以内で述べる。\", \"model_answer\": \"変更する項目: 日時 / 変更する内容: 診断時間を0時～8時の間にする。\", \"commentary\": \"設問2(1)～(3)は，診断対象システムの業務影響や，既存のセキュリティ機器の運用への影響に関するマネジメントの問題であった。診断において重要であるので，よく理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④(機器の設定の変更を依頼する)について、どの機器に対してどのように設定を変更すべきか。機器を図1中から選び、変更後の設定を55字以内で具体的に述べる。\", \"model_answer\": \"機器: 本番DBサーバ / 変更後の設定: ホスト型IPSのホワイトリスト設定に，診断PCのIPアドレスを登録し，侵入検知設定を無効にする。\", \"commentary\": \"設問2(1)～(3)は，診断対象システムの業務影響や，既存のセキュリティ機器の運用への影響に関するマネジメントの問題であった。診断において重要であるので，よく理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄c,dに入る適切な字句を図1中から選び、空欄eに入る適切な字句(許可又は拒否のいずれか)を答える。(FW2ルールの再発防止策)\", \"model_answer\": \"c: 本番DBサーバ / d: DB管理PC / e: 許可\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2020r02o_sc_pm1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2020, \"season\": \"秋\", \"part_label\": \"午後I\", \"uid\": \"pm-62\"}, {\"paper_id\": \"2020r02o_sc_pm2\", \"problem_no\": 1, \"theme\": \"企業合併に伴う複数WebサイトのアカウントB統合・共通利用（リスク分析とセキュアプログラミング）\", \"industry_setting\": \"旧A社と旧B社が合併したC社（百貨店・クレジットカード・オンラインストアを運営）\", \"exam_intent\": \"情報システムの構築時にはリスク分析を行うが，運用開始後の改修時やほかのシステムとの機能統合時にはリスク分析が行われていない場合が見受けられる。リスク分析は，システムのセキュリティを確保するための重要な工程の一つであり，ここで不備があると後続の工程に悪影響を及ぼす。本問では，企業の合併に伴う複数のWebサイトの統合を題材に，リスク分析を行う能力，及びWebアプリケーションプログラムにおけるセキュアプログラミングの能力を問う。\", \"topics\": [\"ファイアウォールのルール設計\", \"個人情報保護法\", \"セキュアプログラミング（Java）\", \"アカウント共通利用\", \"LDAP\", \"パスワードリセットの脆弱性\", \"SAML Web Browser SSO Profile\", \"IdP/SP\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"変更後のFW-Pのルール（表2）で，送信元Web-Pに対する宛先aとプロトコルbに入れる適切な字句を答える。サイトP運用にはWeb-PからLDAP-Pへの通信が必要。\", \"model_answer\": \"a：LDAP-P，LDAP-Q，LDAP-R ／ b：LDAP\", \"commentary\": \"設問1aは正答率が低かった。サイトPを運用するために，Web-PからLDAP-Pへの通信が必要だという点を考慮できていない解答が多かった。ファイアウォールの設定は，セキュリティ確保の基本なので，細心の注意を払う必要があることに留意してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"旧A社と旧B社の合併によるC社への事業承継に伴って取得した個人情報の取扱いに関し，個人情報保護法に定められている禁止事項は何か（70字以内）。\", \"model_answer\": \"本人の同意を得ないで，承継前における当該個人情報の利用目的の達成に必要な範囲を超えて，当該個人情報を取り扱ってはならない。\", \"commentary\": \"設問2は正答率がやや低かった。消費者向けのWebサイトでは，個人情報を取り扱うことが多いので，個人情報保護に関する法規制について，よく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"コードレビューの本文中の空欄c，d，f，gに入れる適切な字句を解答群から選ぶ（メソッド呼び出し・変数・例外などの記号）。\", \"model_answer\": \"c：ウ（idPair.childID） ／ d：ア（idPair.checkChild()） ／ f：ケ（NamingException） ／ g：イ（idPair.childChecked）\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄e，hに入れる適切な図3又は図4中の行番号を解答群から選ぶ。\", \"model_answer\": \"e：ウ（26） ／ h：キ（117）\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"K主任が図3の32行目前後に着目して提示した修正案（空欄i）を50字以内で具体的に述べる。認証未成功のまま紐付けが行われる不具合の修正。\", \"model_answer\": \"NamingExceptionを投げる前に，childCheckedをfalseにする\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"サイトRのパスワード失念時処理の三つ目の問題（空欄j）を40字以内で述べる。\", \"model_answer\": \"パスワードを，本人以外のメールアドレスに送ることができる\", \"commentary\": \"設問2と設問4では，リスク分析について出題した。設問4は正答率が平均的であった。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"二つ目と三つ目の問題の解決のためにどう改修すべきか（空欄k）を40字以内で述べる。\", \"model_answer\": \"パスワードリセットのURLを，登録済みメールアドレスだけに送る\", \"commentary\": \"設問2と設問4では，リスク分析について出題した。設問4は正答率が平均的であった。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について，アカウントの共通利用を提供していた場合に発生する更に大きな被害（具体的な被害）を二つ，それぞれ30字以内で述べる。\", \"model_answer\": \"・サイトPでポイントが不正に利用される。 ／ ・サイトQでA百貨店の商品が不正に購入される。\", \"commentary\": \"設問2と設問4では，リスク分析について出題した。設問4は正答率が平均的であった。\", \"low_accuracy\": false}, {\"setmon\": \"設問5(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"図7のとおり画面遷移した場合，（い）（う）の画面が図6の(1)〜(4)のどの時点で表示されるかを記号で答える。\", \"model_answer\": \"（い）：(2) ／ （う）：(4)\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図7のとおり画面遷移した場合，（あ）（い）（う）の各画面がどのサーバ（SP／IdP）から送られたHTMLを表示するかを○印で示す。\", \"model_answer\": \"（あ）：SP ／ （い）：IdP ／ （う）：SP\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問5(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"図8の（え）（お）（か）（き）（く）（け）の順に画面遷移した場合，（え）（か）（き）（く）の各画面がどのサーバ（SP／IdP）から送られたHTMLを表示するかを○印で示す。\", \"model_answer\": \"（え）：SP ／ （か）：IdP ／ （き）：IdP ／ （く）：SP\", \"commentary\": \"設問3と設問5では，Javaを題材として，Webアプリケーションプログラムにおけるセキュアプログラミングについて出題した。いずれも正答率が高かった。\", \"low_accuracy\": false}], \"_source_file\": \"2020r02o_sc_pm2.json\", \"problem_type\": \"コード・プロトコル深掘り型\", \"year\": 2020, \"season\": \"秋\", \"part_label\": \"午後II\", \"uid\": \"pm-63\"}, {\"paper_id\": \"2020r02o_sc_pm2\", \"problem_no\": 2, \"theme\": \"働き方改革のためのマルチクラウドを活用したテレワーク環境の構築とクラウド利用時のリスク評価\", \"industry_setting\": \"従業員数5,000名のIT企業E社（システム企画部が主導するテレワーク実証実験）\", \"exam_intent\": \"昨今，パブリッククラウドの活用が進んでいる。一方，パブリッククラウドを利用する上でのセキュリティ対策を利用者が適切に設計・設定していなかったことによる情報漏えい事故も多発している。また，ゼロトラストという概念をよく聞くようになった。それに基づけば，通信相手を常に認証する必要があるが，例えば多要素認証に対応した，クラウドサービスの認証基盤（IDaaS）やMDMなど，そのための技術，環境が整ってきている。本問では，働き方改革のためのマルチクラウドを活用したテレワーク環境の構築を題材に，クラウドサービス利用時のリスクを適切に評価する能力を問う。\", \"topics\": [\"ゼロトラスト\", \"多要素認証・OTP（TOTP）\", \"IDaaS\", \"OpenID Connect（認可コードフロー／Implicitフロー）\", \"MDM・クライアント証明書によるデバイス認証\", \"仮想デスクトップ（VDI/DaaS）\", \"EDR\", \"情報持ち出し対策\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①について，QRコードに含まれOTPアプリがOTPの生成に使用する情報を解答群から選ぶ。\", \"model_answer\": \"イ（シェアードシークレット）\", \"commentary\": \"設問1(1)は，正答率が低かった。知識として知らなくとも，ワンタイムパスワード生成に求められる要件から，QRコードには第三者に推測されない秘密情報が含まれている必要があると考えられれば解答できる問題であった。\", \"low_accuracy\": true}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について，QRコード表示機能へのアクセスをE社のネットワークからだけに制限しなかった場合，OTPについてどのような問題が起きると考えられるか（30字以内）。\", \"model_answer\": \"第三者のOTPアプリで不正にOTPを生成される。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"図2（OpenID Connect認可コードフロー）及び図3（Implicitフロー）中の空欄a〜fに入れる適切な通信メッセージ又は処理を解答群から選ぶ。\", \"model_answer\": \"a：ウ（トークン要求） ／ b：エ（認可コードを検証） ／ c：イ（トークン応答） ／ d：ア（トークンを検証） ／ e：カ（ユーザ情報要求） ／ f：オ（ユーザ情報応答）\", \"commentary\": \"設問1(3)は，正答率が高かった。発行された秘密情報（トークンや認可コード）をどのタイミングで検証すれば認証の安全性が担保されるかがよく理解されていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について，クリップボード・ディスク共有を禁止しても利用者が故意に社内情報を持ち出せる方法（ノートPCを介して持ち出す方法）を30字以内で具体的に述べる。\", \"model_answer\": \"社内情報を表示した画面をカメラで撮影するという方法\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④について，マルウェアが社内情報を取得する方法を35字以内で具体的に述べる。\", \"model_answer\": \"社内情報を表示した画面のスクリーンショットを取るという方法\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線⑤について，T環境内のアクセスも必要最小限にする場合，許可するアクセス先を解答群から全て選ぶ。\", \"model_answer\": \"ア（DaaS-V），ウ（IDaaS-Y），エ（MDM-W）\", \"commentary\": \"設問3(2)は，正答率がやや低かった。ノートPCからアクセスするクラウドサービスと，仮想デスクトップからアクセスするクラウドサービスを混同した解答が散見された。\", \"low_accuracy\": true}, {\"setmon\": \"設問4\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑥について，利用者による脆弱性検査が許可されない中で，脆弱性検査を代替する別の方法を35字以内で述べる。\", \"model_answer\": \"セキュリティ対策についての第三者による監査報告書で確認するという方法\", \"commenta part_label\": \"午後(統合)\", \"uid\": \"pm-86\"}, {\"paper_id\": \"2023r05a_sc_pm\", \"problem_no\": 3, \"theme\": \"継続的インテグレーション(CI)サービスで発生したインシデントへの対応と、攻撃の波及影響の推測・対策立案\", \"industry_setting\": \"C社のクラウド基盤上でCIサービス(Nサービス)を提供するN社と、その顧客である従業員1,000名の資金決済事業者P社(決済用Pアプリを提供)\", \"exam_intent\": \"クラウドサービスが広く浸透している。様々なクラウドサービスの活用は，組織に多くの利便性をもたらす一方で，クラウドサービスで発生したインシデントが，自組織にも影響を及ぼし得る。このようなインシデントが発生した場合，迅速に状況を把握し，影響を考慮して対処することが重要である。本問では，継続的インテグレーションサービスを提供する企業とその利用企業におけるインシデント対応を題材に，攻撃の流れと波及し得る影響を推測し，対策を立案する能力を問う。\", \"topics\": [\"コンテナ仮想化\", \"TOTPフィッシング\", \"Certificate Transparency(証明書発行ログ)\", \"ドメインフロンティング(SNI偽装)\", \"WebAuthn\", \"コード署名\", \"HSM\", \"シークレット漏えい\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記号選択\", \"prompt_summary\": \"下線①「コンテナによる仮想化の脆弱性を悪用しなくても成功してしまうもの」に該当する不正なコマンドの処理を解答群から全て選ぶ\", \"model_answer\": \"ウ, エ\", \"commentary\": \"正答率がやや低かった。コンテナにおけるシステムの動作は，仮想化技術の基本である。どのような権限や仕組みによって実行されるか，コンテナを使ったシステムの構成及び特性をよく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②の攻撃者による不正ログインの方法を50字以内で具体的に述べる\", \"model_answer\": \"偽サイトに入力されたTOTPを入手し，そのTOTPが有効な間にログインした。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線③のRFC 9162で規定されている技術を解答群から選ぶ\", \"model_answer\": \"ア (Certificate Transparency)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線④(監視ソフトウェアに検知されないようSNIを偽装)のような手法の名称を解答群から選ぶ\", \"model_answer\": \"イ (ドメインフロンティング)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑤のプロセスYがシークレットを取得するのに使った方法を35字以内で述べる\", \"model_answer\": \"/procファイルシステムから環境変数を読み取った。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(5)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図2下線⑥について、偽サイトでログインを試みても不正ログインを防ぐWebAuthnの仕組みを40字以内で述べる\", \"model_answer\": \"認証に用いる情報に含まれるオリジン及び署名をサーバが確認する仕組み\", \"commentary\": \"正答率が低かった。WebAuthnをクライアント証明書認証やリスクベース認証などほかの認証方法と誤認した解答が多かった。WebAuthnはフィッシング耐性がある認証方法である。Passkeyという新たな方式も登場し，普及し始めている。ほかの認証方法とどのように異なるのか，技術的な仕組みを含め，よく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(6)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図2の空欄a(サーバ証明書を発行できる認証局を限定するために権威DNSサーバに設定するレコード)を解答群から選ぶ\", \"model_answer\": \"ア (CAA)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑦について、Kさんが開始した対応を踏まえ予想される攻撃を40字以内で述べる\", \"model_answer\": \"有効なコード署名が付与された偽のPアプリをJストアにアップロードする攻撃\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑧について、STORE_API_KEYとして登録されていた認証用APIキーに必要な対応を20字以内で述べる\", \"model_answer\": \"J社のWebサイトから削除する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑨について、コード署名を付与する際にHSMを使うことで得られるセキュリティ上の利点を20字以内で述べる\", \"model_answer\": \"秘密鍵が漏れないという利点\", \"commentary\": \"正答率がやや低かった。“電子署名を暗号化できる”，“秘密鍵が漏えいしても安全である”などといった，暗号技術の利用方法についての不正確な理解に基づく解答が散見された。HSMを使うセキュリティ上の利点に加えて，暗号技術の適正な利用方法についても，正確に理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線⑩について、Kさんの二つの対応によってPアプリ利用者に生じているかもしれない影響と、それを解消するための対応をそれぞれ20字以内で述べる\", \"model_answer\": \"影響：Pアプリを起動できない。 対応：Pアプリをアップデートする。\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2023r05a_sc_pm_p2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2023, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-87\"}, {\"paper_id\": \"2023r05a_sc_pm\", \"problem_no\": 4, \"theme\": \"業務委託関係にある企業間での受注情報(個人情報)の機密性に関するリスクアセスメントとリスク低減策の立案\", \"industry_setting\": \"国内5店舗を営業するG百貨店と、贈答品の配送・在庫管理を受託する従業員100名の地域運送会社W社\", \"exam_intent\": \"情報資産を保護するためには，リスクを洗い出すことが出発点となる。リスクを洗い出した後，そのリスクによる情報資産への影響を分析した上で，対策の必要性を評価し，具体的な対策の内容を検討することが重要である。これらのリスクアセスメントからリスク対応までのプロセスを適切に行えることが，情報処理安全確保支援士（登録セキスぺ）には要求される。本問では，業務委託関係にある百貨店と運送会社を題材に，リスクアセスメントを実施する能力，及び個々のリスクを低減するための対策を立案する能力を問う。\", \"topics\": [\"リスクアセスメント\", \"リスク特定/分析/評価\", \"リスクレベル評価\", \"標的型攻撃\", \"フィッシング\", \"EDR\", \"URLフィルタリング\", \"多要素認証\", \"内部不正\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表4及び表5中のア〜エに入れる字句(ア:関連する情報セキュリティの状況の項番、イ:被害の大きさ、ウ:総合評価、エ:リスク1-1の追加すべき管理策)を答える\", \"model_answer\": \"ア：10，11，12，13 ／ イ：大 ／ ウ：C ／ エ：G百貨店で，SサービスへログインできるIPアドレスをW社プロキシだけに設定する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表4中の空欄あ(リスク番号2-4のW社外の第三者によるサイバー攻撃の行為又は事象)を、本文の状況設定に沿う範囲で自身の知見に基づき答える\", \"model_answer\": \"(①～③の例に限らず，本文に示した状況設定に沿うリスクアセスメントの結果が記述されていること) ① G百貨店からW社への連絡を装った電子メールに未知のマルウェアを添付して，配送管理課員宛てに送付する。 ② 配送管理課員がよく閲覧するWebサイトにおいて，脆弱性を悪用するなどして，配送管理課員が閲覧した時に，未知のマルウェアを別のWebサイトからダウンロードさせるようにWebページを改ざんする。 ③ W社からアクセスすると未知のマルウェアをダウンロードする仕組みのWebページを用意した上で，そのURLリンクを記載した電子メールを，G百貨店からW社への連絡を装って送信する。\", \"commentary\": \"リスクアセスメントの中でもリスク特定は担当者の知見が重要なプロセスである。多くの受験者が適切な解答を記述していたが，特定したリスクが具体性に欠けており，リスク分析の段階で被害の大きさや発生頻度の評価ができていない解答が散見された。また，“W社外の第三者”や“W社へのサイバー攻撃”といったリスクの前提に合っていない解答も一部に見られた。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"解答したあの内容に基づき、表4及び表5中のい〜き(い:機密性への影響に至る経緯、う:情報セキュリティの状況の項番、え:被害の大きさ、お:発生頻度、か:総合評価、き:追加すべき管理策)を答える\", \"model_answer\": \"(あの①～③に対応する例) ① い：配送管理課員が，添付ファイルを開き，配送管理用PCが未知のマルウェアに感染した結果，IDとPWを周知するメールが読み取られ，SサービスのIDとPWが窃取される。そのIDとPWが利用されて，W社外からSサービスにログインされて，Z情報が漏えいする。／う：2，3，5，6，9，12／え：大／お：高／か：A／き：配送管理用PCにEDRを導入し，不審な動作が起きていないかを監視する。 ② い：配送管理課員が，改ざんされたWebページを閲覧した結果，マルウェアをダウンロードしてPCがマルウェアに感染する。マルウェアがキー入力を監視して，配送管理課員がSサービスにアクセスした際にIDとPWが窃取される。そのIDとPWが利用されて，W社外からSサービスにログインされ，Z情報がW社外のPCなどに保存される。／う：2，3，6／え：大／お：低／か：C／き：プロキシサーバのURLフィルタリング機能の設定を変更して，配送管理用PCからアクセスできるURLを必要なものだけにする。 ③ い：配送管理課員が，電子メール内のURLリンクをクリックすると，配送管理用PCが未知のマルウェアに感染する。PC内に残っていたZ情報を一括出力したファイルが，マルウェアによって攻撃者の用意したサーバに送信され，Z情報が漏えいする。／う：2，3，5，6，9，10／え：大／お：高／か：A／き：全てのPCとサーバに
