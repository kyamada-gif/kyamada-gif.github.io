してメールを転送するプロトコル)に入れる適切な字句を英字10字以内で答える。\", \"model_answer\": \"SMTPS\", \"commentary\": \"正答率が平均的であった。“S/MIME”といった解答が散見された。“S/MIME”は，MIME の仕組みを使ったメール本文及び添付ファイルの暗号化の方式であって，SMTP を暗号化する方式ではない。メールに関連する暗号技術及び通信プロトコルについて，よく理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の下線①(DKIMレコードの名称として使用するFQDN)を、表6のsタグ(z2024)及びdタグ(z-sha.co.jp)を基に解答群から選び記号で答える。\", \"model_answer\": \"エ (z2024._domainkey.z-sha.co.jp)\", \"commentary\": \"正答率が低かった。DKIM の仕組み及び表6 のタグの内容を用いれば，正答を導くことができる。DKIM の仕組みについて，よく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図4中の空欄d(Mail-Step1の送信対応で特定のアクションを要求しないDMARCポリシー)に入れる適切な字句を解答群から選び記号で答える。\", \"model_answer\": \"イ (none)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表7中の下線②(第三者がコンテンツを細工しWebサイトの見た目を変えずに顧客に影響を及ぼす攻撃)について、攻撃の方法を具体的に答える。\", \"model_answer\": \"ソフトウェア修正プログラムに見せかけたマルウェアをダウンロードさせる。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"表7中の下線③(第三者が社外サービスからA社ドメイン名のメールアドレスへのメールを受信し続きの攻撃を行う悪用)について、受信するメールの内容及び続きの攻撃の例を具体的に答える。\", \"model_answer\": \"メール:社外サービスのパスワード再設定画面のURL が書かれたメール。 攻撃:任意のパスワードを設定し，アカウントを乗っ取る。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"図5中の空欄e(A社ドメイン名のSPFレコードで、DMARCの受信対応を行った組織がメールを拒否できるようにする設定値)に入れる適切な字句を解答群から選び記号で答える。\", \"model_answer\": \"ア (-all)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の下線④(表3の項番3での登録内容を見直す)について、一斉配信メール(Tサービス)が届くようにするための見直しの内容を具体的に答える。\", \"model_answer\": \"SPF レコードに，T サービスのメール送信元IP アドレスを追加する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図8中の下線⑤について、メーリングリスト(Yサービス)経由でSPFによる認証及びDKIMによる認証の両方に失敗する理由を、Sサービスへの登録内容とYサービスの仕様を含めてそれぞれ具体的に答える。\", \"model_answer\": \"SPF:SPF レコードにY サービスの情報が登録されていないのに，メールがY サービスから送られる。 DKIM:DKIM レコードのh タグにSubject が含まれているのに，Y サービスでメールのSubject が変わる。\", \"commentary\": \"設問5(2)SPF は，正答率がやや低かった。メールのSubject に通番情報を付加するといった解答が散見された。SPF では，Subject を判定対象としていない。SPF の仕組みについて，よく理解してほしい。設問5(2)DKIM は，正答率が平均的であった。表6 のh タグにおいて，Subject を判定対象として含んでいる。メールのSubject に通番情報を付加すると，DKIM による認証が失敗する。DKIM の仕組みと，メーリングリストの設定を理解した上で，解答してほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2024r06a_sc_pm_fix2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2024, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-94\"}, {\"paper_id\": \"2024r06a_sc_pm\", \"problem_no\": 1, \"theme\": \"ソフトウェア開発会社の社内システムでのマルウェア感染インシデント対応とログ解析\", \"industry_setting\": \"従業員100名のソフトウェア開発会社（L社）の社内システム。E社SaaSを利用し、シンクライアントPCから仮想PCへRDP接続して業務を行う環境。\", \"exam_intent\": \"サイバー攻撃はエンドポイントへの侵入から始まることが多い。攻撃者は，マルウェアを仕掛けた後に，より高い権限の奪取を試みたり，ほかのエンドポイントを探索したりする。そのため，エンドポイントのセキュリティ対策としてログの分析が重要になってきている。インシデント発生時に迅速に対応するためには，どのような攻撃を受けているのかをログから推測・確認する対応力が必要となる。本問では，ソフトウェア開発会社の社内システムの運用及びインシデント対応を題材として，ログを解析する能力及び技術的対策を立案する能力を問う。\", \"topics\": [\"マルウェア感染\", \"インシデントレスポンス\", \"ログ解析\", \"RDP接続による横展開(ラテラルムーブメント)\", \"コネクトバック通信(C2)\", \"PowerShell\", \"URLフィルタリング\", \"情報持出し(DLP)\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中及び図3中の空欄a（表3のログから、PC-Aからマルウェア感染が拡大している可能性があるホスト名）を答える。\", \"model_answer\": \"PC-C\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄b（アカウントcでアクセス可能なファイルが送信されたおそれのあるホスト名）を答える。\", \"model_answer\": \"filesv\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中及び図3中の空欄c（マルウェアがアクセスに使ったアカウント名）を、表3の注記1に従って答える。\", \"model_answer\": \"ad01\\\\user019\", \"commentary\": \"設問1(3)は，正答率が高かった。被害の可能性を複数のログから適切に読み取ることができていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3中の空欄d（ドメインサーバでアカウントcに対して行う暫定対策）を10字以内で答える。\", \"model_answer\": \"無効化\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(5)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"図3中の下線①について、ファイルの送信を防ぐためにプロキシサービスで行う対策の内容を具体的に答える。\", \"model_answer\": \"全てのドメインユーザーに対して，https://△△△.com/，https://□□□.com/及びhttps://〇〇〇.com/を管理者拒否リストに登録する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(6)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図3中の下線②について、マルウェアに感染しているL社内ホストがないか調べる調査の内容を具体的に答える。\", \"model_answer\": \"https://○〇○.com/，https://△△△.com/又はhttps://□□□.com/に通信したL社内ホストがないか調査する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(7)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"本文中の下線③（追加調査の3、L社内ホスト全てに対する新たな調査）について、調査の内容を具体的に答える。\", \"model_answer\": \"タスク名がinstallであるタスクが登録されているL社内ホストがないか調査する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(8)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の下線④（図4のマルウェアの活動を自動的に検出する新たな仕組み）について、検出する仕組みを二つ答える。\", \"model_answer\": \"・マルウェア対策サービスのログから，マルウェア対策ソフトが停止したL社内ホストを検出する。／・ドメインサーバのログから，RDP接続をくり返しているL社内ホストを検出する。（順不同で二つ解答）\", \"commentary\": \"設問1(8)は，正答率が平均的であった。どのログを確認するかの記述がない解答が多かった。マルウェアの動作によって，どのログに何が記録されているかを考え，検知の仕組みを設計できる能力を培ってほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表6中の空欄e・f（攻撃者による目的実行までの活動を阻止する技術的対策。e:PC-Aからマルウェア感染を広げた活動への対策、f:q.ps1がファイルを不正に持ち出した活動への対策）に入れる字句を答える。\", \"model_answer\": \"e：仮想PCへのRDP接続に対して，IPアドレスによる接続元制限を行う ／ f：L社内にDLPを導入し，ファイルの持出しを制限する\", \"commentary\": \"設問2fは，正答率がやや低かった。ファイルサーバのアクセス権を最小限にするといった解答が散見されたが，マルウェアは，特別な権限なしにファイルを持ち出している。ファイルの持出しに対する技術的対策は複数考えられるが，インシデントで起きたファイルの持出しを防止できる対策を選択してほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2024r06a_sc_pm_p1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2024, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-95\"}, {\"paper_id\": \"2024r06a_sc_pm\", \"problem_no\": 3, \"theme\": \"ECサイトのWebスキミングによるクレジットカード情報の漏えい調査と対策\", \"industry_setting\": \"インテリアを扱うECサイトを運営するJ社（従業員200名）\", \"exam_intent\": \"Webサイトの改ざんが発生したときには，悪用された脆弱性，影響を受けた利用者及びデータの範囲などを特定し，再発防止策を講じる必要がある。本問では，ECサイトのWebスキミングによるクレジットカード情報の漏えいを題材として，HTMLの仕様，ECMAScriptの仕様，Webサーバの動作及びWebアプリケーションプログラムの脆弱性に関する知識及び影響を受けた利用者を特定する能力を問う。\", \"topics\": [\"Webスキミング\", \"クロスサイトスクリプティング\", \"SQLインジェクション\", \"改ざん\", \"ECMAScript\", \"addEventListener\", \"アクセスログ解析\", \"トークン型決済\"], \"questions\": [{\"setmon\": \"設問1a\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"偽フォーム表示が可能な攻撃の痕跡として、表2のどの行がb脆弱性を狙った攻撃かを行番号で答える\", \"model_answer\": \"5\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1b\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"偽フォーム表示が可能な、狙われた脆弱性の名称を答える\", \"model_answer\": \"クロスサイトスクリプティング\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1c\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"1回の攻撃で多数の利用者に偽フォームを表示できる、クロスサイトスクリプティング脆弱性の型を答える\", \"model_answer\": \"格納\", \"commentary\": \"設問1cは，正答率がやや低かった。クロスサイトスクリプティング（XSS）脆弱性は反射型，格納型，DOMベースの3種類あるが，ログから攻撃を分析するためにもそれらの違いを理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問1d\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2のうちe脆弱性を狙った攻撃の痕跡と思われる行を行番号で答える\", \"model_answer\": \"2\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1e\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"DBサーバに格納した情報を基にWebページを動的生成する場合に偽フォーム表示が可能となる、狙われた脆弱性の名称を答える\", \"model_answer\": \"SQLインジェクション\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線①について、ファイルKの読込みによって書き換えられた後の配送先・支払方法選択画面の画面全体を図示する\", \"model_answer\": \"配送先・支払方法選択画面に、支払方法の選択肢（クレジットカード決済／銀行振込のラジオボタン）を残さず、クレジットカード情報の入力フォーム（カード番号、有効期限（月／年）、名義、セキュリティコードの入力欄）を追加した画面。（図2の3行目のinnerHTMLによる書換え内容を反映した画面全体）\", \"commentary\": \"設問2(1)は，正答率がやや低かった。書換え対象のラジオボタンの選択肢が残っていたり，余計な改ざんがされていたりといった改ざん内容に過不足のある解答が散見された。HTML，DOMの仕組みを利用した画面の書換えは攻撃で悪用される可能性があるので，よく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"下線②について、画面遷移処理で値が変更され支払方法がクレジットカード決済に固定されたパラメータ名とその値を答える\", \"model_answer\": \"パラメータ名：order[Payment]　値：1\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図2の4〜15行目の処理内容を具体的に答える\", \"model_answer\": \"addEventListenerメソッドで配送先・支払方法選択画面のform要素にイベントリスナーを登録し，submit時にクレジットカード情報をクエリパラメータとしてi-sha.comに送信する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③について、攻撃者のWebサーバにWebアプリがなくても攻撃者がクレジットカード情報を取得する方法を答える\", \"model_answer\": \"WebサーバのアクセスログのリクエストURIから情報を取得する。\", \"commentary\": \"設問3(1)は，正答率が平均的であった。通信を盗聴する，キーロガーを仕掛けるといった解答が散見された。クレジットカード情報がクエリパラメータとして送られ，かつWebサーバのアクセスログにリクエストURIが記録されることを理解した上で解答してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)f\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"被害者候補を特定するため、影響期間のアプリケーションログから抽出する対象を答える\", \"model_answer\": \"配送先・支払方法選択画面にアクセスしたアカウント名\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2024r06a_sc_pm_p2.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2024, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-96\"}, {\"paper_id\": \"2024r06a_sc_pm\", \"problem_no\": 4, \"theme\": \"転職支援Webサイトに対するセキュリティ診断（脆弱性の悪用被害想定と対策立案）\", \"industry_setting\": \"セキュリティ診断サービスを提供するB社が、転職支援サービスを提供するM社のMサイトを診断\", \"exam_intent\": \"脆弱性は一つ一つが軽微でも，複数組み合わせて悪用されると，重大な被害につながることがある。また，診断ツールで検出される脆弱性以外にも，想定される攻撃に対して，セキュリティ対策が不足しているといった脆弱性もある。診断者がこういった脆弱性も報告に含めることで，その後，システムのセキュリティが大きく向上することがある。本問では，個人情報を取り扱うWebサイトに対するセキュリティ診断を題材に，診断ツールで検出された脆弱性について，悪用された場合の被害を想定する能力及び被害を低減するための対策を立案する能力を問う。\", \"topics\": [\"セキュリティ診断\", \"セッションフィクセーション\", \"メールヘッダーインジェクション\", \"HTTPヘッダー\", \"Strict-Transport-Security\", \"X-Content-Type-Options\", \"WebAPI\", \"APIkey\", \"多要素認証\"], \"questions\": [{\"setmon\": \"設問1(1)a\", \"format\": \"記号選択\", \"prompt_summary\": \"セッションフィクセーション脆弱性の検出箇所（画面遷移）を図3中の記号（ア）〜（ナ）から選ぶ\", \"model_answer\": \"(イ)\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)b\", \"format\": \"記号選択\", \"prompt_summary\": \"図Aの攻撃手順でsessionID入手やフォーム送信に使うURLを表1から選ぶ\", \"model_answer\": \"https://test.△△△.jp/\", \"commentary\": \"設問1(2)は，正答率が高かった。セッションフィクセーション脆弱性について，よく理解できていた。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)c\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図Aの手順7で、罠サイトへのアクセス検知後に完了を期待して待つ操作を答える\", \"model_answer\": \"メール受信者によるログイン\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(4)d\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"セッションフィクセーション脆弱性の修正方法として、画面遷移時に実行するコードで推奨する内容を答える\", \"model_answer\": \"使用済みのsessionIDを無効にした上で，新しいsessionIDを発行\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(5)e\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表D中、Strict-Transport-Securityヘッダーを設定した場合の主な効果を答える\", \"model_answer\": \"Mサイトへの接続をHTTPSに強制することができる。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(5)f\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表D中、X-Content-Type-Optionsヘッダーを設定した場合の主な効果を答える\", \"model_answer\": \"Mサイトのコンテンツに対して，Content-Typeヘッダーで指定したMIMEタイプを強制的に適用することができる。\", \"commentary\": \"設問1(5)fは，正答率が低かった。攻撃による被害を軽減するHTTPヘッダーについて，設定した場合の効果をよく理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2g\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図Dの攻撃手順の空欄g（メールアドレスを攻撃者のものに変更する手順）を答える\", \"model_answer\": \"画面09で，会社名に，図Cのabc@example.comを攻撃者のメールアドレスに変更した文字列を入力して変更ボタンをクリックする。\", \"commentary\": \"設問2gは，正答率が低かった。攻撃の後の流れに合っていない解答が散見された。Webサイトの全体の機能を考慮し，脆弱性を組み合わせて悪用する攻撃を考える能力を培ってほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2h\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"図Dの攻撃手順の空欄h（WebAPIキーを確認・発行する手順）を答える\", \"model_answer\": \"画面04からの一連の操作において，画面05又は画面07で再設定後のパスワードを入力して，WebAPIキーを確認又は発行する。\", \"commentary\": \"設問2gは，正答率が低かった。攻撃の後の流れに合っていない解答が散見された。Webサイトの全体の機能を考慮し，脆弱性を組み合わせて悪用する攻撃を考える能力を培ってほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3i・j（表F：WebAPI仕様の改善）\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表F中i（WebAPI仕様の改善方針案）とj（改善すべき理由）に記述する内容を答える（被害を防ぐ効果が最も高いもの）\", \"model_answer\": \"i：求職者IDが推測困難なものになるように，求職者IDの生成方法を変更する。／j：APIkeyが窃取された場合，当該求人企業への問合せ又は応募をした求職者の情報漏えいだけに被害を軽減することができるから（別解②i：WebAPIのアクセス元IPアドレスを限定して接続を許可するように変更する。j：WebAPIへの第三者による不正なアクセスを防ぐことができるから／③i：WebAPIで取得できる求職者属性情報は，個人を特定できないものだけに限定するように変更する。j：不正にWebAPIが利用されても，個人を特定できない情報の漏えいだけに被害を軽減することができるから）\", \"commentary\": \"設問3は，正答率がやや低かった。被害を軽減できない誤答が散見された。Webサイトでは，取り扱う情報の機密性などに応じた，認証やアクセス制限が必要である。それぞれのWebサイトの特性を考慮したセキュリティ対策を策定する能力を培ってほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3k・l（表G：求人企業向け機能の改善）\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表G中k（Webアプリの求人企業向け機能の改善方針案）とl（改善すべき理由）に記述する内容を答える（被害を防ぐ効果が最も高いもの）\", \"model_answer\": \"k：ログインの認証を，多要素認証に変更する。／l：アカウントの乗っ取りを防ぐことができるから（別解⑤k：利用者ごとにアクセス元IPアドレスを限定して接続を許可するように変更する。l：第三者による不正なアクセスを防ぐことができるから／⑥k：求人企業プロパティ変更において，メールアドレス以外を変更した場合でも，メールを送信するように変更する。l：不正に求人企業プロパティが変更された場合に気付くことができるから）\", \"commentary\": \"設問3は，正答率がやや低かった。被害を軽減できない誤答が散見された。Webサイトでは，取り扱う情報の機密性などに応じた，認証やアクセス制限が必要である。それぞれのWebサイトの特性を考慮したセキュリティ対策を策定する能力を培ってほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2024r06a_sc_pm_p2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2024, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-97\"}, {\"paper_id\": \"2024r06h_sc_pm\", \"problem_no\": 2, \"theme\": \"サイバー攻撃への対策（リモートワークのVPNセキュリティとDDoS攻撃対策の設計・構築）\", \"industry_setting\": \"H社（従業員3,000名の製造業。約500社の取引先と取引）\", \"exam_intent\": \"リモートワークが普及した状況下で，VPNを狙った攻撃が増加している。また，企業を狙ったDDoS攻撃も後を絶たない。本問では，サイバー攻撃への対策を題材として，与えられた環境下で，リモートワークのセキュリティ対策，及びDDoS攻撃に対するセキュリティ対策を設計，構築する能力を問う。\", \"topics\": [\"DDoS攻撃\", \"HTTP GET Flood攻撃\", \"アノマリ型IPS\", \"DNSリフレクション攻撃\", \"VPN多要素認証\", \"フィッシング／多要素認証突破\", \"SPA（Single Packet Authorization）\", \"CDN／クラウド型DDoS防御\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表4中の空欄a（HTTP GET Flood攻撃の例）に入れる攻撃の例を，H社での攻撃対象を示して具体的に答える。\", \"model_answer\": \"公開Webサーバ，取引先向けWebサーバを攻撃対象に，HTTP GETリクエストを繰返し送る。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①（アノマリ型IPS機能でしきい値が低すぎる場合）について，発生する弊害を25字以内で答える。\", \"model_answer\": \"正常な通信を異常として検知してしまう。\", \"commentary\": \"設問1(2)は，正答率が高かった。アノマリ型IPS機能で，しきい値の設定に関する問題であったが，IPS機能の仕様を反対に理解していると思われる解答が散見された。機能は正確に理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問1(3)\", \"format\": \"記号選択\", \"prompt_summary\": \"本文中の空欄b，cに入れる適切な字句を，“DNS-F”又は“DNS-K”から選び答える（インターネットから社内へのDNS通信の許可先b，社内からインターネットへのDNS通信の許可元c）。\", \"model_answer\": \"b：DNS-K，c：DNS-F\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表5中の空欄d，eに入れる，不正な接続までの攻撃手順（多要素認証を突破するフィッシング攻撃例1の手順(2)(3)）を具体的に答える。\", \"model_answer\": \"d：攻撃者が，正規のVPNダイアログに利用者IDとパスワードを入力すると，正規利用者のスマートフォンにセキュリティコードが送信される。／e：正規利用者が受信したセキュリティコードを，罠のWebサイトに入力すると，攻撃者がそれを読み取り，正規のセキュリティコード入力画面に入力することで認証される。\", \"commentary\": \"設問2(1)は，正答率が平均的であった。多要素認証を突破する攻撃について問うたが，手順が不足している解答や，設問とは異なる攻撃についての解答が散見された。攻撃を正確に理解することによって，対策も立てやすくなるので，正確に理解してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②（罠のWebサイトへのURLリンクをクリックしても不正なリモート接続をされないよう従業員全員が理解できる注意喚起）について，注意喚起の内容を具体的に答える。\", \"model_answer\": \"認証情報の入力は，受信したメール内のURLリンクをクリックして起動した画面には行わず，VPNダイアログにだけ行う。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線③（攻撃者がパケットを盗聴できた場合）について，設定Pを突破する方法を30字以内で答える。\", \"model_answer\": \"盗聴したパケットと同じ順番に通信要求を送信する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④（SPAならパケットを盗聴されても突破されない）について，突破されない理由を40字以内で答える。\", \"model_answer\": \"SPAパケットはユニークであり，同じパケットを再利用すると破棄されるから\", \"commentary\": \"設問3(2)は，正答率が平均的であった。SPAというプロトコルに関して本文中に示して効果を問うた。内容を理解して解答してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \ 解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表5下線②(P呼出し処理に処理を追加する)について，P呼出し処理に追加すべき処理を，40字以内で具体的に答える。\", \"model_answer\": \"JWTに含まれる利用者IDがmidの値と一致するかどうかを検証する処理\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表5中の空欄c。パラメータstatusを検証せず全て送信していた送信先を，表2中の用語で答える。\", \"model_answer\": \"共通モジュールP\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(5)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表5中の空欄d。2要素認証の突破対策として実装すべき処理内容(しきい値10とする)を，30字以内で答える。\", \"model_answer\": \"連続失敗回数がしきい値を超えたらアカウントをロックする処理\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"図7下線③について，指定したコマンドが実行されたことを確認するためにテストサーバに実装する仕組みを，35字以内で具体的に答える。\", \"model_answer\": \"テストサーバのindex.htmlへのアクセスを記録し，確認する仕組み\", \"commentary\": \"正答率がやや低かった。脆弱性の存在を判断するための仕組みについて問うたが，図6に示す攻撃の流れに合っていない解答が散見された。脆弱性対策では，脆弱性を悪用する攻撃の流れの理解が重要であることから，正確に理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"表6中の空欄e，f(WAFルールの検証対象)に入れる適切な字句を，図5中から選び答える。\", \"model_answer\": \"e：Header／f：Header\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線④の変更後の案について，大文字・小文字を入れ替える手口にも対応できるよう，表6ルール1に記述すべきパターンを，図5の記述形式で答える。\", \"model_answer\": \"\\\\W[jJ][nN][dD][iI]\\\\W （又は \\\\W(j|J)(n|N)(d|D)(i|I)\\\\W）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑤について，WAFルールの動作に遮断ではなく検知を設定することによる利点と，検知に設定した際に被害を最小化するために実施すべき内容を，それぞれ25字以内で答える。\", \"model_answer\": \"利点：誤検知による遮断を防ぐことができる。／内容：アラートを受信したら攻撃かどうかを精査する。\", \"commentary\": \"利点については正答率が高かった。WAFの利点と課題は正確に理解していると思われる。セキュリティ施策は導入前にトレードオフを検討してほしい。\", \"low_accuracy\": false}], \"_source_file\": \"2024r06h_sc_pm_p1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2024, \"seaso ry\": \"空欄h。図4中、例外発生時でも必ず実行されリソースリークを防ぐブロックのキーワードを答える。\", \"model_answer\": \"finally\", \"commentary\": \"Java 言語には例外発生時でも必ず実行される処理を記述する仕組みが用意されており，リソースリークを防ぐために重要な仕組みである。正確に理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(7)\", \"format\": \"記号選択\", \"prompt_summary\": \"下線②について、レインボーテーブル攻撃を防ぐため図4の6,7行目をどう修正すべきか、ソルトを用いた修正後のソースコードを解答群から選ぶ。\", \"model_answer\": \"ア\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2024r06h_sc_pm_p2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2024, \"season\": \"春\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-101\"}, {\"paper_id\": \"2025r07a_sc_pm\", \"problem_no\": 1, \"theme\": \"WebアプリSaaSの脆弱性(格納型XSS)を悪用した元従業員による不正アクセスインシデントと、CSP・開発プロセスによる対策\", \"industry_setting\": \"コンサルティング業務向けSaaS(Sサービス)を提供するH社\", \"exam_intent\": \"インシデント発生時は，インシデント対応を行うとともに，インシデントが攻撃によるものなのかどうか，脆弱性が悪用されたのかどうかを調べた上で，適切な再発防止策を検討する必要がある。本問では，Webアプリケーションの脆弱性を悪用されたインシデントを通して，セキュアプログラミングに対する理解，並びにHTML及びECMAScriptを読み解いて問題点及び原因を認識し，対策を講じる実践的能力を問う。\", \"topics\": [\"格納型XSS\", \"Content Security Policy(CSP)\", \"セキュアプログラミング\", \"ファイルアップロード検証\", \"エスケープ処理\", \"SAST\", \"脆弱性診断\", \"権限昇格\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図1のCSP設定(default-src 'self')の下で、a:Sサービス以外のドメインからのリソースの読込み、b:scriptタグ内に直接記述されたスクリプトの実行が、それぞれ「できる」「できない」のいずれかを答える。\", \"model_answer\": \"a：できない　b：できない\", \"commentary\": \"正答率がやや低かった。Content Security Policy(CSP)を理解することは，堅牢なWebシステムを開発及び構築する上で重要である。リソース読込みの制御を適切に行うために，CSPの内容や緩和効果について理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図3のスクリプトが悪用する、表1中の機能名を答える。\", \"model_answer\": \"ロール管理\", \"commentary\": \"設問2は(1)〜(4)の正答率が高かった。図3及び図4から攻撃内容を読み取ることができている受験者が多かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図4中の空欄c(攻撃者が文字列を指定して登録するタスクの項目)に入れる適切なタスクの項目を、表1中の字句を用いて答える。\", \"model_answer\": \"c：タスク名\", \"commentary\": \"設問2は(1)〜(4)の正答率が高かった。図3及び図4から攻撃内容を読み取ることができている受験者が多かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(3)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図4中の空欄d(タスク名に指定する文字列)に入れる適切な文字列を、図2から抜き出して答える。\", \"model_answer\": \"d：個人タスク<script src=\\\"/files/F1234567890.xlsx\\\"><\\/script>\", \"commentary\": \"設問2は(1)〜(4)の正答率が高かった。図3及び図4から攻撃内容を読み取ることができている受験者が多かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(4)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図4中の空欄e〜g(スクリプトを実行させる対象の利用者、タスクがアクセスされる条件、実行された処理内容)に入れる適切な字句を答える。\", \"model_answer\": \"e：管理者　f：タスクの締切日を過ぎる。　g：利用者のロールを管理者に設定する。\", \"commentary\": \"設問2は(1)〜(4)の正答率が高かった。図3及び図4から攻撃内容を読み取ることができている受験者が多かった。\", \"low_accuracy\": false}, {\"setmon\": \"設問2(5)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①について、攻撃者が失敗時に使用した文字列に加えた「工夫」の内容を具体的に答える。\", \"model_answer\": \"図3のスクリプトをSサービス内にアップロードする工夫\", \"commentary\": \"(5)の正答率がやや低かった。CSPによる制御を回避する攻撃手法について考察することは，攻撃者によるスクリプト実行を防ぐ対策を立案する上で重要である。CSPの仕組みについて理解を深めてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"図4の項番1(ファイルアップロード)への対策として、拡張子が許可されたものであることのチェックに加えて追加すべき処理(空欄h)を具体的に答える。\", \"model_answer\": \"アップロードされたファイルの形式が拡張子と整合しているかをチェックする。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図4の項番4(出力時の問題)について、必要な処理を追加すべき表1中の機能名(空欄i)を答える。\", \"model_answer\": \"i：プロジェクト進捗管理\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線②について、プロジェクト進捗管理機能に追加すべき処理の内容を具体的に答える。\", \"model_answer\": \"出力時にエスケープ処理を施す。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"診断ツールXでは検知されない脆弱性も検出できる可能性のある検査として、SAST以外に実施すべき検査方法(空欄j)を具体的に答える。\", \"model_answer\": \"Sサービスの仕様を理解した専門家による脆弱性検査\", \"commentary\": \"正答率が低かった。“ログ分析を行う”や“IDの棚卸しを行う”，“アノマリ検知の仕組みを導入する”などの運用プロセスでの対策，“権限チェックを行う”，“多要素認証の仕組みを導入する”などの修正機能の追加，及び“WAFを導入する”などのセキュリティ製品導入に関する解答が散見された。開発プロセスに対する理解を深めてほしい。\", \"low_accuracy\": true}], \"_source_file\": \"2025r07a_sc_pm_p1.json\", \"problem_type\": \"調査・インシデント対応型\", \"year\": 2025, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-102\"}, {\"paper_id\": \"2025r07a_sc_pm\", \"problem_no\": 2, \"theme\": \"暗号資産交換業における暗号鍵(署名鍵)の管理と、第三者攻撃・内部不正によるBコイン不正移転への対策、及びHSMへの署名鍵の安全な移送\", \"industry_setting\": \"暗号資産BコインをM社が扱う暗号資産交換業者A社(後にM社が買収)\", \"exam_intent\": \"近年，サイバー攻撃の増加に伴い，情報システムの設計，開発並びに運用等のあらゆる場面において，暗号技術を理解することがますます重要になっている。暗号の適切な利用によって情報の機密性や完全性を担保することができる一方，暗号の不適切な利用はシステムの脆弱性を生むことにつながる。本問では，暗号資産交換業における暗号鍵の管理を題材として，情報の暗号化及び復号，並びにデジタル署名の生成及び検証のそれぞれの処理に関する基礎的な理解を問うとともに，暗号鍵の暗号化といった暗号技術の高度な応用力を問う。\", \"topics\": [\"楕円曲線暗号\", \"デジタル署名(ECDSA/EdDSA)\", \"サイドチャネル攻撃\", \"メッセージ認証符号(MAC)\", \"共通鍵暗号\", \"RSA暗号\", \"HSM(ハードウェアセキュリティモジュール)\", \"暗号鍵の暗号化\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"記号選択\", \"prompt_summary\": \"楕円曲線暗号を用いたデジタル署名アルゴリズムを解答群(ア AES、イ ECDH、ウ ECDSA、エ EdDSA、オ RSA、カ SHA-256)から全て選ぶ。\", \"model_answer\": \"ウ，エ\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線①(施設Kに施されたサイドチャネル攻撃を防ぐ対策)について、想定される攻撃手法を具体的に答える。\", \"model_answer\": \"施設Kの外から，鍵管理PCの作動音や鍵管理PCから放出される電磁波を観測し，署名鍵Sを推測する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線②について、マルウェアXが図3手順2の(i)と(ii)の間、及び(vi)と(vii)の間で行う処理の内容をそれぞれ答える。\", \"model_answer\": \"(i)と(ii)の間：Bコインを攻撃者に移転する移転情報を記録したファイルを業務用メディア内に追加する。／(vi)と(vii)の間：Bコインを攻撃者に移転する署名済みの移転情報を記録したファイルを攻撃者に送信するとともに，業務用メディアから削除する。\", \"commentary\": \"正答率がやや低かった。一般に，攻撃者が不正行為を行うために用いる手段を推測することは，セキュリティを強化する上で重要である。システム構成及び業務手順を詳細に把握し，既存業務における弱点を見つけられるようにしてほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"本文中の空欄a(照合ファイルにメッセージダイジェストを記録する代わりに、基幹サーバ及び署名アプリに共通鍵をもたせ、その共通鍵を使って記録する暗号技術)を答える。\", \"model_answer\": \"a：メッセージ認証符号\", \"commentary\": \"正答率が低かった。“デジタル署名”という解答が多く見られた。さまざまな暗号技術をしっかり理解してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問3(3)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"下線③(図3の手順2の作業中における不正行為の機会を減らす対策)について、対策を具体的に答える。\", \"model_answer\": \"当日担当者を複数名とし，互いに確認しながら作業を実施するように手順を変更する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線④(図6の署名鍵S移送方法の幾つかの問題点)について、問題点のうちリスクの最も高いものを答える。\", \"model_answer\": \"作業2において，パスワードで暗号化した署名鍵Sと紙に書き留めたパスワードを一緒に移送している点\", \"commentary\": \"正答率が平均的であった。情報の暗号化において暗号鍵としてパスワードを用いることは一般的であり，適切にパスワードを管理すれば情報の機密性を守ることができる。しかし，攻撃者が暗号文とパスワードを同時に入手できれば情報が攻撃者に知られてしまう。パスワードなどの暗号鍵及び暗号化した情報の管理方法を併せて検討してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記号選択\", \"prompt_summary\": \"図7中の空欄b〜e、及びあ・いに入れる適切な字句を解答群から選ぶ(b〜e:ア 暗号鍵E、イ 検証鍵V、ウ 署名鍵S、エ 復号鍵D／あ・い:オ 暗号化、カ 検証、キ デジタル署名、ク 復号)。\", \"model_answer\": \"b：ウ　c：ア　d：エ　e：ウ　あ：オ　い：ク\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(3)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑤(図7の作業4で移送用メディアが盗難に遭っても署名鍵Sは漏えいしない)について、Jさんが考えていた根拠を答える。\", \"model_answer\": \"復号鍵Dがないので，暗号化された署名鍵Sは復号できない。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(4)\", \"format\": \"記述(理由説明)\", \"prompt_summary\": \"下線⑥(図7の作業1で移送用メディアに保存されるファイルの書換え)について、攻撃者がファイルを何に書き換えるか、書換え後のファイルの内容を答える。\", \"model_answer\": \"攻撃者の生成した鍵ペアの暗号鍵\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2025r07a_sc_pm_p1.json\", \"problem_type\": \"その他・混合型\", \"year\": 2025, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-103\"}, {\"paper_id\": \"2025r07a_sc_pm\", \"problem_no\": 3, \"theme\": \"インターネットバンキングの振込リスク検討と、リモートワーク環境（VPNサービス）導入のセキュリティ対策\", \"industry_setting\": \"P社（経理係・情報システム係をもち、インターネットバンキングを利用する企業）\", \"exam_intent\": \"働き方改革の一環としてリモートワークの導入が広まっている。リモートワークに使用するインフラの導入には，効率的な業務の実現に加え，必要なセキュリティレベルの確保を検討することが重要である。本問では，リモートワーク環境の導入を題材として，IT 環境のセキュリティ対策及びVPN サービスの導入方法を問う。\", \"topics\": [\"インターネットバンキング(IB)\", \"数字入力トークン\", \"偽サーバによる中間者攻撃\", \"DNSSEC/DoH/TLS\", \"VPNサービス(Kサービス)\", \"SAML/IdP認証基盤\", \"多要素認証(MFA)\", \"OSバージョン移行\"], \"questions\": [{\"setmon\": \"設問1(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄aに入れる適切な字句（英字10字以内）を答える。名前解決の応答の完全性を保証する技術。\", \"model_answer\": \"DNSSEC\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問1(2)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄b, cに入れる適切な字句（それぞれ英字5字以内）を答える。DNS通信を秘匿する仕組みと、それが利用する暗号化プロトコル。\", \"model_answer\": \"b: DoH　c: TLS\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2\", \"format\": \"記号選択\", \"prompt_summary\": \"表5中の空欄d, eに入れる適切な字句を解答群（ア 攻撃者口座の口座番号／イ 攻撃者による書換え前の口座番号）から選び記号で答える（重複可）。偽サーバ経由の振込みでトークンに送られる数字。\", \"model_answer\": \"d: イ　e: ア\", \"commentary\": \"設問2は正答率がやや高かった。インターネットバンキングの振込みの流れやハードウェアトークンの特徴を理解し，攻撃手法を正しく想定できていることがうかがえる。\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"図8中の下線①（Kサービス設定サイトへのアクセスはP社内だけからできるよう制限する）について、設定内容を具体的に答える。\", \"model_answer\": \"K サービス設定サイトへのアクセスが許可される接続元IP アドレスを a1.b1.c1.d1 に制限する。\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の空欄f（各取引先サービスへの依頼内容）に入れる依頼の内容を具体的に答える。\", \"model_answer\": \"各取引先サービスへの接続を許可するIP アドレスとして，P 社専用のK サービス用固定グローバルIP アドレスを登録してもらう\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の下線②（追加する宛先をT主任に報告した）について、HTTPS通信の宛先としてKサービスだけを許可する案に追加すべき宛先を答える。\", \"model_answer\": \"Z-IB，OS ベンダーのOS アップデート配布サイト，認証基盤サービス及びK サービス設定サイトへのHTTPS サービス\", \"commentary\": \"設問4(2)は正答率が低かった。社内からVPN サービスを利用する場合に，初期設定時及びVPN 接続前に必要な通信も踏まえて解答してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問5(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の空欄g（社有スマホ故障時でもKサービスを利用できるようにする先行利用の利用者アカウントの設定内容）に入れる設定内容を具体的に答える。\", \"model_answer\": \"認証方式1 の電話番号として，個人所有スマホの電話番号を登録する\", \"commentary\": \"設問5(1)は正答率が平均的であった。本環境で利用する認証基盤の仕様を踏まえ，スマートフォン故障時にもセキュリティ強度を落とすことのない代替策を解答してほしい。\", \"low_accuracy\": false}, {\"setmon\": \"設問5(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の下線③（情報システム係がKサービスを活用してOS移行を促進させる施策）について、施策を具体的に答える。\", \"model_answer\": \"K サービス接続時のログからOS がバージョンX の社有PC を抽出し，アカウント名から利用者を特定後，利用者の所属する部の情報セキュリティ推進者に報告し，バージョンY への移行を促してもらう。\", \"commentary\": \"\", \"low_accuracy\": false}], \"_source_file\": \"2025r07a_sc_pm_p2.json\", \"problem_type\": \"その他・混合型\", \"year\": 2025, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-104\"}, {\"paper_id\": \"2025r07a_sc_pm\", \"problem_no\": 4, \"theme\": \"製造業におけるサプライチェーンセキュリティ管理（攻撃シナリオの検討と対策・復旧手順の立案）\", \"industry_setting\": \"L社（主に家電製品の部品を製造する製造業。大手家電製造企業J社の子会社）\", \"exam_intent\": \"サプライチェーンにおけるセキュリティリスクの管理が進んでいる現在，サプライチェーンに組み込まれている企業では，より上流又は下流に位置する企業から情報セキュリティ管理体制の構築が求められることがよくある。本問では，そのような場面を題材に，ある企業のシステム構成，ネットワーク構成及び業務の流れを前提として，攻撃シナリオの検討，並びに，その攻撃シナリオへの対策及び必要な運用手順の立案の能力を問う。\", \"topics\": [\"サプライチェーンセキュリティ\", \"サイバーセキュリティ経営ガイドライン\", \"マルウェア対策(パターンマッチング型/サンドボックス型)\", \"最小権限の原則とアクセス権限設定\", \"SCADA/NCプログラム\", \"リスク対応(低減/回避/移転/保有)\", \"事業継続・復旧(BCP)/バックアップ\", \"ネットワーク分離\"], \"questions\": [{\"setmon\": \"設問1\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"表2中の空欄a, bに入れる適切な字句（それぞれ5字以内）を答える。パターンマッチング型で検知できないマルウェアの種類、および添付ファイルの状態。\", \"model_answer\": \"a: 未知の　b: 暗号化\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(1)\", \"format\": \"空欄穴埋め\", \"prompt_summary\": \"図8中の空欄c〜eに入れる適切な字句を答える。リスクに対応する方法の分類（低減以外の四つ）。\", \"model_answer\": \"c: 回避　d: 移転　e: 保有（c〜eは順不同）\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問2(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"本文中の下線①（最小権限の原則に沿って表3の権限の設定を見直す）について、見直し後の権限の設定を答える。設計情報ファイルを扱う業務が図4だけの場合の各組織の読込／書込／権限変更権限。\", \"model_answer\": \"総務部総務課: 読込× 書込× 権限変更×／総務部情報システム課: 読込× 書込× 権限変更○／営業部: 読込○ 書込○ 権限変更×／製造部設計課: 読込○ 書込× 権限変更×／製造部製造課: 読込○ 書込× 権限変更×／製造部品質保証課: 読込○ 書込× 権限変更×\", \"commentary\": \"\", \"low_accuracy\": false}, {\"setmon\": \"設問3\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表4中の空欄f, gに入れる適切な字句を、対策とその導入箇所を含めて答える（効果が高いもの、効果が同程度なら業務影響が少ないもの。ネットワーク上の導入箇所は図3の(あ)〜(す)から選ぶ）。攻撃シナリオ2（FWの脆弱性悪用）と3（メール添付マルウェア）への追加対策。\", \"model_answer\": \"f: 図3 中の(け)の箇所に，追加でFW　g: USB メモリを接続したときの動きを確認するためのソフトウェアを導入した，社内LAN から切り離された検査用PC\", \"commentary\": \"設問3は正答率がやや低かった。提示された攻撃シナリオに対して有効な対策を問うたが，SCADA の利用者認証の強化という解答が散見された。マルウェアは，OS やアプリケーションの脆弱性を悪用したり，正常に認証された利用者をだましたりして実行される。マルウェア対策として利用者認証の強化はあまり効果がないことに注意してほしい。\", \"low_accuracy\": true}, {\"setmon\": \"設問4(1)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表6中の空欄h, iに入れる適切な字句を答える。SCADAをマルウェア感染から迅速に復旧するために必要な仕組みと必要な手順。\", \"model_answer\": \"h: SCADA 内のNC プログラムをバックアップ／リストアするための媒体とソフトウェア　i: SCADA にNC プログラムをリストアする手順\", \"commentary\": \"設問4は正答率が平均的であった。万一マルウェアなどによる被害が発生してしまった場合に，いかに早く復旧するかを問うたが，被害に至る攻撃を阻止する手段について言及した解答が散見された。迅速な復旧のためにはバックアップの取得など平常時に何を行うかが重要であり，この点についての解答を期待していた。\", \"low_accuracy\": false}, {\"setmon\": \"設問4(2)\", \"format\": \"記述(対策提案)\", \"prompt_summary\": \"表6中の空欄j〜lに入れる適切な字句を答える（jは起こる可能性が高い被害シナリオを攻撃の発端を含めて、kは効果の高い必要な仕組みを）。マルウェアによる別の被害のシナリオと、その復旧に必要な仕組み・手順。\", \"model_answer\": \"j: マルウェアに感染した一般PC が，正常な通信を妨害するパケットを大量に送信して，SCADA と工作機械の間の通信ができなくなる。　k: SCADA，工作機械及び製造監視用PC だけの独立したLAN を構成するためのネットワーク機器　l: SCADA，工作機械及び製造監視用PC をL 社のネットワークから切り離す手順\", \"commentary\": \"設問4は正答率が平均的であった。迅速な復旧のためにはバックアップの取得など平常時に何を行うかが重要であり，レジリエンスという言葉に代表されるように，企業の社会的立場によっては，被害に至る経緯を解明するよりも，事業の復旧を優先する場合もあることを考えてほしい。\", \"low_accuracy\": false}], \"_source_file\": \"2025r07a_sc_pm_p2.json\", \"problem_type\": \"抽象的リスク管理型\", \"year\": 2025, \"season\": \"秋\", \"part_label\": \"午後(統合)\", \"uid\": \"pm-105\"}, {\"paper_id\": \"2025r07h_sc_pm\", \"problem_no\": 3, \"theme\": \"スマートフォン用アプリ(スマホアプリ)の脆弱性と攻撃手法・対策\", \"industry_setting\": \"撮影機器の販売・写真プリントサービスを全国200店舗で展開するA社(EC事業あり)\", \"exam_intent\": \"JPCERT コーディネーションセンター及びIPA が運営する脆弱性対策情報ポータルサイト“JVN（Japan Vulnerability Notes）”には，国内企業が開発したスマートフォンアプリケーションプログラムの脆弱性が公表されている。\\n 本問では，スマートフォン用アプリケーションプログラムの脆弱性を題材として，脆弱性への対策の能力を問う。\", \"topics\": [\"スマホアプリ脆弱性\", \"サーバ証明書検証不備\", = 'pm_material_studied_v1';\nfunction loadStudied() { try { return new Set(JSON.parse(localStorage.getItem(STUDIED_KEY) || '[]')); } catch(e){ return new Set(); } }\nfunction saveStudied(set) { localStorage.setItem(STUDIED_KEY, JSON.stringify([...set])); }\nlet studiedSet = loadStudied();\nfunction isStudied(uid) { return studiedSet.has(uid); }\nfunction toggleStudied(uid) { if (studiedSet.has(uid)) studiedSet.delete(uid); else studiedSet.add(uid); saveStudied(studiedSet); }\n\nconst uidIndex = new Map();\nfor (const p of PM_DATA) uidIndex.set(p.uid, p);\n\nfunction typeBadgeClass(t) {\n  if (t === '調査・インシデント対応型') return 'badge-type-go';\n  if (t === 'コード・プロトコル深掘り型' || t === '抽象的リスク管理型') return 'badge-type-avoid';\n  return 'badge-type-mid';\n}\n\nfunction renderAllProgress() {\n  renderProgressLine('progress-a', getPatternQAll(), true);\n  renderProgressLine('progress-b', PM_DATA, false);\n}\nfunction renderProgressLine(elId, items, withReset) {\n  const el = document.getElementById(elId);\n  if (!el) return;\n  const total = items.length;\n  const done = items.filter(x => isStudied(x.uid || x._puid)).length;\n  const pct = total ? Math.round(done/total*100) : 0;\n  el.innerHTML = `<span>学習済み ${done}/${total}件（${pct}%）</span><span class=\"progress-track\"><span class=\"progress-fill\" style=\"width:${pct}%\"></span></span>` +\n    (withReset ? `<button class=\"progress-reset\" data-reset=\"1\">この端末の学習記録を消す</button>` : '');\n}\n\n/* ===== タブ切替 ===== */\ndocument.querySelectorAll('.tab').forEach(tab => {\n  tab.addEventListener('click', () => {\n    document.querySelectorAll('.tab').forEach(t => t.setAttribute('aria-selected', 'false'));\n    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));\n    tab.setAttribute('aria-selected', 'true');\n    document.getElementById(tab.dataset.panel).classList.add('active');\n  });\n});\n\n/* ===== パネルA: 書き方の型 ===== */\nfunction getPatternQAll() {\n  // 各設問に疑似uid(_puid)を付けてフラット化\n  const out = [];\n  for (const p of PM_DATA) {\n    (p.questions || []).forEach((q, qi) => {\n      const fmt = q.format || '';\n      if (fmt.includes('理由') || fmt.includes('対策') || fmt.includes('提案')) {\n        out.push({ ...q, _puid: `${p.uid}-${qi}`, _paper: p });\n      }\n    });\n  }\n  return out;\n}\nfunction patternNote(fmt) {\n  if (fmt.includes('理由')) return '型：事実・仕様を名詞で言い切る（〜だから、と長く説明しない）';\n  return '型：1つの動作を動詞で言い切る（〜する／〜を確認する）';\n}\nfunction renderPatternList() {\n  const filterVal = document.getElementById('pattern-filter').value;\n  const all = getPatternQAll();\n  const filtered = all.filter(x => !filterVal || x.format.includes(filterVal));\n  document.getElementById('count-a').textContent = `${filtered.length}件 / 全${all.length}件`;\n  const list = document.getElementById('pattern-list');\n  list.innerHTML = '';\n  if (!filtered.length) { list.innerHTML = '<div class=\"empty-state\">該当なし。</div>'; return; }\n  for (const q of filtered) {\n    const p = q._paper;\n    const el = document.createElement('div');\n    el.className = 'setmon-row';\n    el.dataset.uid = q._puid;\n    el.innerHTML = `\n      <div class=\"sm-head\"><b>${q.setmon}</b><span class=\"fmt-badge\">${q.format}</span><span class=\"badge badge-year\">${p.year}年${p.season} ${p.part_label}</span></div>\n      <p class=\"prompt\">${q.prompt_summary}</p>\n      <button class=\"reveal-btn\" data-action=\"reveal\">模範解答を見る</button>\n      <div class=\"reveal-box\">\n        <div class=\"ans\">${q.model_answer || '(解答例なし)'}</div>\n        ${q.commentary ? `<div class=\"cmt\">${q.commentary}</div>` : ''}\n        <div class=\"pattern-note\">${patternNote(q.format)}</div>\n      </div>\n      <div class=\"card-actions\">\n        <button class=\"btn-check${isStudied(q._puid) ? ' checked' : ''}\" data-action=\"check\">${isStudied(q._puid) ? '✓ 練習済み' : '練習済みにする'}</button>\n      </div>`;\n    list.appendChild(el);\n  }\n}\ndocument.getElementById('pattern-filter').addEventListener('change', renderPatternList);\ndocument.getElementById('pattern-list').addEventListener('click', (e) => {\n  const row = e.target.closest('.setmon-row');\n  if (!row) return;\n  if (e.target.closest('[data-action=\"reveal\"]')) {\n    row.querySelector('.reveal-box').classList.toggle('shown');\n    return;\n  }\n  if (e.target.closest('[data-action=\"check\"]')) {\n    toggleStudied(row.dataset.uid);\n    const btn = e.target.closest('[data-action=\"check\"]');\n    const checked = isStudied(row.dataset.uid);\n    btn.classList.toggle('checked', checked);\n    btn.textContent = checked ? '✓ 練習済み' : '練習済みにする';\n    renderAllProgress();\n  }\n});\n\n/* ===== パネルB: 問題を解く(全110問) ===== */\nfunction setupTypeFilters() {\n  const types = ['調査・インシデント対応型','コード・プロトコル深掘り型','抽象的リスク管理型','その他・混合型'];\n  const wrap = document.getElementById('type-filters');\n  const allBtn = document.createElement('button');\n  allBtn.className = 'chip-filter'; allBtn.setAttribute('aria-pressed','true'); allBtn.textContent = 'すべて'; allBtn.dataset.type = '';\n  wrap.appendChild(allBtn);\n  for (const t of types) {\n    const btn = document.createElement('button');\n    btn.className = 'chip-filter'; btn.setAttribute('aria-pressed','false'); btn.textContent = t; btn.dataset.type = t;\n    wrap.appendChild(btn);\n  }\n  wrap.addEventListener('click', (e) => {\n    const btn = e.target.closest('.chip-filter'); if (!btn) return;\n    wrap.querySelectorAll('.chip-filter').forEach(b => b.setAttribute('aria-pressed','false'));\n    btn.setAttribute('aria-pressed','true');\n    renderProblemList();\n  });\n}\nfunction setupYearFilters() {\n  const wrap = document.getElementById('year-filters');\n  const allBtn = document.createElement('button');\n  allBtn.className = 'chip-filter'; allBtn.setAttribute('aria-pressed','true'); allBtn.textContent = '全年度'; allBtn.dataset.year = '';\n  wrap.appendChild(allBtn);\n  const recentBtn = document.createElement('button');\n  recentBtn.className = 'chip-filter'; recentBtn.setAttribute('aria-pressed','false'); recentBtn.textContent = '直近5回(新形式)のみ'; recentBtn.dataset.year = 'new';\n  wrap.appendChild(recentBtn);\n  wrap.addEventListener('click', (e) => {\n    const btn = e.target.closest('.chip-filter'); if (!btn) return;\n    wrap.querySelectorAll('.chip-filter').forEach(b => b.setAttribute('aria-pressed','false'));\n    btn.setAttribute('aria-pressed','true');\n    renderProblemList();\n  });\n}\nfunction isNewFormat(p) { return p.part_label === '午後(統合)'; }\n\nfunction renderProblemList() {\n  const q = document.getElementById('search-b').value.trim().toLowerCase();\n  const activeType = document.querySelector('#type-filters .chip-filter[aria-pressed=\"true\"]')?.dataset.type || '';\n  const activeYear = document.querySelector('#year-filters .chip-filter[aria-pressed=\"true\"]')?.dataset.year || '';\n  let filtered = PM_DATA.filter(p => {\n    const mType = !activeType || p.problem_type === activeType;\n    const mYear = !activeYear || (activeYear === 'new' && isNewFormat(p));\n    const text = (p.theme + ' ' + (p.topics||[]).join(' ')).toLowerCase();\n    const mQuery = !q || text.includes(q);\n    return mType && mYear && mQuery;\n  });\n  filtered.sort((a,b) => b.year - a.year);\n  document.getElementById('count-b').textContent = `${filtered.length}件 / 全${PM_DATA.length}件`;\n  const list = document.getElementById('problem-list');\n  list.innerHTML = '';\n  if (!filtered.length) { list.innerHTML = '<div class=\"empty-state\">条件に合う問題が見つからない。</div>'; return; }\n  for (const p of filtered) {\n    const el = document.createElement('details');\n    el.className = 'prob-card';\n    el.dataset.uid = p.uid;\n    const setmonHtml = (p.questions||[]).map((sq, i) => `\n      <div class=\"setmon-row\" data-qi=\"${i}\">\n        <div class=\"sm-head\"><b>${sq.setmon}</b><span class=\"fmt-badge\">${sq.format}</span>${sq.low_accuracy ? '<span class=\"low-badge\">正答率低</span>' : ''}</div>\n        <p class=\"prompt\">${sq.prompt_summary}</p>\n        <button class=\"reveal-btn\" data-action=\"reveal\">模範解答を見る</button>\n        <div class=\"reveal-box\">\n          <div class=\"ans\">${sq.model_answer || '(解答例なし)'}</div>\n          ${sq.commentary ? `<div class=\"cmt\">${sq.commentary}</div>` : ''}\n        </div>\n      </div>`).join('');\n    el.innerHTML = `\n      <summary>\n        <span>${p.theme}</span>\n        <span class=\"meta\">\n          <span class=\"badge badge-year\">${p.year}年${p.season} ${p.part_label}問${p.problem_no}</span>\n          <span class=\"badge ${typeBadgeClass(p.problem_type)}\">${p.problem_type}</span>\n        </span>\n        <span class=\"arrow\">▶</span>\n      </summary>\n      <div class=\"prob-body\">\n        <div class=\"intent\"><span class=\"tag\">出題趣旨</span>${p.exam_intent}</div>\n        <div class=\"chip-list\">${(p.topics||[]).map(t => `<span class=\"chip\">${t}</span>`).join('')}</div>\n        ${setmonHtml}\n        <div class=\"card-actions\">\n          <button class=\"btn-check${isStudied(p.uid) ? ' checked' : ''}\" data-action=\"check\">${isStudied(p.uid) ? '✓ 学習済み' : '学習済みにする'}</button>\n        </div>\n      </div>`;\n    list.appendChild(el);\n  }\n}\ndocument.getElementById('search-b').addEventListener('input', renderProblemList);\ndocument.getElementById('problem-list').addEventListener('click', (e) => {\n  if (e.target.closest('[data-action=\"reveal\"]')) {\n    e.target.closest('.setmon-row').querySelector('.reveal-box').classList.toggle('shown');\n    return;\n  }\n  const container = e.target.closest('[data-uid]');\n  if (!container) return;\n  if (e.target.closest('[data-action=\"check\"]')) {\n    toggleStudied(container.dataset.uid);\n    const btn = e.target.closest('[data-action=\"check\"]');\n    const checked = isStudied(container.dataset.uid);\n    btn.classList.toggle('checked', checked);\n    btn.textContent = checked ? '✓ 学習済み' : '学習済みにする';\n    renderAllProgress();\n  }\n});\n\n/* ===== パネルC: 模擬試験 ===== */\nlet currentExam = null; // {sitting, pickedUids:[], grades:{uid_qi: 'ok'|'mid'|'ng'}}\n\nfunction populateSittingSelect() {\n  const sel = document.getElementById('exam-sitting-select');\n  sel.innerHTML = PM_SITTINGS.map((s,i) => `<option value=\"${i}\">${s.label}（${s.problem_uids.length}問中${s.select_n}問選択）</option>`).join('');\n}\n\nfunction startExamPick(sittingIdx) {\n  const sitting = PM_SITTINGS[sittingIdx];\n  currentExam = { sitting, pickedUids: [], grades: {} };\n  renderExamPick();\n}\nfunction renderExamPick() {\n  const body = document.getElementById('exam-body');\n  const s = currentExam.sitting;\n  const rows = s.problem_uids.map(uid => {\n    const p = uidIndex.get(uid);\n    const picked = currentExam.pickedUids.includes(uid);\n    return `<button class=\"pick-btn\" data-uid=\"${uid}\" aria-pressed=\"${picked}\">\n      <b>問${p.problem_no}: ${p.theme}</b>\n      <span style=\"color:var(--text-muted)\">${p.problem_type} ・ 設問${(p.questions||[]).length}件</span>\n    </button>`;\n  }).join('');\n  body.innerHTML = `\n    <p class=\"count-line\">${s.label} — ${s.problem_uids.length}問中${s.select_n}問を選んで解答する。</p>\n    <div class=\"pick-row\">${rows}</div>\n    <div class=\"exam-actions\"><button id=\"exam-confirm-btn\" ${currentExam.pickedUids.length===s.select_n ? '' : 'disabled'}>この${s.select_n}問で始める</button></div>`;\n  body.querySelectorAll('.pick-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const uid = btn.dataset.uid;\n      const idx = currentExam.pickedUids.indexOf(uid);\n      if (idx >= 0) currentExam.pickedUids.splice(idx, 1);\n      else if (currentExam.pickedUids.length < s.select_n) currentExam.pickedUids.push(uid);\n      renderExamPick();\n    });\n  });\n  const confirmBtn = document.getElementById('exam-confirm-btn');\n  if (confirmBtn) confirmBtn.addEventListener('click', renderExamQuestions);\n}\n\nfunction renderExamQuestions() {\n  const body = document.getElementById('exam-body');\n  const problems = currentExam.pickedUids.map(uid => uidIndex.get(uid));\n  const blocks = problems.map(p => {\n    const qs = (p.questions||[]).map((sq, i) => {\n      const key = `${p.uid}-${i}`;\n      return `\n        <div class=\"setmon-row\" data-key=\"${key}\">\n          <div class=\"sm-head\"><b>${sq.setmon}</b><span class=\"fmt-badge\">${sq.format}</span></div>\n          <p class=\"prompt\">${sq.prompt_summary}</p>\n          <button class=\"reveal-btn\" data-action=\"reveal\">模範解答を見て自己採点する</button>\n          <div class=\"reveal-box\">\n            <div class=\"ans\">${sq.model_answer || '(解答例なし)'}</div>\n            ${sq.commentary ? `<div class=\"cmt\">${sq.commentary}</div>` : ''}\n            <div class=\"self-grade-row\">\n              <button data-grade=\"ok\">○ できた</button>\n              <button data-grade=\"mid\">△ 部分的</button>\n              <button data-grade=\"ng\">✕ できなかった</button>\n            </div>\n          </div>\n        </div>`;\n    }).join('');\n    return `<div style=\"margin-bottom:16px;\"><b style=\"font-size:14px;\">問${p.problem_no}: ${p.theme}</b>${qs}</div>`;\n  }).join('');\n  body.innerHTML = `\n    <p class=\"count-line\">解答を検討したら「模範解答を見て自己採点する」を開き、○/△/✕で自己評価する。全設問を評価したら採点する。</p>\n    ${blocks}\n    <div class=\"exam-actions\"><button id=\"exam-grade-btn\">採点する</button></div>`;\n\n  body.querySelectorAll('[data-action=\"reveal\"]').forEach(btn => {\n    btn.addEventListener('click', () => btn.nextElementSibling.classList.toggle('shown'));\n  });\n  body.querySelectorAll('.self-grade-row button').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const row = btn.closest('.setmon-row');\n      const key = row.dataset.key;\n      const grade = btn.dataset.grade;\n      currentExam.grades[key] = grade;\n      row.querySelectorAll('.self-grade-row button').forEach(b => b.classList.remove('active-ok','active-mid','active-ng'));\n      btn.classList.add(grade === 'ok' ? 'active-ok' : grade === 'mid' ? 'active-mid' : 'active-ng');\n    });\n  });\n  document.getElementById('exam-grade-btn').addEventListener('click', gradeExam);\n}\n\nfunction gradeExam() {\n  const problems = currentExam.pickedUids.map(uid => uidIndex.get(uid));\n  let totalQ = 0, score = 0;\n  const weight = { ok: 1, mid: 0.5, ng: 0 };\n  problems.forEach(p => {\n    (p.questions||[]).forEach((sq, i) => {\n      const key = `${p.uid}-${i}`;\n      totalQ++;\n      const g = currentExam.grades[key];\n      score += weight[g] ?? 0;\n    });\n  });\n  const pct = totalQ ? Math.round(score/totalQ*1000)/10 : 0;\n  const pass = pct >= 60;\n  currentExam.result = { totalQ, score, pct, pass };\n  addExamHistory(currentExam);\n\n  const resultHtml = `\n    <div class=\"exam-result\">\n      <div class=\"score\">自己採点 ${pct}%</div>\n      <div class=\"verdict ${pass ? 'pass' : 'fail'}\">${pass ? '合格ライン到達' : '合格ライン未到達'}（目安60%）</div>\n      <div class=\"exam-result-actions\">\n        <button id=\"exam-save-btn\">結果をファイルで保存</button>\n        <button id=\"exam-retry-btn\">別の回を選び直す</button>\n      </div>\n      <div class=\"exam-save-status\" id=\"exam-save-status\"></div>\n    </div>`;\n  document.getElementById('exam-body').insertAdjacentHTML('afterbegin', resultHtml);\n  document.getElementById('exam-grade-btn').closest('.exam-actions').remove();\n  document.getElementById('exam-save-btn').addEventListener('click', saveExamResult);\n  document.getElementById('exam-retry-btn').addEventListener('click', () => { currentExam = null; document.getElementById('exam-body').innerHTML=''; });\n}\n\nasync function saveExamResult() {\n  const statusEl = document.getElementById('exam-save-status');\n  if (!window.claude || !window.claude.downloads) { statusEl.textContent = 'この環境ではファイル保存に対応していない。'; return; }\n  const s = currentExam.sitting;\n  const { totalQ, score, pct, pass } = currentExam.result;\n  const now = new Date();\n  const dateStr = now.toISOString().slice(0,16).replace('T',' ');\n  const problems = currentExam.pickedUids.map(uid => uidIndex.get(uid));\n  const detail = problems.map(p => `## 問${p.problem_no}: ${p.theme}\\n` + (p.questions||[]).map((sq,i) => {\n    const g = currentExam.grades[`${p.uid}-${i}`] || '未評価';\n    const gLabel = {ok:'○ できた', mid:'△ 部分的', ng:'✕ できなかった', '未評価':'未評価'}[g];\n    return `- ${sq.setmon}: ${gLabel}`;\n  }).join('\\n')).join('\\n\\n');\n  const report = `# SC午後 模擬試験 結果報告書(自己採点)\n\n回: ${s.label}\n実施日時: ${dateStr}\n選択した問題: ${problems.map(p=>'問'+p.problem_no).join('・')}\n自己採点: ${score}/${totalQ}（${pct}%）\n合格ライン目安: 60%\n判定: ${pass ? '合格ライン到達' : '合格ライン未到達'}\n\n${detail}\n`;\n  const filename = `sc_pm_mock_${s.id}_${dateStr.replace(/[:\\s]/g,'-')}.md`;\n  try {\n    await window.claude.downloads.save({ filename, data: report });\n    statusEl.textContent = '保存した。';\n  } catch (err) {\n    if (err && err.code === 'declined') statusEl.textContent = '保存をキャンセルした。';\n    else statusEl.textContent = '保存できなかった（' + (err && err.code || 'unknown') + '）。';\n  }\n}\n\n/* ===== 受験履歴 ===== */\nconst EXAM_HISTORY_KEY = 'pm_material_exam_history_v1';\nfunction loadExamHistory() { try { return JSON.parse(localStorage.getItem(EXAM_HISTORY_KEY) || '[]'); } catch(e){ return []; } }\nfunction saveExamHistoryList(list) { localStorage.setItem(EXAM_HISTORY_KEY, JSON.stringify(list)); }\nfunction addExamHistory(exam) {\n  const list = loadExamHistory();\n  list.push({ ts: Date.now(), label: exam.sitting.label, score: exam.result.score, total: exam.result.totalQ, pct: exam.result.pct, pass: exam.result.pass });\n  saveExamHistoryList(list);\n  renderExamHistory();\n}\nfunction fmtDate(ts) {\n  const d = new Date(ts); const p = n => String(n).padStart(2,'0');\n  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;\n}\nfunction renderExamHistory() {\n  const list = loadExamHistory();\n  const el = document.getElementById('exam-history-list');\n  if (!list.length) { el.innerHTML = '<div class=\"empty-state\">まだ受験履歴がない。</div>'; return; }\n  const avg = Math.round(list.reduce((s,r)=>s+r.pct,0)/list.length*10)/10;\n  const passRate = Math.round(list.filter(r=>r.pass).length/list.length*100);\n  const rows = list.slice().reverse().map(r => `\n    <tr><td>${fmtDate(r.ts)}</td><td>${r.label}</td><td>${r.score}/${r.total}（${r.pct}%）</td><td><span class=\"hist-badge ${r.pass?'pass':'fail'}\">${r.pass?'合格ライン到達':'未到達'}</span></td></tr>`).join('');\n  el.innerHTML = `\n    <p class=\"count-line\">${list.length}回受験 / 平均${avg}% / 合格ライン到達率${passRate}%</p>\n    <div style=\"overflow-x:auto;\"><table class=\"exam-history-table\">\n      <thead><tr><th>日時</th><th>回</th><th>自己採点</th><th>判定</th></tr></thead>\n      <tbody>${rows}</tbody>\n    </table></div>`;\n}\n\ndocument.getElementById('exam-start-btn').addEventListener('click', () => {\n  const idx = Number(document.getElementById('exam-sitting-select').value);\n  startExamPick(idx);\n});\ndocument.addEventListener('click', (e) => {\n  if (e.target.closest('[data-reset=\"1\"]')) {\n    if (confirm('この端末に保存した学習チェックを全部消す。よいか？')) {\n      studiedSet = new Set(); saveStudied(studiedSet);\n      renderPatternList(); renderProblemList(); renderAllProgress();\n    }\n  }\n  if (e.target.id === 'exam-history-reset') {\n    if (confirm('この端末に保存した受験履歴を全部消す。よいか？')) { saveExamHistoryList([]); renderExamHistory(); }\n  }\n});\n\nsetupTypeFilters();\nsetupYearFilters();\npopulateSittingSelect();\nrenderPatternList();\nrenderProblemList();\nrenderExamHistory();\nrenderAllProgress();\n"}};
const mounted = {};

function mountPage(key) {
  if (mounted[key]) return;
  mounted[key] = true;
  const host = document.getElementById('host-' + key);
  const page = PAGES[key];
  const shadow = host.attachShadow({mode: 'open'});
  shadow.innerHTML = '<style>' + page.style + '</style>' + page.body;
  if (page.script) {
    const scopedDoc = {
      getElementById: (id) => shadow.getElementById(id),
      querySelector: (s) => shadow.querySelector(s),
      querySelectorAll: (s) => shadow.querySelectorAll(s),
      addEventListener: (...a) => shadow.addEventListener(...a),
      createElement: (...a) => window.document.createElement(...a),
    };
    const scriptEl = document.createElement('script');
    scriptEl.textContent = '(function(document) {\n' + page.script + '\n})(window.__scopedDoc_' + key + ');';
    window['__scopedDoc_' + key] = scopedDoc;
    shadow.appendChild(scriptEl);
  }
}

document.querySelectorAll('.shell-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.shell-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page-host').forEach(h => h.style.display = 'none');
    const key = tab.dataset.page;
    document.getElementById('host-' + key).style.display = 'block';
    mountPage(key);
  });
});

mountPage('report');
</script>
